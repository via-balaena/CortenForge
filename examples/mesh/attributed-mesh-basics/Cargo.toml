[package]
name = "example-mesh-attributed-mesh-basics"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Headless demo — an AttributedMesh API tutorial. Its asserts are a strict
# subset of `mesh-types` `src/attributed.rs` unit tests (SoA slots, extras,
# length validation), so correctness lives in the library; this just shows
# usage. Compile-only in CI; not run by `xtask run-validators`.
[package.metadata.cortenforge]
example_kind = "demo"

[dependencies]
# AttributedMesh + VertexColor + unit_cube. No mesh-io: this example
# demonstrates the type, not the wire format.
mesh-types = { workspace = true }
# anyhow error reporting for main()'s Result<()> return type.
anyhow = { workspace = true }

[lints]
workspace = true
