[package]
name = "example-mesh-attributed-mesh-basics"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Headless demo — an AttributedMesh API tutorial. It carries no asserts; the
# SoA-slot / extras / length-validation correctness it illustrates lives in
# `mesh-types` `src/attributed.rs` unit tests. This just prints the populated
# state. Compile-only in CI; not run by `xtask run-validators`.
[package.metadata.cortenforge]
example_kind = "demo"

[dependencies]
# AttributedMesh + VertexColor + unit_cube. No mesh-io: this example
# demonstrates the type, not the wire format.
mesh-types = { workspace = true }
# anyhow error reporting for main()'s Result<()> return type.
anyhow = { workspace = true }

[lints]
workspace = true
