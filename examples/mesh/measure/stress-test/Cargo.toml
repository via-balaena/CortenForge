[package]
name = "example-measure-stress-test"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Declares this example's role in the validation contract. `validator` = the
# binary self-checks against oracles and exits non-zero on any failure, so CI
# runs it red-or-green (see `cargo xtask run-validators`). The alternative kind
# is `demo` (illustration only; compile-checked but not run). Every self-gating
# example MUST declare `validator` or its oracle checks run nowhere in CI.
[package.metadata.cortenforge]
example_kind = "validator"

[dependencies]
# Hand-authored fixtures (two-shape mesh, UV-cylinder, unit cubes) + Point3
mesh-types = { workspace = true }
# save_ply for the out/*.ply human-inspectable artifacts
mesh-io = { workspace = true }
# dimensions / oriented_bounding_box / cross_section(s) / measure_distance / …
mesh-measure = { workspace = true }
# Result<()> return type for each module's run()
anyhow = { workspace = true }
# assert_relative_eq! numerical anchors across all three modules
approx = { workspace = true }
# Rotation3 / Vector3 for the tilted-brick fixture + OBB local-offset (bounding_box)
nalgebra = { workspace = true }

[lints]
workspace = true
