[package]
name = "example-mesh-mesh-repair-walkthrough"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Headless demo — a broken→clean repair-pipeline walkthrough. Its distinct
# end-to-end composition oracle (cascade cleanup, stage ordering, terminal
# watertight∧manifold∧outward) is backfilled to `mesh-repair`'s own
# `tests/repair_pipeline.rs`, so correctness lives in the library; this stays a
# runnable demonstration. Compile-only in CI; not run by `xtask run-validators`.
[package.metadata.cortenforge]
example_kind = "demo"

[dependencies]
# unit_cube + IndexedMesh + Point3
mesh-types = { workspace = true }
# save_ply / load_ply for the before/after PLY artifacts
mesh-io = { workspace = true }
# validate_mesh + repair_mesh + fill_holes + fix_winding_order +
# count_inconsistent_faces + detect_holes + MeshAdjacency + RepairParams
mesh-repair = { workspace = true }
# anyhow error reporting for main()'s Result<()> return type
anyhow = { workspace = true }

[lints]
workspace = true
