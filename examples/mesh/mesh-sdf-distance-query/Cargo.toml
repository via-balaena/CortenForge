[package]
name = "example-mesh-mesh-sdf-distance-query"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Headless demo — an oracle-decomposition walkthrough (pseudo-normal vs
# flood-fill sign). It carries no asserts; the oracles it illustrates live
# in `mesh-sdf`'s `src/sdf.rs` + `src/flood_fill.rs` unit tests (the
# closed-form L1-ball octahedron anchor
# `signed_distance_matches_closed_form_l1_ball_on_octahedron`; the
# inverted-cap rescue `pseudo_normal_wrong_flood_fill_right_on_inward_cap`),
# so correctness lives in the library. This is a runnable demonstration;
# compile-only in CI, not run by `xtask run-validators`.
[package.metadata.cortenforge]
example_kind = "demo"

[dependencies]
# Octahedron + pyramid fixtures: Point3 + IndexedMesh::from_parts + AttributedMesh wrap
mesh-types = { workspace = true }
# save_ply for out/octahedron.ply + save_ply_attributed for out/octahedron_sdf_grid.ply
mesh-io = { workspace = true }
# Post-D arc API: TriMeshDistance + PseudoNormalSign + FloodFillSign +
# Signed<D, S> + flood_filled_sdf convenience constructor +
# WALL_THRESHOLD_FACTOR_DEFAULT
mesh-sdf = { workspace = true }
# Aabb for the flood-fill bounds
cf-geometry = { workspace = true }
# Result<()> return type for main()
anyhow = { workspace = true }

[lints]
workspace = true
