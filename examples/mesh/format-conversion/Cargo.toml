[package]
name = "example-mesh-format-conversion"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Headless demo — a "what each format preserves" tutorial. It carries no
# asserts; the per-format count preservation and STL's geometry-vs-topology
# divergence it illustrates live in `mesh-io`'s round-trip tests (`src/stl.rs`
# `stl_roundtrip_preserves_geometry_not_vertex_sharing`, `src/ply.rs`,
# `src/obj.rs`, `tests/thingi10k_conformance.rs`). This just prints the
# comparison table. Compile-only in CI; not run by `xtask run-validators`.
[package.metadata.cortenforge]
example_kind = "demo"

[dependencies]
# unit_cube + IndexedMesh helpers (signed_volume, surface_area, aabb)
mesh-types = { workspace = true }
# save_stl / load_stl, save_ply / load_ply, save_obj / load_obj
mesh-io = { workspace = true }
# anyhow error reporting for the example main() return type
anyhow = { workspace = true }

[lints]
workspace = true
