[package]
name = "example-mesh-ply-with-custom-attributes"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Headless demo — a PLY custom-attribute round-trip tutorial. It carries no
# asserts; the round-trip correctness it illustrates lives in `mesh-io`'s
# `src/ply.rs` `roundtrip_attributed_extras_only_*` tests. This just prints the
# recovered values. Compile-only in CI; not run by `xtask run-validators`.
[package.metadata.cortenforge]
example_kind = "demo"

[dependencies]
# AttributedMesh + unit_cube helper
mesh-types = { workspace = true }
# save_ply_attributed / load_ply_attributed
mesh-io = { workspace = true }
# anyhow error reporting for the example main() return type
anyhow = { workspace = true }

[lints]
workspace = true
