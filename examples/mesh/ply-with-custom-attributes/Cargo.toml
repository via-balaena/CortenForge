[package]
name = "example-mesh-ply-with-custom-attributes"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Headless demo — a PLY custom-attribute round-trip tutorial. Its asserts are a
# strict subset of `mesh-io`'s `src/ply.rs` `roundtrip_attributed_extras_only_*`
# tests (and overlap the attributed-mesh-basics demo), so correctness lives in
# the library; this just shows usage. Compile-only in CI; not run by `xtask run-validators`.
[package.metadata.cortenforge]
example_kind = "demo"

[dependencies]
# AttributedMesh + unit_cube helper
mesh-types = { workspace = true }
# save_ply_attributed / load_ply_attributed
mesh-io = { workspace = true }
# anyhow error reporting for the example main() return type
anyhow = { workspace = true }

[lints]
workspace = true
