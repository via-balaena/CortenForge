[package]
name = "example-integration-articulated-striker-viewer"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
# StaggeredCoupling — owns the soft buffer + the posed finite fist; `step_kinematic` drives the
# one-way (kinematic FK-posed fist → soft response) step the scripted arm needs.
sim-coupling = { workspace = true }
# Vec3 / VertexId + the measured Ecoflex buffer material (mu) — the soft-side block params.
sim-soft = { workspace = true }
# load_model — the static anchor body that hosts the coupling (the arm is kinematic FK/IK).
sim-mjcf = { workspace = true }
# build_soft_mesh + apply_soft_positions — the soft-body deformed-mesh build + per-frame replay path.
sim-bevy-soft = { workspace = true }
# UpAxis::PlusZ (sim +Z-up → Bevy +Y-up swap) + OrbitCamera / OrbitCameraPlugin.
cf-bevy-common = { workspace = true }
# Bevy 0.18 windowed render pipeline (visual mode only; headless capture never touches Bevy).
bevy = { workspace = true, default-features = false, features = [
    "bevy_asset",
    "bevy_core_pipeline",
    "bevy_gizmos",
    "bevy_gizmos_render",
    "bevy_pbr",
    "bevy_render",
    "bevy_state",
    "bevy_text",
    "bevy_ui",
    "bevy_ui_render",
    "default_font",
    "bevy_winit",
    "multi_threaded",
    "tonemapping_luts",
    "zstd_rust",
    "x11",
] }

[lints]
workspace = true
