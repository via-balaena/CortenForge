[package]
name = "example-sim-soft-scan-fit-3layer-sleeve"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Declares this example's role in the validation contract. `validator` = the
# binary self-checks against oracles and exits non-zero on any failure, so CI
# runs it red-or-green (see `cargo xtask run-validators`). The alternative kind
# is `demo` (illustration only; compile-checked but not run). Every self-gating
# example MUST declare `validator` or its oracle checks run nowhere in CI. This
# row's oracles are pipeline-emergent structural invariants (positive tet
# volume, solver convergence, per-shell material routing, strict Î¨Ě„ ordering,
# displacement bound) computed from the real solve â€” NOT captured-bit self-pins
# (stripped in the Rule-B de-frag; constitutive/mesher correctness is lib-owned).
[package.metadata.cortenforge]
example_kind = "validator"

[dependencies]
# `cf_design::Solid::cuboid` (the axis-aligned scan stand-in body â€”
# exact-SDF primitive required for offset to produce a true uniform
# wrap shell) + `Solid::offset` (the wrap-thickness extrusion that
# produces the outer envelope) + `Solid::subtract` (the heterogeneous
# CSG that carves the scan-shaped cavity from the wrapped envelope to
# yield the sleeve body) + `Solid::sphere` + `Solid::translate` (the
# rigid intrusion probe, positioned over the scan's `+z` cap). Per
# PR3 F1 (`impl Sdf for Solid` at `design/cf-design/src/sdf.rs:56`),
# every `Solid` is itself an `impl Sdf` and bridges into sim-soft's
# tet meshing + contact pipelines via the same trait â€” no per-shape
# glue.
cf-design = { workspace = true }
# `Aabb3` + `BoundaryConditions` + `CpuNewtonSolver` +
# `LayeredScalarField` + `MaterialField` + `Mesh` + `MeshingHints` +
# `NewtonStep` + `PenaltyRigidContact` + `PenaltyRigidContactSolver`
# (alias) + `SceneInitial` + `Sdf` (re-export of `cf_design::Sdf`) +
# `SdfMeshedTetMesh` + `Solver` + `SolverConfig` + `Tet4` + `Vec3` +
# `VertexId` + `pick_vertices_by_predicate` + `referenced_vertices` +
# `material::silicone_table::{ECOFLEX_00_20, DRAGON_SKIN_10A,
# DRAGON_SKIN_20A}` (F4 const entries â€” inner = ECOFLEX_00_20 as proxy
# for the Slacker-softened Ecoflex 00-30 blend at effective Shore
# 00-20; middle = DRAGON_SKIN_10A as proxy for the conductive
# composite at effective Shore 15-18A; outer = DRAGON_SKIN_20A direct).
sim-soft = { workspace = true }
# `Tensor` for the empty-traction `theta` argument to `replay_step`.
# Loading is fully penalty-mediated through contact (rigid intrusion
# probe drives the cavity wall); no distributed pressure. Same idiom
# as rows 18 + 20.
sim-ml-chassis = { workspace = true }
# `Point3` + `IndexedMesh` + `AttributedMesh` for the z-slab per-tet
# centroid PLY emit (`material_id` categorical + `displacement_magnitude`
# sequential, per pattern (aa) for hollow / interior-cavity bodies).
mesh-types = { workspace = true }
# `save_ply_attributed` for `out/sleeve_zslab.ply`.
mesh-io = { workspace = true }
# `Result<()>` return + error-context wrapping for the JSON + PLY emit
# steps. Same convention as rows 1-20.
anyhow = { workspace = true }
# JSON emit for `out/scan_fit_3layer_sleeve.json` â€” fit-pose summary
# (force_total + displacement + per-layer Î¨Ě„) + per-shell tet counts +
# 3-material provenance block + per-active-pair detail array. Mirrors
# row 18 + 20's two-section schema.
serde_json = { workspace = true }
# `Matrix3` + `Vector3` for the per-tet F-from-positions helper +
# `cf_design::Sdf::eval` `Point3` receiver adaptation at material-field
# probe sites.
nalgebra = { workspace = true }

[lints]
workspace = true
