[package]
name = "example-sim-soft-silicone-material-table"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
# silicone_table::{ECOFLEX_*, DRAGON_SKIN_*} consts (PR3 F4) +
# SiliconeMaterial::to_neo_hookean() const-fn bridge + Material trait
# (energy + first_piola) for the per-material constitutive probe +
# NeoHookean type for documentation reference.
sim-soft = { workspace = true }
# Matrix3 for hand-crafting F = diag(λ, 1, 1) and reading
# `mat.first_piola` results directly (no solver, no Tape/Tensor) — same
# direct-eval shape as row 5 `neo-hookean-uniaxial`.
nalgebra = { workspace = true }
# Result<()> return + error-context wrapping for the JSON emit step.
anyhow = { workspace = true }
# JSON emit for out/silicone_materials.json — programmatic-consumption
# lookup table; schema documented inline in src/main.rs::save_json.
serde_json = { workspace = true }
# `assert_relative_eq!` for closed-form analytic vs `mat.first_piola`
# comparisons + per-material captured-bits self-pin — same convention
# as rows 5+11+16 (closed-form anchor at 1e-12 rel-tol).
approx = { workspace = true }

