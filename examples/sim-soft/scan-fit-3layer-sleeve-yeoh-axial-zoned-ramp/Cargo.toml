[package]
name = "example-sim-soft-scan-fit-3layer-sleeve-yeoh-axial-zoned-ramp"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Declares this example's role in the validation contract. `validator` = the
# binary self-checks against oracles and exits non-zero on any failure, so CI
# runs it red-or-green (see `cargo xtask run-validators`). This row is a Rule-B
# validator: a heavy 16-step Yeoh ramp with axial × radial (zone × shell)
# material zoning, whose oracles are pipeline-emergent structural + physics
# invariants (positive tet volume, fully-populated zone × shell decomposition,
# per-step convergence, force-displacement monotonicity, radial + axial strict
# Ψ̄ ordering, displacement bound, per-shell material routing) read from the real
# solve — NOT captured-bit self-pins (stripped in the Rule-B de-frag;
# constitutive/mesher/blend correctness is lib-owned). Robust 8 mm convergence
# routes the calibrated Yeoh validity bounds via `from_yeoh_fields_with_bounds`.
[package.metadata.cortenforge]
example_kind = "validator"

[dependencies]
# `cf_design::Solid::cuboid` (the axis-aligned scan stand-in body —
# exact-SDF primitive required for offset to produce a true uniform
# wrap shell) + `Solid::offset` (the wrap-thickness extrusion that
# produces the outer envelope) + `Solid::subtract` (the heterogeneous
# CSG that carves the scan-shaped cavity from the wrapped envelope to
# yield the sleeve body) + `Solid::sphere` + `Solid::translate` (the
# rigid intrusion probe, repositioned per ramp step to progressively
# deeper `+z` cap penetration). Per PR3 F1 (`impl Sdf for Solid` at
# `design/cf-design/src/sdf.rs:56`), every `Solid` is itself an
# `impl Sdf` and bridges into sim-soft's tet meshing + contact
# pipelines via the same trait — no per-shape glue.
cf-design = { workspace = true }
# `Aabb3` + `BoundaryConditions` + `BlendedScalarField` (the v3
# differentiator — smoothstep blend between proximal + distal
# `LayeredScalarField`s over an axial half-space SDF) +
# `CpuNewtonSolver` + `LayeredScalarField` (per-zone radial-shell
# partition) + `MaterialField` (with `from_yeoh_fields_with_bounds` —
# Yeoh variant carrying the calibrated per-anchor validity caps,
# blended axially like μ/C₂/λ, for the F4.0 generic-mesh path) +
# `Mesh<Yeoh>` + `MeshingHints` +
# `NewtonStep` + `PenaltyRigidContact` + `PenaltyRigidContactYeohSolver`
# (Yeoh alias of `CpuNewtonSolver<…, Yeoh, 4, 1>`, lib.rs:148) +
# `SceneInitial` + `Sdf` (re-export of `cf_design::Sdf`; supertrait of
# the inline `AxialHalfSpace` impl below) + `SdfMeshedTetMesh<Yeoh>`
# (Yeoh-flavored mesh built via `from_sdf_yeoh`) + `Solver` +
# `SolverConfig` + `Tet4` + `Vec3` + `VertexId` +
# `pick_vertices_by_predicate` + `referenced_vertices` +
# `material::Yeoh` + `material::silicone_table::{ECOFLEX_00_20,
# ECOFLEX_00_30, DRAGON_SKIN_10A, DRAGON_SKIN_15, DRAGON_SKIN_20A,
# DRAGON_SKIN_30A}` (F4 const entries — six anchors used directly via
# Path 1 `to_yeoh()` round-trip; proximal stack matches row 23's
# 18/51/113 kPa; distal stack is one-Shore-step stiffer per family
# yielding 23/92/198 kPa). Path-2 parametric construction is not used
# in this row (row 23 already demonstrates the Path-2 surface; row 24
# isolates the axial-composition variable).
sim-soft = { workspace = true }
# `Tensor` for the empty-traction `theta` argument to `replay_step`
# (one call per ramp step). Loading is fully penalty-mediated through
# contact (rigid intrusion probe drives the cavity wall) at every
# step; no distributed pressure. Same idiom as rows 18 + 20 + 21 + 22 +
# 23.
sim-ml-chassis = { workspace = true }
# `Point3` for the inline `AxialHalfSpace` SDF's `eval` receiver +
# `Vector3` for its gradient + the `Solid` half-extents + the per-tet
# F-from-positions helper. The x-slab cut at `x = 0` (which spans the
# full axial range so the soft-tip / stiff-anchor material gradient is
# eyes-on-pixels visible, vs row 23's z-slab that sits entirely inside
# the smoothstep band) is emitted as a proper triangulated viz artifact
# via `sim_soft::viz` post-F1.2 retrofit; the per-cell zone × shell
# populations survive as cheap non-empty regression gates.
mesh-types = { workspace = true }
# `save_ply_attributed` for the F1.2 viz artifacts (boundary surface,
# `x = 0` slab cut, cf-design design-mesh + per-step `design_surface_deformed`
# series), each carrying `material_id` + `zone_id` categorical +
# `displacement_magnitude` + `mu_sampled_pa` sequential per-vertex scalars.
mesh-io = { workspace = true }
# `Result<()>` return + error-context wrapping for the JSON + PLY emit
# steps. Same convention as rows 1-23.
anyhow = { workspace = true }
# JSON emit for `out/scan_fit_3layer_sleeve_yeoh_axial_zoned_ramp.json` —
# final-step scalars + 3-shell × 2-zone provenance (Yeoh-flavored
# nested schema: per-shell proximal_anchor + distal_anchor with μ, c2,
# λ, density, source-tag, validity bounds at both ends) +
# `axial_split_z` + `axial_band_half_width_m` axis-of-zoning metadata +
# `ramp_curve` array (per-step RampStepResult records, same shape as
# row 23) + final-step per-active-pair detail array. Five-section
# schema (row 23's four + axial-zoning metadata).
serde_json = { workspace = true }
# `Matrix3` + `Vector3` for the per-tet F-from-positions helper +
# `cf_design::Sdf::eval` `Point3` receiver adaptation at material-field
# probe sites + `Vec3::z()` for the axial half-space's gradient.
nalgebra = { workspace = true }

[lints]
workspace = true
