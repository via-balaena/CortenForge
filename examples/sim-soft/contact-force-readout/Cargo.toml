[package]
name = "example-sim-soft-contact-force-readout"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
# SoftScene::compressive_block_on_plane (the compressive-block fixture's helper) +
# CpuNewtonSolver + PenaltyRigidContactSolver type alias + RigidPlane +
# PenaltyRigidContact + per_pair_readout (foundation patch, commit
# `995fb0bf`) + ContactPairReadout + ContactPair + MaterialField + Mesh
# trait + SceneInitial + HandBuiltTetMesh + Solver + SolverConfig + Tet4
# + Vec3 + VertexId + pick_vertices_by_predicate.
sim-soft = { workspace = true }
# Tensor for the empty `theta` argument to `replay_step` (the compressive block's load
# is penalty-mediated, so external traction is length-0 by construction).
sim-ml-chassis = { workspace = true }
# Trajectory + SoftBodyVisualPlugin + build_soft_mesh — Bevy static-state
# render path (CF_VISUAL=1 visual mode). Row 18 is the fourth user of
# sim-bevy-soft after rows 12 + 13 + 14.
sim-bevy-soft = { workspace = true }
# UpAxis::PlusZ for the input → Bevy frame swap; OrbitCamera +
# OrbitCameraPlugin for the visual-mode camera.
cf-bevy-common = { workspace = true }
# Point3 + IndexedMesh + AttributedMesh wrap for the finest-frame
# deformed-mesh PLY emit (with per-vertex contact_pressure extras).
mesh-types = { workspace = true }
# save_ply_attributed for out/contact_force_readout.ply.
mesh-io = { workspace = true }
# Result<()> return + error-context wrapping for the JSON + PLY emit
# steps.
anyhow = { workspace = true }
# assert_relative_eq! for the IV-1 sparse-tier rel-tol contract on
# captured bits + the F_R bound bracket gate + accessor-vs-manual gate.
approx = { workspace = true }
# JSON emit for out/contact_force_readout.json (scalars + per-active
# top-face vertex (vertex_id, primitive_id, x, y, z, sd, force_*,
# pressure)).
serde_json = { workspace = true }
# Bevy 0.18 — full PBR + winit + UI feature set mirroring rows 12 + 13
# + 14 verbatim so the visual-mode `App::new().add_plugins(DefaultPlugins)`
# resolves a windowed render pipeline. Headless mode never invokes
# Bevy at runtime, but the binary links bevy unconditionally per
# Cargo's additive-features model — sim-bevy-soft's minimal
# `bevy_render + bevy_asset` set unifies up to this consumer's full set.
bevy = { workspace = true, default-features = false, features = [
    "bevy_asset",
    "bevy_core_pipeline",
    "bevy_gizmos",
    "bevy_gizmos_render",
    "bevy_pbr",
    "bevy_render",
    "bevy_state",
    "bevy_text",
    "bevy_ui",
    "bevy_ui_render",
    "default_font",
    "bevy_winit",
    "multi_threaded",
    "tonemapping_luts",
    "zstd_rust",
    "x11",
] }

[lints]
workspace = true
