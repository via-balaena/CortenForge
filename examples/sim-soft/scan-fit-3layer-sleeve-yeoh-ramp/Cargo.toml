[package]
name = "example-sim-soft-scan-fit-3layer-sleeve-yeoh-ramp"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Declares this example's role in the validation contract. `validator` = the
# binary self-checks against oracles and exits non-zero on any failure, so CI
# runs it red-or-green (see `cargo xtask run-validators`). This row is a Rule-B
# validator: a heavy 16-step quasi-static ramp demonstrator whose oracles are
# pipeline-emergent structural + physics invariants (positive tet volume,
# per-step convergence, per-step force-displacement monotonicity, strict Ψ̄
# ordering, displacement bound, per-shell material routing) read from the real
# solve — NOT captured-bit self-pins (stripped in the Rule-B de-frag;
# constitutive/mesher correctness is lib-owned). Robust deep-penetration
# convergence to 8 mm depends on the calibrated Yeoh validity bounds routed via
# `MaterialField::from_yeoh_fields_with_bounds`.
[package.metadata.cortenforge]
example_kind = "validator"

[dependencies]
# `cf_design::Solid::cuboid` (the axis-aligned scan stand-in body —
# exact-SDF primitive required for offset to produce a true uniform
# wrap shell) + `Solid::offset` (the wrap-thickness extrusion that
# produces the outer envelope) + `Solid::subtract` (the heterogeneous
# CSG that carves the scan-shaped cavity from the wrapped envelope to
# yield the sleeve body) + `Solid::sphere` + `Solid::translate` (the
# rigid intrusion probe, repositioned per ramp step to progressively
# deeper `+z` cap penetration). Per PR3 F1 (`impl Sdf for Solid` at
# `design/cf-design/src/sdf.rs:56`), every `Solid` is itself an
# `impl Sdf` and bridges into sim-soft's tet meshing + contact
# pipelines via the same trait — no per-shape glue.
cf-design = { workspace = true }
# `Aabb3` + `BoundaryConditions` + `CpuNewtonSolver` +
# `LayeredScalarField` + `MaterialField` (with `from_yeoh_fields` —
# Yeoh variant for the F4.0 generic-mesh path) + `Mesh<Yeoh>` +
# `MeshingHints` + `NewtonStep` + `PenaltyRigidContact` +
# `PenaltyRigidContactYeohSolver` (Yeoh alias of
# `CpuNewtonSolver<…, Yeoh, 4, 1>`, lib.rs:148) + `SceneInitial` +
# `Sdf` (re-export of `cf_design::Sdf`) + `SdfMeshedTetMesh<Yeoh>`
# (Yeoh-flavored mesh built via `from_sdf_yeoh`) + `Solver` +
# `SolverConfig` + `Tet4` + `Vec3` + `VertexId` +
# `pick_vertices_by_predicate` + `referenced_vertices` +
# `material::{Yeoh, ConstructionSource, ShoreReading,
# SiliconeMaterial}` + `material::silicone_table::{DRAGON_SKIN_10A,
# DRAGON_SKIN_20A}` (F4 const entries used directly via Path 1 — `to_yeoh()`
# round-trip; middle = DRAGON_SKIN_10A as proxy for the conductive
# composite at effective Shore 15-18A; outer = DRAGON_SKIN_20A direct).
# Inner layer is Path 2: `SiliconeMaterial::from_effective_shore(
# ShoreReading::DoubleZero(20.0), …)?.to_yeoh()` — demonstrates the
# parametric/interpolation API; at `DoubleZero(20.0)` the bracket is
# `(ECOFLEX_00_10, ECOFLEX_00_20)` with `weight = 1.0` so the produced
# `(μ, C₂, λ, density)` are bit-equal to the 00-20 anchor and the
# `ConstructionSource::Interpolated { weight: 1.0 }` provenance tag
# distinguishes the construction path.
sim-soft = { workspace = true }
# `Tensor` for the empty-traction `theta` argument to `replay_step`
# (one call per ramp step). Loading is fully penalty-mediated through
# contact (rigid intrusion probe drives the cavity wall) at every
# step; no distributed pressure. Same idiom as rows 18 + 20 + 21 + 22.
sim-ml-chassis = { workspace = true }
# `Point3` + `IndexedMesh` + `AttributedMesh` for the final-step
# z-slab per-tet centroid PLY emit (`material_id` categorical +
# `displacement_magnitude` sequential, per pattern (aa) for hollow /
# interior-cavity bodies).
mesh-types = { workspace = true }
# `save_ply_attributed` for `out/sleeve_zslab_final.ply`.
mesh-io = { workspace = true }
# `Result<()>` return + error-context wrapping for the JSON + PLY emit
# steps. Same convention as rows 1-22.
anyhow = { workspace = true }
# JSON emit for `out/scan_fit_3layer_sleeve_yeoh_ramp.json` —
# final-step scalars + 3-material provenance (Yeoh-flavored: μ, c2, λ,
# density, source-tag, validity bounds) + `ramp_curve` array (per-step
# RampStepResult records) + final-step per-active-pair detail array.
# Four-section schema like row 22.
serde_json = { workspace = true }
# `Matrix3` + `Vector3` for the per-tet F-from-positions helper +
# `cf_design::Sdf::eval` `Point3` receiver adaptation at material-field
# probe sites.
nalgebra = { workspace = true }

[lints]
workspace = true
