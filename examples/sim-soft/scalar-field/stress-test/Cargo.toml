[package]
name = "example-scalar-field-stress-test"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Declares this example's role in the validation contract. `validator` = the
# binary self-checks against oracles and exits non-zero on any failure, so CI
# runs it red-or-green (see `cargo xtask run-validators`). The alternative kind
# is `demo` (illustration only; compile-checked but not run). Every self-gating
# example MUST declare `validator` or its oracle checks run nowhere in CI.
[package.metadata.cortenforge]
example_kind = "validator"

[dependencies]
# LayeredScalarField + BlendedScalarField + ConstantField + Field trait +
# MaterialField + SdfMeshedTetMesh + SphereSdf + Sdf + Mesh trait + NeoHookean +
# Material + Aabb3 + MeshingHints + Vec3 + TetId + VertexId + referenced_vertices
sim-soft = { workspace = true }
# Point3 + IndexedMesh + AttributedMesh wrap for the per-tet centroid PLYs
mesh-types = { workspace = true }
# save_ply_attributed for the out/*.ply human-inspectable artifacts
mesh-io = { workspace = true }
# Matrix3 for the F_probe = diag(1.2, 1, 1) Material-trait probe (both modules)
nalgebra = { workspace = true }
# Result<()> return type for each module's run()
anyhow = { workspace = true }
# assert_relative_eq! numerical anchors (both modules)
approx = { workspace = true }

[lints]
workspace = true
