[package]
name = "spade-delaunay-spike"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# THROWAWAY SPIKE per sim-soft viz arc memo (project_sim_soft_viz_arc.md
# §"Option 3 (gold standard)"). Goal: prove that 2D Delaunay
# triangulation on row 24's x-slab centroid set produces a clean mesh
# without spurious cavity-spanning triangles (alpha-shape or
# max-edge-length filter sufficient?). After the spike succeeds or
# fails decisively, this crate gets either lifted into a real
# `sim_soft::viz::slab_mesh()` helper module OR deleted entirely.
# DO NOT add anchors / verifies / production-quality structure here —
# this is throwaway scratch code per pattern (mm) (spike-before-lock
# discipline at row 21 v1.5 PARKED memo).

[dependencies]
# `mesh_io::load_ply_attributed` for reading row 24's existing
# `out/sleeve_xslab_final.ply` + `save_ply_attributed` for writing the
# triangulated output.
mesh-io = { workspace = true }
# `Point3` / `IndexedMesh` / `AttributedMesh` for mesh manipulation.
mesh-types = { workspace = true }
# `Solid::cuboid` + `Solid::offset` + `Solid::subtract` to reconstruct
# the row 24 body SDF for the centroid-in-body triangle filter.
# Geometry constants must match row 24's main.rs verbatim.
cf-design = { workspace = true }
# `Sdf` trait (re-export of `cf_design::Sdf`) for the `body.eval()`
# call site at the centroid-in-body filter.
sim-soft = { workspace = true }
# `Vector3` for the cuboid/extents constructor.
nalgebra = { workspace = true }
# `spade::DelaunayTriangulation` — 2D Delaunay primitive. v2 already
# in the workspace lockfile via truck (transitive); declared here as
# a direct dep at v2.x.
spade = "2"
# `Result<()>` + error wrapping.
anyhow = { workspace = true }

[lints]
workspace = true
