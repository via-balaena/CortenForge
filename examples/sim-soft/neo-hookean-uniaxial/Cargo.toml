[package]
name = "example-sim-soft-neo-hookean-uniaxial"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Declares this example's role in the validation contract. `validator` = the
# binary self-checks against oracles (here: analytic Neo-Hookean P_11/P_22/ψ vs
# `Material::first_piola`/`energy` at rel-tol 1e-12) and exits non-zero on any
# failure, so CI runs it red-or-green (see `cargo xtask run-validators`). The
# alternative kind is `demo` (illustration only; compile-checked but not run).
[package.metadata.cortenforge]
example_kind = "validator"

[dependencies]
# NeoHookean + Material trait + ValidityDomain + InversionHandling.
sim-soft = { workspace = true }
# Matrix3 for hand-crafting F = diag(λ, λ_t, λ_t) and reading
# `mat.first_piola` results directly (no solver, no Tape/Tensor).
nalgebra = { workspace = true }
# Result<()> return + error-context wrapping for the JSON emit step.
anyhow = { workspace = true }
# JSON emit for out/force_stretch.json — schema documented inline in
# src/main.rs::save_force_stretch_json.
serde_json = { workspace = true }
# `assert_relative_eq!` for closed-form analytic vs `mat.first_piola`
# comparisons — same convention as `sim/L0/soft/tests/material_fd.rs`.
approx = { workspace = true }

[lints]
workspace = true
