[package]
name = "example-integrator-comparison-visual"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[dependencies]
# MJCF scene loader for the example physics scene
sim-mjcf = { workspace = true }
# Bevy <-> sim-core bridge: Transform sync and debug rendering
sim-bevy = { workspace = true }
# Bevy engine: rendering, ECS, input, windowing
bevy = { workspace = true, features = [
    "bevy_asset",
    "bevy_core_pipeline",
    "bevy_pbr",
    "bevy_render",
    "bevy_state",
    "bevy_winit",
    "multi_threaded",
    "tonemapping_luts",
    "zstd_rust",
] }

[lints]
workspace = true
