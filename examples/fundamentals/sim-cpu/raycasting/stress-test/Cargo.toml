[package]
name = "example-raycasting-stress-test"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Declares this example's role in the validation contract. `validator` = the
# binary self-checks against oracles and exits non-zero on any failure, so CI
# runs it red-or-green (see `cargo xtask run-validators`). The alternative kind
# is `demo` (illustration only; compile-checked but not run).
[package.metadata.cortenforge]
example_kind = "validator"

[dependencies]
# Physics Model / Data stepped by the example simulation loop
sim-core = { workspace = true }
# BodyId / Pose primitives shared with sim-core
sim-types = { workspace = true }
# Shared geometry kernel: SDF primitives and AABBs
cf-geometry = { workspace = true }
# Matrix / vector / rotation primitives for pose math
nalgebra = { workspace = true }

[lints]
workspace = true
