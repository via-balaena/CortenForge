# CortenForge Workspace
#
# Industrial-grade foundation, unlimited application.
# From humanoid robots to vehicles to medical simulation.
#
# A-grade or it doesn't ship. No exceptions.

[workspace]
resolver = "2"
members = [
    # Development tooling
    "xtask",

    # The SDK facade — one stable public surface re-exporting the SDK crates.
    "cortenforge",

    # Workspace-wide visual-review viewer (replaces f3d + MeshLab for static artifacts)
    "cf-viewer",
    # Stage 2.5 scan-preprocessing GUI tool — see `docs/SCAN_PREP_DESIGN.md`.
    "tools/cf-scan-prep",
    # Headless, Bevy-free mesh-editing core extracted from cf-scan-prep so
    # both the Bevy tool and CortenForge Studio drive the same algorithms.
    "tools/cf-scan-prep-core",
    # Scan → cast bridge CLI; consumes cf-scan-prep outputs + cast.toml,
    # writes v2.1 mold pieces + plugs + procedure.md.
    "tools/cf-cast-cli",
    # Headless workflow core for the guided scan→cast Studio wizard.
    # The CLI + Slint GUI are thin clients over this. See MISSION.md.
    "tools/cf-studio-core",
    # SDK-boundary orchestrator for Studio — runs the workflow steps by
    # calling the SDK crates; built on cf-studio-core.
    "tools/cf-studio-engine",
    # Headless CLI frontend for Studio — thin client over the engine +
    # the Project state machine; the Slint GUI's behavioral reference.
    "tools/cf-studio",
    # Polished/accessible Slint GUI frontend for Studio (the product
    # surface) — a thin client over the engine, like the CLI.
    "tools/cf-studio-gui",
    # Layered-silicone-device design + testing suite (Bevy + egui GUI).
    # Consumes cf-scan-prep outputs; produces a `<scan>.design.toml`
    # that cf-cast-cli will consume (slice 9). The meat of the program
    # per the user 2026-05-13. See `docs/ENGINEERING_SUITE_DESIGN.md`.
    "tools/cf-device-design",
    # Sim-research viewer (Phase 2 of the sim-decouple refactor).
    # Phase 2 ships a skeleton: scan + centerline overlay + layer-
    # stack readout panel consuming `cf-device-types`. Phase 3 moves
    # the insertion-sim + heat-map + sliding-intruder rendering from
    # cf-device-design. See `docs/SIM_DECOUPLE_REFACTOR_PLAN.md` §4.
    "tools/cf-sim-research",
    # Native Bevy Design↔Simulate studio for the L4–L5 Functional Spinal
    # Unit: paint the two endplate patches, loft + solve the coupled FSU
    # (disc bushing + ligaments + facet contact), and replay the
    # moment-driven ROM. Consumes the shared cf-bevy-common camera +
    # cf-viewer scene scaffold. See project-anatomical-spine-viz.
    "tools/cf-spine-studio",
    # OpenSim (.osim) → MJCF bridge for the musculoskeletal-builder arc
    # (scan → bones/tendons model, Mission #4). Started as the S0 bridge
    # spike; see docs/msk_builder/.
    "tools/cf-osim",
    # Anatomical landmark detection on a body-part scan (knee line, epicondyle
    # width, segment lengths) for the musculoskeletal-builder arc, phase S2.
    "tools/cf-anthro",
    # Place + scale the OpenSim knee skeleton onto detected scan landmarks
    # (the scan↔model bridge) for the musculoskeletal-builder arc, phase S3.
    "tools/cf-msk-fit",
    # Library/parameter spine: the source-agnostic kinematic-tree IR (Model) +
    # morph a template into a body via BodyParams + realize() + ParamSource.
    # Builder-first (CanonicalSource = a body with NO scan). See docs/msk_builder/.
    "tools/cf-msk-lib",
    # MJCF emitter: lower a cf-msk-lib Model into MJCF the sim engine imports,
    # plus the no-scan build_canonical artifact. The deferred cf-mjcf-emit crate
    # split (leg-region A1). See docs/msk_builder/03_phases/leg_region/.
    "tools/cf-mjcf-emit",
    # Co-design optimizer (mission connective-tissue #2): gradient-based
    # optimization over the differentiable soft↔rigid coupling. See docs/codesign/.
    "tools/cf-codesign",

    # Shared Bevy-0.18 helpers (orbit camera + up-axis convention) consumed by
    # cf-viewer + sim-bevy + sim-bevy-soft.
    "cf-bevy-common",

    # Reusable Bevy brush-painting plugin over the `mesh-select` primitive —
    # a consumer registers paintable bodies and reads back the painted
    # face-id set (the disc-endplate paint front-end + generic mesh region
    # selection). UI-free like cf-bevy-common; consumers bring their own egui.
    "cf-mesh-paint",

