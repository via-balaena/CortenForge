    "sim/L0/gpu",
    "sim/L0/gpu-benches",
    "sim/L0/ml-chassis",
    "sim/L0/ml-chassis-benches",
    "sim/L0/rl",
    "sim/L0/rl-baselines",
    "sim/L0/thermostat",
    "sim/L0/opt",
    "sim/L0/therm-env",
    "sim/L0/soft",

    # Simulation domain - Layer 1 (Bevy integration)
    "sim/L1/bevy",
    "sim/L1/ml-chassis-bevy",
    "sim/L1/sim-bevy-soft",
    # Layer-2 keystone: staggered forward soft↔rigid coupling (sim-soft ↔ sim-core).
    "sim/L1/coupling",
    # Assembled FSU flexion model (bonded soft disc between two rigid vertebrae).
    "sim/L1/fsu-model",

    # Simulation umbrella — one crate re-exporting the headless sim spine
    # (rigid + soft + coupling + model I/O + RL/opt). Mirrors `mesh/mesh`;
    # re-exported by the `cortenforge` facade as `cortenforge::sim`.
    "sim/sim",
]

# Exclude directories that aren't workspace members
exclude = [
    "docs",
]

[workspace.package]
version = "1.0.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/via-balaena/CortenForge"
authors = ["Via Balaena"]
rust-version = "1.87"

[workspace.lints.rust]
unsafe_code = "warn"
missing_docs = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
# suboptimal_flops (nursery): suggests `a * b + c` -> `a.mul_add(b, c)`. mul_add is
# *fused* (single rounding), so it CHANGES floating-point results. Empirically (A/B,
# 2026-05-30) applying it shifted cf-cast SDF values enough to flip marching-cubes
# topology — the g7/g9 prismatic-pin characterisation tests changed component counts,
# i.e. it alters physically-validated cast geometry. Byte-identity > the marginal
# perf/accuracy of one nursery lint, so we opt out workspace-wide. The lint newly
# fired across 11 crates after the clippy 1.95 -> 1.96 stable bump.
suboptimal_flops = "allow"
# unwrap/expect: warn at workspace level (for tests), deny in lib.rs (for library code)
# See docs/INFRASTRUCTURE.md "Safety Lint Policy" for the rationale.
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "deny"
unimplemented = "deny"
# Silent failure prevention: catch discarded Results and #[must_use] values
let_underscore_must_use = "deny"

# ============================================================================
# WORKSPACE DEPENDENCIES
# ============================================================================
# All crates should use { workspace = true } for these dependencies
# to ensure version consistency across the workspace.

[workspace.dependencies]
# ---------------------------------------------------------------------------
# Math Foundation
# ---------------------------------------------------------------------------
# nalgebra: Linear algebra, matches parry3d and avian for compatibility
nalgebra = "0.34.2"
# num-traits: generic numeric traits (Float, Zero, One, NumCast) — promoted
# to explicit workspace dep per platform refactor audit A.1 (Tensor<T> generic);
# already transitive via nalgebra, this just gives us a direct import path.
# Default "std" feature required — Float impls for f32/f64 are gated on it.
num-traits = "0.2"
# (glam removed — was only used by routing crates)

# ---------------------------------------------------------------------------
# Error Handling
# ---------------------------------------------------------------------------
# thiserror: Derive macros for custom error types
thiserror = "2.0"
# anyhow: Flexible error handling for applications
anyhow = "1.0"

# ---------------------------------------------------------------------------
# Serialization
# ---------------------------------------------------------------------------
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = { version = "2.0", features = ["serde"] }
toml = "1.1"

# ---------------------------------------------------------------------------
# Spatial & Collision
# ---------------------------------------------------------------------------
# parry3d: Collision detection, BVH, convex hulls
parry3d = "0.17"
# parry3d-f64: f64-Real sibling of parry3d. Used by mesh-printability's
# F4 spatial-index path (`flag_thin_wall_faces` BVH ray-cast) where
# f32 precision drift at the `min_wall_thickness` threshold causes
# borderline 1.0 mm walls to flag spuriously. See
# `docs/CF_CAST_F4_SPATIAL_INDEX_RECON.md` §B-2 + the S1 commit's
# precision diagnosis. Two parry crates in workspace = ~2× build
# cost of parry; acceptable for the precision win.
parry3d-f64 = "0.17"

# ---------------------------------------------------------------------------
# Randomness
# ---------------------------------------------------------------------------
rand = "0.9"
rand_chacha = "0.9"
rand_distr = "0.5"
# getrandom is not used directly anywhere in this workspace; it enters
# transitively via rand_chacha → rand_core. It is registered here so
# L0 crates that build for wasm32-unknown-unknown can opt the
# transitive copy into the `wasm_js` backend (see each L0 crate's
# `[target.'cfg(...)'.dependencies]` block + the workspace
# `.cargo/config.toml` rustflag).
getrandom = { version = "0.3", features = ["wasm_js"] }

# ---------------------------------------------------------------------------
# Parallelism
# ---------------------------------------------------------------------------
rayon = "1.12"

# ---------------------------------------------------------------------------
# Data Structures
# ---------------------------------------------------------------------------
hashbrown = "0.16"

# ---------------------------------------------------------------------------
# Image Processing
# ---------------------------------------------------------------------------
image = "0.25"

# ---------------------------------------------------------------------------
# Logging & Tracing
# ---------------------------------------------------------------------------
tracing = "0.1"
# (tracing-subscriber removed — was only used by removed crates)

# ---------------------------------------------------------------------------
# Bevy Ecosystem (Layer 1 only - not used by Layer 0 crates)
# ---------------------------------------------------------------------------
# x11 feature required for examples to build on Linux. Without a platform
# backend feature, winit hits `compile_error!("platform not supported")`
# during its conditional compilation. macOS uses an unconditional backend
# so local builds don't surface this; CI did until x11 was added.
bevy = { version = "0.18", default-features = false, features = ["x11"] }

# ---------------------------------------------------------------------------
# Compression
# ---------------------------------------------------------------------------
zip = "8.6"

# ---------------------------------------------------------------------------
# Mesh I/O Formats
# ---------------------------------------------------------------------------
# PLY format support
ply-rs = "0.1"
# 3MF format support (XML parsing)
quick-xml = "0.39"
# STEP format support (CAD interchange) - truck ecosystem
truck-stepio = "0.3"
truck-modeling = "0.6"
truck-topology = "0.6"
truck-polymesh = "0.6"
truck-meshalgo = "0.4"

# ---------------------------------------------------------------------------
# GPU Compute
# ---------------------------------------------------------------------------
wgpu = "27"
bytemuck = { version = "1", features = ["derive"] }
pollster = "0.4"

# ---------------------------------------------------------------------------
# Mesh-CSG
# ---------------------------------------------------------------------------
# manifold3d: post-MC mesh-CSG kernel for cf-cast's mating-feature stage
# (`docs/CF_CAST_MATING_FEATURES_RECON.md` §2 + §11). Pre-1.0; pinned exact
# patch — manifold3d's API + output bit-pattern are not yet semver-stable,
# and the cross-piece shared-primitive invariant rests on bit-equal output.
# First-time builds compile the upstream `elalish/manifold` C++ kernel via
# manifold-csg-sys's build.rs (CMake + a vendored Clipper2); measured ~3 min
# 14 s on the S1 spike. Subsequent builds use cargo's target cache.
manifold3d = { version = "=0.1.8", features = ["nalgebra"] }

# ---------------------------------------------------------------------------
# Testing
# ---------------------------------------------------------------------------
criterion = "0.8"
proptest = "1.10"
approx = "0.5"
tempfile = "3.27"

# ---------------------------------------------------------------------------
# Internal Workspace Crates
# ---------------------------------------------------------------------------
# These are path dependencies for workspace members

# Mesh domain
mesh-types = { path = "mesh/mesh-types" }
mesh-io = { path = "mesh/mesh-io" }
mesh-repair = { path = "mesh/mesh-repair" }
mesh-repair-benches = { path = "mesh/mesh-repair-benches" }
mesh-loft = { path = "mesh/mesh-loft" }
mesh-select = { path = "mesh/mesh-select" }
mesh-sdf = { path = "mesh/mesh-sdf" }
mesh-offset = { path = "mesh/mesh-offset" }
mesh-shell = { path = "mesh/mesh-shell" }
mesh-shell-benches = { path = "mesh/mesh-shell-benches" }
mesh-measure = { path = "mesh/mesh-measure" }
mesh-printability = { path = "mesh/mesh-printability" }
mesh-lattice = { path = "mesh/mesh-lattice" }

# Umbrella crate
mesh = { path = "mesh/mesh" }

# Geometric kernel
cf-geometry = { path = "design/cf-geometry" }
cf-fsu-geometry = { path = "design/cf-fsu-geometry" }
cf-routing = { path = "design/cf-routing" }
cf-routing-tests = { path = "design/cf-routing-tests" }

# Spatial foundation
cf-spatial = { path = "design/cf-spatial" }

# Design kernel.
# `default-features = false` at the workspace level drops the
# `parallel-meshing` feature (rayon + rayon-core + crossbeam-*) for all
# inheriting consumers — required to keep sim-soft under the L0 100-dep
# tier cap. Only cf-design-tests calls `mesh_adaptive_par`; it opts in
# via `features = ["parallel-meshing"]`. cf-design's own `default =
# ["parallel-meshing"]` keeps `cargo test -p cf-design` exercising the
# par_* tests by default.
cf-design = { path = "design/cf-design", default-features = false }
cf-design-tests = { path = "design/cf-design-tests" }

# Cast tooling
cf-cast = { path = "design/cf-cast" }

# Scan→cast bridge — consumed as a LIBRARY by cf-studio-engine
# (`run()` for mold generation + `parse_centerline_from_prep_toml`).
# Also builds the `cf-cast-cli` binary.
cf-cast-cli = { path = "tools/cf-cast-cli" }

# D4 physical-pbit (firmware core + analysis tool)
pbit-fw-core = { path = "firmware/pbit-fw-core" }

# The SDK facade — apps depend on this single crate (see MISSION.md).
# default-features off at the workspace baseline so each consumer opts into
# only the SDK domains it uses (see the facade's `[features]`); members add
# `features = [...]`. A direct `cargo add cortenforge` still gets all domains
# via the facade's own `default`. Only cf-studio-{engine,gui} consume it.
cortenforge = { path = "cortenforge", default-features = false }

# CortenForge Studio — guided scan→cast wizard (see MISSION.md).
# cf-studio-core: headless workflow spine. cf-studio-engine: the
# SDK-boundary orchestrator built on the spine + the SDK crates.
cf-studio-core = { path = "tools/cf-studio-core" }
cf-studio-engine = { path = "tools/cf-studio-engine" }

# Headless mesh-editing core extracted from cf-scan-prep; consumed by the
# cf-scan-prep Bevy tool and (later) cf-studio's live scan editor.
cf-scan-prep-core = { path = "tools/cf-scan-prep-core" }

# Shared cap-plane abstraction
cf-cap-planes = { path = "design/cf-cap-planes" }

# Shared device-design domain types (Phase 1 of the sim-decouple
# refactor — `docs/SIM_DECOUPLE_REFACTOR_PLAN.md` §3). Lifted from
# `tools/cf-device-design/src/main.rs` so cf-device-design (CAD) +
# cf-sim-research (Phase 2+) describe a layered-silicone device the
# same way.
cf-device-types = { path = "design/cf-device-types" }

# Shared device-side geometric primitives (Phase 2.5 of the
# sim-decouple refactor — `docs/archive/SIM_DECOUPLE_PHASE_3_RECON.md`
# §2.5.b-d). Cached SDF + iso extraction + cavity-render helpers +
# clip-plane material/plugin/state, consumed by cf-device-design +
# cf-sim-research.
cf-device-geometry = { path = "design/cf-device-geometry" }

# Sim domain - Layer 0 (Bevy-free)
sim-types = { path = "sim/L0/types" }
sim-core = { path = "sim/L0/core" }
sim-core-benches = { path = "sim/L0/core-benches" }
sim-mjcf = { path = "sim/L0/mjcf" }
sim-urdf = { path = "sim/L0/urdf" }
sim-gpu = { path = "sim/L0/gpu" }
sim-gpu-benches = { path = "sim/L0/gpu-benches" }
sim-ml-chassis = { path = "sim/L0/ml-chassis" }
sim-ml-chassis-benches = { path = "sim/L0/ml-chassis-benches" }
sim-rl = { path = "sim/L0/rl" }
sim-rl-baselines = { path = "sim/L0/rl-baselines" }
sim-thermostat = { path = "sim/L0/thermostat" }
sim-opt = { path = "sim/L0/opt" }
sim-therm-env = { path = "sim/L0/therm-env" }
sim-soft = { path = "sim/L0/soft" }
# Sim domain - Layer 1 (Bevy integration)
sim-coupling = { path = "sim/L1/coupling" }
cf-fsu-model = { path = "sim/L1/fsu-model" }
# Headless sim umbrella (re-exports the spine above) — see sim/sim.
sim = { path = "sim/sim" }
sim-bevy = { path = "sim/L1/bevy" }
sim-ml-chassis-bevy = { path = "sim/L1/ml-chassis-bevy" }
sim-bevy-soft = { path = "sim/L1/sim-bevy-soft" }

# Shared Bevy-0.18 helpers consumed by cf-viewer + sim-bevy + sim-bevy-soft.
cf-bevy-common = { path = "cf-bevy-common" }

# Reusable Bevy brush-painting plugin over `mesh-select`; consumed by
# sim-bevy-soft's paint-faces example (and CortenForge Studio).
cf-mesh-paint = { path = "cf-mesh-paint" }

# cf-viewer library — scene helpers (`RenderScale`, `compute_render_scale`,
# `setup_camera_and_lighting`, `spawn_face_mesh`) shared with
# `tools/cf-scan-prep` per the Stage 2.5 design spec
# (`docs/SCAN_PREP_DESIGN.md` §Architectural decisions §Tool home).
# Library-only consumption; the `cf-view` binary stays out of dependents'
# build graphs.
cf-viewer = { path = "cf-viewer" }

# meshopt-rs — Rust FFI bindings to Arseny Kapoulkine's `meshoptimizer`
# C++ library (battle-tested in Unity, Unreal, Bevy itself). License
# MIT/Apache-2.0.
#
# Originally adopted (Stage 2.5 commit #5) for the Simplify panel's
# boundary-preserving quadric edge collapse decimation. Replaced in
# `tools/cf-scan-prep` 2026-05-26 with `baby_shark` (below) after S1.1
# probe-7 showed `meshopt::simplify_decoder` introduces non-manifold
# edges + duplicate faces on a manifold input (35 each on the workshop
# iter-1 sock-over-capsule scan) which then trips manifold3d-based
# downstream consumers (cf-cast's `apply_mating_transforms`). Retained
# at the workspace level for `cf-device-geometry` + `cf-sim-research`,
# which use other meshopt entry points unrelated to decimation; if
# those later need a decimator they should also switch to baby_shark.
meshopt = "0.6.2"

# baby_shark — pure-Rust geometry processing. Manifold-preserving
# incremental QEM edge decimator. Replaces meshopt::simplify_decoder
# in `tools/cf-scan-prep` per S1.1 probe-8 (2026-05-26): baby_shark's
# `EdgeDecimator` produces zero non-manifold edges + zero duplicate
# faces on the workshop iter-1 sock-over-capsule scan where meshopt
# produced 35 + 35. Costs ~12× wall-clock (38s vs 3s for the iter-1
# regen) — acceptable for cf-scan-prep's interactive one-shot save
# flow. License MIT.
baby_shark = "0.3"

# Test/dev build speed: optimize the geometry hot path so the debug test
# suite isn't dominated by unoptimized marching-cubes.
#
# Why both profiles: the MC grind lives in `mesh-offset`
# (`marching_cubes`/`ScalarGrid`) + the per-sample SDF eval in
# `cf-design`/`cf-cast`. Under `cargo test`, the crate-under-test uses the
# `test` profile but its DEPENDENCIES build under `dev` — so `mesh-offset`
# (a dependency) needs `[profile.dev]` while the cf-cast test target needs
# `[profile.test]`. Setting both covers the whole hot path. Measured pain:
# `cargo test -p cf-cast --lib` ran ~27 min unoptimized (the multi-layer
# `export_molds_v2_*` MC tests), and `xtask grade`'s `cargo test` is
# debug too; the g7/g9 MC probes compound it.
#
# `debug-assertions` + `overflow-checks` stay ON, so this is NOT
# `--release`: it changes neither assertion semantics (no `debug_assert!`
# is silenced) nor FP results. Rust/LLVM apply no fast-math (no FP
# reassociation/contraction) at any opt-level, so f64 / marching-cubes
# output is bit-identical across opt-levels on a given target — the
# crate's bit-exact gates (`f4_*_bit_precise_flat`,
# `pin_cylinder_mesh_is_bit_equal_across_pieces`, `pour_mass_*_bit_exact`)
# verify this. opt-level 2 (not 3) keeps incremental recompiles reasonable
# for the optimization the MC loops actually need.
[profile.dev]
opt-level = 2

[profile.test]
opt-level = 2
