[package]
name = "sim-simd"
description = "SIMD-optimized math primitives for physics simulation hot paths"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0"

[dependencies]
# Matrix / vector types that SIMD kernels accelerate on hot paths
nalgebra = { workspace = true }

[dev-dependencies]
# Float-tolerance assertions comparing scalar vs SIMD kernel outputs
approx = { workspace = true }
# Property-based tests exercising SIMD kernels against random inputs
proptest = { workspace = true }
# Random input generation for SIMD kernel correctness fuzzing
rand = { workspace = true }

# criterion benches live in the sibling `sim-simd-benches` crate
# (L0 plan §4.2: keeps criterion + plotters out of sim-simd's dev-graph).

[lints]
workspace = true
