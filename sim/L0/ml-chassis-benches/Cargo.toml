[package]
name = "sim-ml-chassis-benches"
description = "Criterion benchmarks for sim-ml-chassis (extract / apply / VecEnv throughput)"
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L1"

[dependencies]
# Criterion harness for bridge_benchmarks
criterion = { workspace = true }
# Pendulum + hinge-chain bench fixtures (test_fixtures::pendulum_bench, hinge_chain),
# plus BatchSim / Model used directly in bench setup
sim-core = { workspace = true, features = ["test-fixtures"] }
# Crate under bench: ActionSpace, Environment, ObservationSpace, SimEnv,
# Tensor, VecEnv, plus the Competition runner and the reaching-6dof stock
# task fixture (test-fixtures) used by competition_benchmarks.
sim-ml-chassis = { workspace = true, features = ["test-fixtures"] }

[[bench]]
name = "bridge_benchmarks"
harness = false

[[bench]]
name = "competition_benchmarks"
harness = false

[lints]
workspace = true
