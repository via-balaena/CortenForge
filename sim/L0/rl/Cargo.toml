[package]
name = "sim-rl"
description = "Generic RL baselines (CEM, REINFORCE, PPO, TD3, SAC) — the control group for every CortenForge competition"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0-integration"

[dependencies]
# RNG traits — StdRng + SeedableRng for per-epoch sampling in all 5 algorithms
rand             = { workspace = true }
# BatchSim for FK target computation + canonical reaching-arm Model fixtures
# backing the stock task factories in tasks.rs (test-fixtures feature). Per
# L0 plan §3.2, fixture-backed task factories keep sim-rl's release graph
# free of the sim-mjcf → mesh-io → zip chain so downstream dev-graphs stay
# clean.
sim-core         = { workspace = true, features = ["test-fixtures"] }
# Algorithm chassis — Algorithm trait, VecEnv, Policy, BestTracker, ArtifactError, ...
sim-ml-chassis   = { workspace = true }

[dev-dependencies]
# Float tolerance assertions in tests/competition.rs
approx           = { workspace = true }
# JSON round-trip checkpoint test in tests/best_tracker_cem_integration.rs
serde_json       = { workspace = true }

[lints]
workspace = true
