[package]
name = "sim-urdf"
description = "URDF robot description parser for physics simulation"
keywords = ["urdf", "robotics", "physics", "simulation", "parser"]
categories = ["parsing", "simulation", "science::robotics"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0-io"

[dependencies]
# Physics Model / Data target of URDF -> MJCF -> Model conversion
sim-core = { workspace = true }
# MJCF builder reused as the URDF converter's intermediate representation
sim-mjcf = { workspace = true }
# Matrix / vector / rotation primitives for joint-frame composition
nalgebra = { workspace = true }
# Streaming XML parser for the URDF document tree
quick-xml = { workspace = true }
# Derive macros for the URDF parse / validation error enum
thiserror = { workspace = true }
# Optional Serialize / Deserialize derives for the URDF IR types
serde = { workspace = true, optional = true }

[dev-dependencies]
# Float-tolerance assertions for joint-frame / inertia unit tests
approx = { workspace = true }

[features]
default = []
serde = ["dep:serde", "sim-core/serde"]

[lints]
workspace = true
