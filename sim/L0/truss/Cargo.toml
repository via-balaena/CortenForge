# sim-truss — Layer-0 linear-elastic truss solver. Full story in src/lib.rs.

[package]
name = "sim-truss"
description = "Linear-elastic pin-jointed truss solver: compliance and analytic area-sensitivity"
keywords = ["truss", "finite-element", "compliance", "structural", "sensitivity"]
categories = ["algorithms", "mathematics", "science"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0"

[dependencies]
# Linear algebra: node coordinates (SVector), the global stiffness matrix
# (DMatrix), and the Cholesky factorization used for the SPD solve.
nalgebra = { workspace = true }
# Derive macros for the crate's error type.
thiserror = { workspace = true }

[dev-dependencies]
# Approximate float equality for the closed-form and finite-difference gates.
approx = { workspace = true }

[lints]
workspace = true
