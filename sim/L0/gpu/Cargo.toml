[package]
name = "sim-gpu"
description = "GPU-accelerated physics pipeline for CortenForge simulation"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0-io"

[dependencies]
# GPU device, buffers, and compute pipelines for the physics pipeline
wgpu = { workspace = true }
# Pod / Zeroable derives for WGSL-mirroring uniform / storage structs
bytemuck = { workspace = true }
# block_on executor so CPU-side code can await wgpu futures synchronously
pollster = { workspace = true }
# Engine-side model/state source (Model / Data) for building GPU buffers
sim-core = { workspace = true }
# Log facade used by wgpu and adapter / device selection diagnostics
log = "0.4"

[dev-dependencies]
# Matrix / vector primitives for CPU-oracle math in the GPU-vs-CPU test suite
nalgebra = { workspace = true }
# SDF primitives for building SDF-collision test fixtures
cf-geometry = { workspace = true }
# Shared joint×topology conformance fixtures (dynamics_conformance_matrix) so the
# GPU-vs-CPU dynamics suite draws from the SAME model list as sim-core's CPU
# transition harness — no drift. Feature-unions with the normal sim-core dep.
sim-core = { workspace = true, features = ["test-fixtures"] }

[lints]
workspace = true
