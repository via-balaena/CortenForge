[package]
name = "sim-core"
description = "Physics simulation core: Model/Data architecture, MuJoCo pipeline, collision, integration"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0"

[dependencies]
# Shared geometry kernel: AABBs, SDFs, convex hulls used by collision
cf-geometry = { workspace = true }
# Foundation types: BodyId, Pose, SimConfig
sim-types = { workspace = true }
# SIMD kernels for hot-path math (contact, integration)
sim-simd = { workspace = true }
# Model / Data matrices, spatial algebra, collision primitives
nalgebra = { workspace = true }
# Derive macros for solver / collision error enums
thiserror = { workspace = true }
# Lightweight logging facade for `mj_warning` + auto-reset error /
# RK4-step2 / mesh-collision fallback warn sites. No tracing-subscriber
# is installed workspace-wide, so the `tracing` crate's structured-
# spans surface was paying full transitive cost (tracing +
# tracing-attributes + tracing-core) for output that already goes to
# /dev/null. Swapped to `log` to drop those deps from sim-soft's tree
# (sim-soft transitively depends on sim-core, hits the L0 100-dep cap,
# and already pulls `log` via parry3d → ena — so the swap is dep-
# neutral for sim-soft's distinct count). Other L0 crates (mesh-shell,
# mesh-repair, mesh-measure, sim-mjcf) still use `tracing` directly;
# this is sim-core-scoped, not a workspace-wide standardization.
log = "0.4"
# Optional Serialize / Deserialize for Model / Data snapshots
serde = { workspace = true, optional = true }
# Optional data-parallel solvers behind the `parallel` feature
rayon = { workspace = true, optional = true }

[dev-dependencies]
# Float-tolerance assertions across solver / integration / collision tests
approx = { workspace = true }
# Random input generation for collision and solver stress tests
rand = { workspace = true }
# JSON fixtures and golden files for integration tests
serde_json = { workspace = true }

# criterion benches live in the sibling `sim-core-benches` crate
# (L0 plan §4.2: keeps criterion + plotters out of sim-core's dev-graph).

[features]
default = []
parallel = ["dep:rayon"]
serde = ["dep:serde", "serde/rc", "cf-geometry/serde", "sim-types/serde", "nalgebra/serde-serialize"]
gpu-internals = []  # Exposes internal helpers for sim-gpu. No deps.
# Canonical test-model fixtures (pendulums, particles, reaching arms, chains)
# constructed in pure Rust via existing Model factory APIs + helpers in
# `test_fixtures::builders`. Used by downstream L0-pure crates
# (sim-thermostat, sim-ml-chassis, sim-opt) as a dev-dep replacement for
# `sim-mjcf`-loaded XML, and by `sim-rl` as a release-dep replacement so its
# stock task factories (reaching_2dof, etc.) don't pull `sim-mjcf` into the
# release graph. See L0 plan §3.2.
test-fixtures = []

[lints]
workspace = true
