[package]
name = "sim-conformance-tests"
description = "MuJoCo conformance tests and integration tests for CortenForge simulation crates"
version.workspace = true
edition.workspace = true
license.workspace = true
publish = false

# Coverage criterion N/A: this crate has no src/ at all — only [[test]]
# integration targets (mujoco_conformance, integration). --lib errors
# with "no library targets found".
[package.metadata.cortenforge]
grading_profile = "integration-only"

[dependencies]
# MJCF loader under test in the conformance suite
sim-mjcf = { path = "../mjcf" }
# URDF loader under test in the conformance suite
sim-urdf = { path = "../urdf" }
# Physics Model / Data being stepped and compared against MuJoCo
sim-core = { path = "../core" }
# BodyId / Pose primitives shared by fixtures and assertions
sim-types = { path = "../types" }
# Matrix / vector primitives for state comparison and fixture construction
nalgebra = { workspace = true }
# Float-tolerance assertions for conformance deltas vs MuJoCo reference
approx = { workspace = true }

[dev-dependencies]
# PR 1b regression test — parallel_matches_sequential_with_langevin
# exercises BatchSim::new_per_env with a LangevinThermostat stack.
sim-thermostat = { path = "../thermostat" }

[[test]]
name = "mujoco_conformance"
path = "mujoco_conformance/mod.rs"

[[test]]
name = "integration"
path = "integration/mod.rs"

[features]
default = []
# Forwards to sim-core's parallel feature so the PR 1b regression
# test can exercise both the rayon par_iter_mut step_all path and
# the sequential fallback from a single test-crate invocation.
parallel = ["sim-core/parallel"]
