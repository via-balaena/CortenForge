[package]
name = "sim-thermostat"
description = "Langevin thermostat + passive-component framework for thermodynamic computing on CortenForge"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0"

[dependencies]
# Simulation engine — Model, Data, callback hooks
sim-core    = { workspace = true }
# Linear algebra — DVector for per-DOF damping/noise
nalgebra    = { workspace = true }
# RNG traits — Rng/SeedableRng used by GibbsSampler
rand        = { workspace = true }
# Deterministic CSPRNG — used by GibbsSampler (LangevinThermostat
# under C-3 reaches ChaCha8 through its own `prf` module rather than
# `rand_chacha`, but gibbs.rs is an independent runtime consumer).
rand_chacha = { workspace = true }

[dev-dependencies]
# Enables sim-core's `test-fixtures` feature for cfg(test) Model factories
# (sho_1d, ratchet, stochastic_resonance, bistable_chain, bistable_1dof,
# free_body_diag, hinge_chain_2dof_inertial, ising_pair, single_slide).
# Replaces the prior sim-mjcf dev-dep per L0 plan §3.2 — keeps the
# dev-graph free of the sim-mjcf → mesh-io → zip chain.
sim-core = { workspace = true, features = ["test-fixtures"] }
# ML chassis — RL environment primitives for D1b/D2b baseline tests
sim-ml-chassis = { workspace = true }
# RL baselines — Cem/Reinforce/Ppo/Sac/Td3 for D1c/D1d/D2c training tests.
# sim-rl is now fixture-backed too (its release graph no longer pulls
# sim-mjcf — see L0 plan §3.2), so this dev-dep doesn't reintroduce the
# mjcf chain transitively.
sim-rl = { workspace = true }
# Normal/Uniform distributions — used by d1b/d1c test files for
# Uniform action sampling and by prf.rs cross-verification tests.
# After the C-3 rewrite of LangevinThermostat, no src/ target uses
# rand_distr.
rand_distr = { workspace = true }

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
# wasm_js backend opt-in for getrandom (transitively pulled via
# rand_chacha → rand_core). Paired with the workspace `.cargo/config.toml`
# rustflag; native builds are unaffected by the target-conditional block.
getrandom = { workspace = true }

[lints]
workspace = true
