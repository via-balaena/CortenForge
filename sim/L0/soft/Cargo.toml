[package]
name = "sim-soft"
description = "Soft-body walking skeleton — seven-trait surface over faer + chassis tape. Phase B fills in bodies."
keywords = ["physics", "simulation", "soft-body", "fem", "differentiable"]
categories = ["simulation", "science", "mathematics"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

# Grader F.3 opt-in: the six load-bearing invariants (I-1..I-6) are all
# tested in `tests/*.rs` per scope §6 test-harness commitment — the only
# inline `#[cfg(test)] mod tests` covers two `autograd_ops` VJP helpers
# (`IndexOp`, `DivOp`) which aren't on the invariant surface. `cargo llvm-cov
# --lib` coverage is structurally pinned at ~12% because the unimplemented
# Phase-B/C/E stubs are unreachable until their phases land. Coverage
# re-enters when Phase B fills in non-stub bodies. Matches sim-therm-env /
# sim-tests precedent. Full reasoning in scope §7 item 1 + §13 SD-5.
[package.metadata.cortenforge]
tier = "L0"
tier_up_features = { gpu-probe = "L0-io" }
grading_profile = "integration-only"

[features]
default = []
# I-6b probe: opt-in wgpu build-graph tractability + buffer round-trip test.
# NOT a Phase-E GPU feature flag — real chassis-GPU work (B.5) will land
# under a separate `gpu` feature. Locked to the round-trip test in
# `tests/invariant_6_gpu_probe.rs`. See scope §1 I-6 clarification.
gpu-probe = ["dep:wgpu", "dep:bytemuck", "dep:pollster"]

[dependencies]
# Chassis tape, VjpOp, Tensor<f64> — shipped in PR #213.
sim-ml-chassis = { workspace = true }
# Sdf trait — sim-soft's `sdf_bridge::Sdf` re-exports `cf_geometry::Sdf`
# so cf-design's design surface (`Solid`), mesh-sdf's adapter impls
# (`Signed<D, S>`, `CachedGridSdf`), and sim-soft's simulation surface
# (penalty contact, BCC stuffing, MaterialField) all speak the same
# trait without an adapter. Trait method receivers are `Point3<f64>`;
# sim-soft call sites adapt at the boundary via `Point3::from(vec3)`.
# See inventory Q5 for the architecture decision. The trait moved from
# cf-design to cf-geometry (sim-soft's L0 geometric kernel) so a
# foundational solver crate no longer depends on the design-side kernel
# that uses it — closing the L0 100-dep tier cap violation surfaced in
# PR #249.
cf-geometry = { workspace = true }
# `AttributedMesh` + `IndexedMesh` for the `viz` module's FEM-grade
# visualization helpers (`boundary_surface`, `slab_cut`). First
# sim-soft consumer; before F1.1 viz lift the AttributedMesh emit
# lived in example crates only. Re-exports `cf_geometry::IndexedMesh`,
# so one dep covers both types the viz API surfaces.
mesh-types = { workspace = true }
# `ScalarGrid` + `marching_cubes` + `MarchingCubesConfig` for the
# F2.1 `design_surface` and F2.3b `design_scene` viz helpers.
# mesh-offset's marching_cubes extracts the iso-0 surface of a design
# SDF as a triangulated 3D mesh; sim-soft wraps it with barycentric
# scalar interp from the analysis tet mesh (`design_surface`) and
# uses it geometry-only for contact-primitive overlay
# (`design_scene`). Same L0 tier as sim-soft.
mesh-offset = { workspace = true }
# Dense small matrices for per-Gauss-point Material + per-element Tet4 locals
# (5 existing L0 consumers at 0.34.2 — not greenfield).
nalgebra = { workspace = true }
# Sparse SPD factor-on-tape (Llt<I, f64>) + sparse CSR assembly.
# Greenfield — this is the first workspace crate to depend on faer.
# Round-6 determinism: disable `rayon` to keep solves single-threaded
# (rayon work-stealing reorders floating-point reductions bit-non-
# deterministically, violating γ Ch 00 determinism-in-θ on I-5). For
# skeleton's 9-DOF system, rayon would provide no speedup anyway.
# `std` + `sparse-linalg` is the minimum that exposes Llt<I, f64> +
# solve_in_place_with_conj. All features remain pure Rust.
faer = { version = "0.24", default-features = false, features = ["std", "sparse-linalg"] }

# GPU probe deps — feature-gated via `gpu-probe`. Skeleton default build
# resolves with zero wgpu / bytemuck / pollster in the graph (scope §1 I-6a).
wgpu = { workspace = true, optional = true }
bytemuck = { workspace = true, optional = true }
pollster = { workspace = true, optional = true }

[dev-dependencies]
# 5-digit gradcheck tolerance assertions (Phase-B tests).
approx = { workspace = true }
# Parse the vendored Marechal-2021 measured-tensile reference asset
# (`tests/assets/marechal_2021/`) for the M1 uniaxial fidelity gate.
serde_json = { workspace = true }

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
# wasm_js backend opt-in for getrandom (transitively pulled via
# rand_chacha → rand_core through sim-ml-chassis). Paired with the
# workspace `.cargo/config.toml` rustflag; native builds are unaffected
# by the target-conditional block.
getrandom = { workspace = true }

[lints]
workspace = true
