[package]
name = "sim-opt"
description = "Gradient-free optimization algorithms and rematch analysis machinery"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0"

[dependencies]
# RNG traits — StdRng + SeedableRng for SA/richer-SA/PT per-epoch sampling
rand = { workspace = true }
# Derive macros for PolicyArtifact + BootstrapCi + RematchOutcome serialization
serde = { workspace = true }
# Algorithm chassis — Algorithm trait, VecEnv, Policy, Competition, ArtifactError, ...
sim-ml-chassis = { workspace = true }
# SR task primitives used by analysis.rs (REMATCH_TASK_NAME, prf::splitmix64 helpers)
sim-thermostat = { workspace = true }
# Error types for ArtifactError construction in SA/richer-SA/PT
thiserror = { workspace = true }

[dev-dependencies]
# JSON artifact emit for the common_smoke verdict round-trip — libtest's
# default capture policy swallows eprintln! verdicts on test pass, so the
# helper persists TwoMetricOutcome to target/rematch_verdicts/ via
# std::fs::write (unaffected by libtest capture).
serde_json = { workspace = true }
# Exposes ml-chassis's `reaching_2dof` stock task to the src/* unit-test mods
# (algorithm.rs / richer_sa.rs / parallel_tempering.rs), which need a
# realistic env to exercise the Algorithm trait surface. ml-chassis is already
# a regular dep above (no feature); this dev-dep turns on `test-fixtures` for
# test builds only. Replaces the prior sim-rl dev-dep — the RL-baseline
# fixtures that needed sim-rl moved to the `sim-rl-baselines` crate, so
# sim-opt no longer carries a backwards dev-dep on the higher-tier sim-rl.
sim-ml-chassis = { workspace = true, features = ["test-fixtures"] }

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
# wasm_js backend opt-in for getrandom (transitively pulled via
# rand_chacha → rand_core). Paired with the workspace `.cargo/config.toml`
# rustflag; native builds are unaffected by the target-conditional block.
getrandom = { workspace = true }

[lints]
workspace = true
