[package]
name = "sim-opt"
description = "Gradient-free optimization algorithms and rematch analysis machinery"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0"

[dependencies]
# RNG traits — StdRng + SeedableRng for SA/richer-SA/PT per-epoch sampling
rand = { workspace = true }
# Derive macros for PolicyArtifact + BootstrapCi + RematchOutcome serialization
serde = { workspace = true }
# Algorithm chassis — Algorithm trait, VecEnv, Policy, Competition, ArtifactError, ...
sim-ml-chassis = { workspace = true }
# SR task primitives used by analysis.rs (REMATCH_TASK_NAME, prf::splitmix64 helpers)
sim-thermostat = { workspace = true }
# Error types for ArtifactError construction in SA/richer-SA/PT
thiserror = { workspace = true }

[dev-dependencies]
# Float tolerance assertions across analysis.rs unit tests
approx = { workspace = true }
# DVector for rematch fixtures' Model state threading + the `test-fixtures`
# feature, which backs the SR Model used by d2c_sr_rematch* fixtures
# (replaces the prior sim-mjcf dev-dep per L0 plan §3.2 — keeps the
# dev-graph free of the sim-mjcf → mesh-io → zip chain). Note: the
# src/* test mods (algorithm.rs, richer_sa.rs, parallel_tempering.rs)
# use sim_rl::reaching_2dof, which is itself fixture-backed now.
sim-core = { workspace = true, features = ["test-fixtures"] }
# RL baselines — d2c rematch fixtures use Cem/CemHyperparams as the control arm.
# sim-rl is now fixture-backed (its release graph no longer pulls
# sim-mjcf — see L0 plan §3.2), so this dev-dep doesn't reintroduce the
# mjcf chain transitively.
sim-rl = { workspace = true }

[lints]
workspace = true
