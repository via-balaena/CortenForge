[package]
name = "sim-therm-env"
description = "ThermCircuitEnv: typed builder producing SimEnv/VecEnv from thermodynamic circuit descriptions"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

# Coverage criterion N/A: env wrapper is exercised by integration tests
# (phase2.rs / phase3.rs here; the RL-baseline fixtures experiment_*/
# ising_chain/kramers_* moved to the sim-rl-baselines crate); src/ has
# no inline #[cfg(test)] modules so --lib coverage reports 0.0%.
[package.metadata.cortenforge]
tier = "L0-integration"
grading_profile = "integration-only"

[dependencies]
# Model/Data/DVector/StepError for builder thermostat wiring + Environment impl
sim-core = { workspace = true }
# MJCF parsing: load_model in builder.prepare() + MjcfError in ThermCircuitError
sim-mjcf = { workspace = true }
# LangevinThermostat + PassiveComponent/PassiveStack for the builder's physics wiring
sim-thermostat = { workspace = true }
# Environment/SimEnv/VecEnv/ActionSpace/ObservationSpace/Tensor for the env wrapper + builder
sim-ml-chassis = { workspace = true }
# Derive macro for ThermCircuitError (error.rs)
thiserror = { workspace = true }

[dev-dependencies]
# Float tolerance assertions across phase2/phase3 unit tests
approx = { workspace = true }
# NOTE: the RL-baseline (sim-rl) and gradient-free-optimizer (sim-opt)
# fixtures — experiment_1/experiment_4/ising_chain/kramers_* — moved to the
# `sim-rl-baselines` crate, so therm-env no longer dev-deps sim-rl or sim-opt.
# That severs the therm-env → sim-opt → sim-rl transitive edge, keeping
# behaviour-neutral sim-rl changes out of therm-env's CI affected-closure.

[lints]
workspace = true
