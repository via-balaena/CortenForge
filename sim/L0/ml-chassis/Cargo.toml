[package]
name = "sim-ml-chassis"
description = "Algorithm chassis: traits, primitives, Competition runner — the foundation every CortenForge algorithm crate bolts onto"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[package.metadata.cortenforge]
tier = "L0"

[dependencies]
# Linear algebra — DVector / DMatrix used throughout policy forward passes
nalgebra    = { workspace = true }
# Generic numeric traits (Float, Zero, One, NumCast) — used by Tensor<T>
num-traits  = { workspace = true }
# RNG traits — Gaussian noise, Xavier init, stochastic policy sampling
rand        = { workspace = true }
# Serialization for PolicyArtifact and TrainingCheckpoint
serde       = { workspace = true }
# JSON format for checkpoint/artifact persistence round-trips
serde_json  = { workspace = true }
# Core sim types — BatchSim, Model, Data bridged into SimEnv / VecEnv
sim-core    = { workspace = true }
# Error types for env / space / tensor / artifact error enums
thiserror   = { workspace = true }

[dev-dependencies]
# Float tolerance assertions in tests (assert_relative_eq!)
approx      = { workspace = true }
# Enables sim-core's `test-fixtures` feature for cfg(test) Model factories
# (pendulums, reaching arms, hinge chain, cart-pole, builder-test minimal)
# used across env/vec_env/rollout/space/task/competition tests.
# Replaces the prior sim-mjcf dev-dep per L0 plan §3.2 — keeps chassis's
# dev-graph free of the sim-mjcf → mesh-io → zip chain so `sim-soft`'s
# transitive graph stays pure-Rust. (Cargo unions features from regular
# and dev deps, so the regular sim-core dep above without the feature is
# still pulled in for release builds.)
sim-core    = { workspace = true, features = ["test-fixtures"] }

# criterion benches live in the sibling `sim-ml-chassis-benches` crate
# (L0 plan §4.2: keeps criterion + plotters out of chassis's dev-graph).

[target.'cfg(all(target_arch = "wasm32", target_os = "unknown"))'.dependencies]
# wasm_js backend opt-in for getrandom (transitively pulled via
# rand_chacha → rand_core). Paired with the workspace `.cargo/config.toml`
# rustflag; native builds are unaffected by the target-conditional block.
getrandom = { workspace = true }

[lints]
workspace = true
