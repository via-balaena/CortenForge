[package]
name = "sim-ml-chassis"
description = "Algorithm chassis: traits, primitives, Competition runner — the foundation every CortenForge algorithm crate bolts onto"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true

[features]
bevy = ["dep:bevy_ecs"]

[dependencies]
# ECS integration for Bevy consumers (gated behind `bevy` feature)
bevy_ecs    = { version = "0.18", optional = true }
# Linear algebra — DVector / DMatrix used throughout policy forward passes
nalgebra    = { workspace = true }
# Generic numeric traits (Float, Zero, One, NumCast) — used by Tensor<T>
num-traits  = { workspace = true }
# RNG traits — Gaussian noise, Xavier init, stochastic policy sampling
rand        = { workspace = true }
# Serialization for PolicyArtifact and TrainingCheckpoint
serde       = { workspace = true }
# JSON format for checkpoint/artifact persistence round-trips
serde_json  = { workspace = true }
# Core sim types — BatchSim, Model, Data bridged into SimEnv / VecEnv
sim-core    = { workspace = true }
# Error types for env / space / tensor / artifact error enums
thiserror   = { workspace = true }

[dev-dependencies]
# Float tolerance assertions in tests (assert_relative_eq!)
approx      = { workspace = true }
# Benchmark harness for benches/bridge_benchmarks.rs
criterion   = { workspace = true }
# MJCF loading for cfg(test) fixtures across env/vec_env/rollout/space/task/
# competition tests. Moved to dev-deps as part of SD-5 (chassis → mjcf
# severed from release graph): stock task factories now live in
# `sim-rl::tasks`, keeping `sim-soft`'s transitive graph free of
# `mesh-io → zip → zstd-sys → cc`. Chassis keeps its own trivial stock-
# task fixtures under `#[cfg(test)] mod test_stock_tasks` (avoiding a
# cyclic sim-rl dev-dep that would resolve TaskConfig to a distinct type).
sim-mjcf    = { workspace = true }

[[bench]]
name = "bridge_benchmarks"
harness = false

[lints]
workspace = true
