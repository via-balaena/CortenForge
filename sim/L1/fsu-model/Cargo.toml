[package]
name = "cf-fsu-model"
description = "Assembled Functional Spinal Unit model ‚Äî tet-meshes the real intervertebral disc, bonds it between two rigid vertebra endplates (sim-coupling), and drives its quasi-static flexion/extension deformation. The live-simulation sibling of cf-fsu-geometry's static recipes."
keywords = ["spine", "fsu", "disc", "biomechanics", "simulation"]
categories = ["science", "simulation"]
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

# Bonds the soft FEM disc (sim-soft) to two rigid endplates via the sim-coupling
# keystone (BondedSandwich), so its dependency closure inherits sim-soft's
# faer/gemm stack ‚Äî which blows every L0 tier's 200-dep cap. L1 (the keystone's
# own tier, unbounded cap) is the only legal home.
[package.metadata.cortenforge]
tier = "L1"

[lints]
workspace = true

[dependencies]
# `IndexedMesh` / `Aabb` ‚Äî the disc surface mesh + its bounding box.
cf-geometry = { workspace = true }
# `oracle` ‚Äî the exact signed-distance field the tet-mesher samples.
cf-fsu-geometry = { workspace = true }
# `BondedSandwich` ‚Äî the two-way soft‚Üîrigid disc bond (the keystone).
sim-coupling = { workspace = true }
# `SdfMeshedTetMesh` / `MeshingHints` / `MaterialField` ‚Äî tet-mesh the disc from its field.
sim-soft = { workspace = true }
# `load_model` ‚Äî build the two-box disc scene + the coupled ligament/bushing model from MJCF.
sim-mjcf = { workspace = true }
# `Model` / `Pose` / `SdfGrid` / `ShapeConcave` / `sdf::compute_shape_contact` ‚Äî the coupled
# FSU model (hinge bushing + tendons) + the facet SDF-penalty contact.
sim-core = { workspace = true }
# `Point3` / `Vector3` / `UnitQuaternion` ‚Äî the frame + flexion math.
nalgebra = { workspace = true }
# `Result` + context/`bail!` for the fallible build path.
anyhow = { workspace = true }
