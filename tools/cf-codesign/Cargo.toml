[package]
name = "cf-codesign"
description = "Co-design optimizer (mission connective-tissue #2): gradient-based optimization over the differentiable soft‚Üîrigid coupling ‚Äî tune a soft-body design parameter so a rigid-side outcome hits a target. Consumes the keystone gradient (sim-coupling) and reuses the chassis Adam optimizer."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

# Workspace tool composing the sim stack; no `[package.metadata.cortenforge]`
# tier block ‚Äî tier metadata is for sim L0/L1 libraries, not tools (matches
# `tools/cf-device-design` / `tools/cf-mjcf-emit` precedent).

[dependencies]
# The keystone gradient substrate: the differentiable soft‚Üîrigid coupling.
sim-coupling = { path = "../../sim/L1/coupling" }
# Builds the rigid side (a sim-core Model) from a minimal MJCF string.
sim-mjcf = { path = "../../sim/L0/mjcf" }
# The rigid engine + its analytic parameter-Jacobian channel (system-ID): the
# `‚àÇ(trajectory)/‚àÇ(joint damping)` gradient that drives sim-to-real calibration.
sim-core = { path = "../../sim/L0/core" }
# The gradient optimizer (Adam) ‚Äî reused, not reinvented (sim-opt is gradient-free).
sim-ml-chassis = { workspace = true }
# The linear truss (bar-element) solver ‚Äî the structural forward model behind the
# lattice design axis: per-strut areas are the design variables in `LatticeTarget`,
# and its analytic compliance sensitivity `‚àÇC/‚àÇA‚Çë` is the gradient consumed here.
sim-truss = { workspace = true }
# The differentiable routing primitive (centerline `Path`) ‚Äî the geometry design
# axis: a route's control points are the design variables in `RouteTarget`.
cf-routing = { workspace = true }
# Analytic signed-distance bodies (`Solid`) the route is optimized against, plus
# the workspace-wide `Sdf` trait a route/conduit body is generalized over.
# `workspace = true` inherits the `default-features = false` tier cap (no
# parallel-meshing/rayon ‚Äî we only need `Solid::capsule`/`mesh`/`evaluate`).
cf-design = { workspace = true }
# Mesh signed-distance fields: lets a route/conduit body be a real triangle mesh
# (a grid-cached, trilinearly-interpolated `CachedGridSdf`) ‚Äî e.g. an anatomical
# vertebra ‚Äî as well as an analytic `Solid`. Both satisfy `cf_design::Sdf`.
mesh-sdf = { workspace = true }
# `IndexedMesh` container + `Aabb`/`Bounded` for the mesh SDF's grid bounds.
mesh-types = { workspace = true }
# Error enum for the mesh-body builder (matches the crate's `InfeasibleDesign` style).
thiserror = { workspace = true }
# Point/vector types for the route control points.
nalgebra = { workspace = true }

[dev-dependencies]
# Reads the EMPS actuator benchmark's MATLAB v5 (.mat, zlib-compressed) data for
# the `emps_sim_to_real` example ‚Äî a pure-Rust reader so the sim-to-real example
# stays self-contained (fetch-not-vendor). Example-only; not in the library graph.
matfile = "0.5"
# Loads + weld-repairs a real vertebra STL (via `$CF_L4_STL`) for the env-gated
# anatomy conduit gate ‚Äî the proven FSU recipe, reused rather than duplicated.
# Test-only: the library's `mesh_body` takes any `IndexedMesh`, source-agnostic.
cf-fsu-geometry = { workspace = true }
