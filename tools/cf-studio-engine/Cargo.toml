[package]
name = "cf-studio-engine"
description = "SDK-boundary orchestrator for CortenForge Studio — executes the guided scan→cast workflow steps by calling the SDK crates. Built on the headless cf-studio-core spine; consumed by the cf-studio CLI + the Slint GUI. See MISSION.md."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

# Cendrillon app stack — App tier (the dependency sink): may depend on the SDK,
# but no SDK crate may depend on it (enforced by grade Layer Integrity).
# See MISSION.md and the app-vs-SDK boundary.
[package.metadata.cortenforge]
tier = "App"

# This is the layer that knows about the SDK crates, so the spine
# (cf-studio-core) can stay pure + fast to build/test. Same strict lint
# posture as the spine: forbid unsafe, deny the panicking shortcuts.
[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"

[dependencies]
# The workflow spine — `DesignDraft` and the other step artifacts.
cf-studio-core = { workspace = true }
# The SDK — through the facade. The engine compiles against this one stable
# contract (see MISSION.md / the app-vs-SDK boundary) instead of the individual
# crates. Reached as `cortenforge::<crate>`: cf-device-types (device types),
# mesh-io[threemf]/mesh-types/mesh-repair (mesh), cf-cast-cli/cf-cast/
# cf-cap-planes (cast pipeline + prep parsers + cure data), cf-scan-prep-core
# (scan-prep algorithms), cf-design (SDF kernel). Headless — no Bevy.
cortenforge = { workspace = true }
# `UnitQuaternion` / `Vector3` — the PCA-orient + recenter transform state
# the EditSession accumulates for the .prep.toml provenance.
nalgebra = { workspace = true }
# Typed boundary errors (errors are values; no unwrap in library code).
thiserror = { workspace = true }
