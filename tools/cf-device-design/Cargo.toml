[package]
name = "cf-device-design"
description = "Layered-silicone-device design + testing suite — composes cleaned scan + outer envelope + cavity + layers + features into a device design TOML"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

# Workspace tool; no `[package.metadata.cortenforge]` block — tier
# metadata is for sim L0/L1 libraries, not workspace tools (matches
# `tools/cf-scan-prep` + `tools/cf-cast-cli` precedent).

[[bin]]
name = "cf-device-design"
path = "src/main.rs"

[dependencies]
# cf-viewer library — scene helpers (`RenderScale`, `compute_render_scale`,
# `scale_aabb`, `setup_camera_and_lighting`, `spawn_face_mesh`) lifted at
# Stage 2.5 commit #2 for cross-tool reuse. cf-device-design is the third
# consumer alongside cf-view (binary) + cf-scan-prep.
cf-viewer = { workspace = true }

# Shared Bevy helpers — `UpAxis::PlusZ` (cast-frame demolding axis
# convention), the `OrbitCameraPlugin` system set wired by
# `cf_bevy_common::prelude::*`.
cf-bevy-common = { workspace = true }

# STL loader for the cleaned scan input (cf-scan-prep output).
mesh-io = { workspace = true }
# `IndexedMesh` + `Bounded::aabb()` for the scan-info readout +
# bounding-region derivation.
mesh-types = { workspace = true }
# `weld_vertices` (vertex deduplication before mesh decimation) +
# `remove_unreferenced_vertices` (cleanup after decimation). Used by
# the outer-envelope offset-surface wireframe (slice 3 polish 10) to
# reduce the 3.3 M-face iter-1 scan to a tractable ~3 K-face proxy
# for rendering.
mesh-repair = { workspace = true }
# `simplify_decoder` for the outer-envelope offset-surface
# decimation. Same crate cf-scan-prep uses for its Simplify panel;
# direct dep here because cf-device-design needs a more aggressive
# decimation (target ~3 K faces vs cf-scan-prep's 200 K).
meshopt = { workspace = true }
# `Point3` + `Vector3` for the centerline polyline parsing.
nalgebra = { workspace = true }

# Slice 7 insertion-sim SDF bridge (sub-commit 7.0+). `mesh-sdf` builds
# a `SignedDistanceField` of the cleaned scan; cf-design's
# `impl Sdf for SignedDistanceField` lets it flow into a `cf_design::Solid`
# for the Route-A `outer.subtract(scan)` CSG; `sim-soft` tetrahedralizes
# the result via `SdfMeshedTetMesh::from_sdf` and (7.2) runs the FEM
# solve (`CpuNewtonSolver` + `PenaltyRigidContact`). `sim-ml-chassis`
# supplies `Tensor`, the `replay_step` solve's position/velocity I/O type.
mesh-sdf = { workspace = true }
# Slice 9 (SDF-based layer surfaces) — `ScalarGrid` + `MarchingCubesConfig`
# + `marching_cubes` for the cached-SDF + per-layer iso-extraction
# pipeline in `mod sdf_layers`. mesh-offset's own `offset_mesh` rebuilds
# the SDF + grid per call; we use the lower-level grid + MC primitives
# directly so the same cached grid serves every layer extraction.
mesh-offset = { workspace = true }
cf-design = { workspace = true }
sim-soft = { workspace = true }
sim-ml-chassis = { workspace = true }

# Bevy 0.18 — feature set mirrors cf-scan-prep so the workspace's validated
# rendering subset stays consistent across viewer binaries.
bevy = { workspace = true, default-features = false, features = [
    "bevy_asset",
    "bevy_core_pipeline",
    "bevy_gizmos",
    "bevy_gizmos_render",
    "bevy_pbr",
    "bevy_render",
    "bevy_state",
    "bevy_text",
    "bevy_ui",
    "bevy_ui_render",
    "default_font",
    "bevy_winit",
    "multi_threaded",
    "tonemapping_luts",
    "zstd_rust",
] }

# egui-on-Bevy plugin — UI library for the right-side design panels
# (Scan Info / Cavity / Layers / Validations as-built; Insertion Sim /
# Save-Open pending). 0.39.1 is the workspace-validated pin (cf-viewer
# + cf-scan-prep precedent).
bevy_egui = { version = "0.39.1", default-features = false, features = [
    "default_fonts",
    "render",
    "bevy_ui",
] }

# `Result<()>` + error-context chaining for the CLI load path + the
# Save panel's atomic write FS error pattern (slice 8).
anyhow = { workspace = true }
# `.prep.toml` parsing (cleaned scan provenance + centerline polyline)
# + `.design.toml` (re)serialization (slice 8).
serde = { workspace = true }
toml = { workspace = true }

# CLI argument parsing — direct dep with `derive` (clap has no workspace
# pin; cf-device-design is the fourth consumer alongside xtask +
# cf-viewer + cf-scan-prep + cf-cast-cli).
clap = { version = "4", features = ["derive"] }

[features]
default = ["x11"]
# Linux window backends — mirror cf-scan-prep's feature shape.
x11 = ["bevy/x11"]
wayland = ["bevy/wayland"]

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
