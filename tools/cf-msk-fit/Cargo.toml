[package]
name = "cf-msk-fit"
description = "Place + scale the OpenSim knee skeleton (cf-osim) onto detected scan landmarks (cf-anthro) — the scan↔model bridge of the musculoskeletal-builder arc (Mission #4), phase S3. Outputs bones + muscle/tendon paths in the scan frame."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
# The OpenSim reader (.osim → Model) + the validated knee oracle (forward
# kinematics / moment arms).
cf-osim = { path = "../cf-osim" }
# Detected scan landmarks (knee point, limb axis, segment lengths).
cf-anthro = { path = "../cf-anthro" }
# The parameter spine: ScanSource impls cf-msk-lib's ParamSource, producing
# BodyParams that morph the template (the scan-as-a-parameter-source seam).
cf-msk-lib = { path = "../cf-msk-lib" }
# Mesh types + STL I/O for the bones-in-scan overlay.
mesh-types = { workspace = true }
mesh-io = { workspace = true }
nalgebra = { workspace = true }
# Skin-envelope containment (flood-filled signed distance) for the G1 scorecard.
mesh-sdf = { workspace = true }
# Reading the vendored real-OpenSim moment-arm reference (G1 scorecard).
serde_json = { workspace = true }

[dev-dependencies]
# Emit the morphed Model to MJCF (the `build` path) in the scan-source tests.
cf-mjcf-emit = { path = "../cf-mjcf-emit" }
# Load the morphed MJCF to prove the scan→params→model path emits a valid model.
sim-mjcf = { path = "../../sim/L0/mjcf" }
