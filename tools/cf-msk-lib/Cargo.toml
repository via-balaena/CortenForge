[package]
name = "cf-msk-lib"
description = "Library/parameter spine for the musculoskeletal-builder arc: the source-agnostic kinematic-tree IR (Model) plus morph a template into a body via BodyParams + realize() + ParamSource. Builder-first — CanonicalSource emits a body with no scan. See docs/msk_builder/."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

# Workspace-tool library (no `[package.metadata.cortenforge]` tier block —
# matches the cf-osim / cf-anthro / cf-msk-fit precedent). See
# docs/msk_builder/03_phases/g1_knee_kinematics/recon.md (phase S1) and
# docs/msk_builder/02_foundations/library_parameter_architecture.md.

[lib]
path = "src/lib.rs"

[dependencies]
# Vec/quat math for the IR frames + scaling path-point locations on the morph.
nalgebra = { workspace = true }
