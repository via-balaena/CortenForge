[package]
name = "cf-msk-lib"
description = "Library/parameter spine for the musculoskeletal-builder arc: morph a template (an OpenSim knee subgraph) into a body via BodyParams + realize() + ParamSource. Builder-first — CanonicalSource emits a body with no scan. See docs/msk_builder/."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

# Workspace-tool library (no `[package.metadata.cortenforge]` tier block —
# matches the cf-osim / cf-anthro / cf-msk-fit precedent). See
# docs/msk_builder/03_phases/g1_knee_kinematics/recon.md (phase S1) and
# docs/msk_builder/02_foundations/library_parameter_architecture.md.

[lib]
path = "src/lib.rs"

[dependencies]
# The template (Subgraph IR) + the MJCF emitter we morph and emit through.
# v1 reuses cf-osim's Subgraph as the template; the source-agnostic IR
# extraction (recon S1, deferred) inverts this dependency later.
cf-osim = { path = "../cf-osim" }
# Vec math for scaling path-point locations on the cloned template.
nalgebra = { workspace = true }

[dev-dependencies]
# Load + forward the emitted MJCF to grade the canonical body vs the oracle.
sim-mjcf = { path = "../../sim/L0/mjcf" }
sim-core = { path = "../../sim/L0/core" }
