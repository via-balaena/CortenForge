[package]
name = "cf-osim"
description = "OpenSim (.osim) reader for the musculoskeletal-builder arc: parses the gait2392 leg chain into cf-msk-lib's source-agnostic Model IR, plus the oracle (OpenSim-geometry moment arms) and moment-arm extraction for validation. See docs/msk_builder/."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

# Workspace-tool library (no `[package.metadata.cortenforge]` tier block —
# matches the cf-scan-prep-core / cf-studio-* tools precedent). Started as the
# S0 bridge spike (throwaway-grade internals); promoted to the clean converter
# at S1. See docs/msk_builder/03_phases/g1_knee_kinematics/recon.md.

[lib]
path = "src/lib.rs"

[dependencies]
# The source-agnostic kinematic-tree IR (Model) the parser produces + the oracle
# reads. The leg-region cutover inverts the old direction (now cf-osim → cf-msk-lib).
cf-msk-lib = { path = "../cf-msk-lib" }
# Model / Data — forward kinematics + tendon Jacobian (ten_J) for moment arms.
sim-core = { path = "../../sim/L0/core" }
# Vec/quat math for frames, axes, path points.
nalgebra = { workspace = true }
# .osim is XML; same parser the MJCF importer uses.
quick-xml = { workspace = true }
# The A3 scorecard's differential-oracle envelope is built from the vendored
# `scaled_moment_arms_opensim.json` (`DiffOracleEnvelope::from_grid_json` takes a
# `&serde_json::Value`, so the library stays path-free).
serde_json = { workspace = true }

[dev-dependencies]
# The MJCF importer the r4 micro-spike loads through (load_model) — test-only.
sim-mjcf = { path = "../../sim/L0/mjcf" }
# Float-tolerance assertions for the spike / oracle-comparison tests.
approx = { workspace = true }
