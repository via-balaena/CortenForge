[package]
name = "cf-studio-gui"
description = "CortenForge Studio — the polished, accessible Slint GUI frontend for the guided scan→cast workflow. A thin client over cf-studio-engine + the cf-studio-core Project state machine (the same boundary the cf-studio CLI uses). See MISSION.md. G1: the app shell + state binding; step controls + 3D preview follow."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false
# Two bins (the app + the throwaway 3D spike); make plain `cargo run` launch
# the app.
default-run = "cf-studio-gui"

# Workspace tool; no `[package.metadata.cortenforge]` block (matches the
# cf-studio / cf-cast-cli precedent). The Project→display mapping lives in
# the lib (testable, headless); main.rs is the Slint event-loop glue,
# which needs a display to *run* but compiles headlessly.

[[bin]]
name = "cf-studio-gui"
path = "src/main.rs"

# 3D-preview spike (stage 1): prove wgpu renders into a Slint Image.
# Throwaway-grade exploration; the working approach folds into the lib.
[[bin]]
name = "spike-wgpu"
path = "src/bin/spike_wgpu.rs"

[lib]
path = "src/lib.rs"

# `deny`, not `forbid`: Slint's generated code uses `#[allow(unsafe_code)]`
# for its VTable statics, which `forbid` cannot permit. `deny` still blocks
# unsafe in our own code (no inner allow), while letting the generated UI
# code allow its own.
[lints.rust]
unsafe_code = "deny"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"

[dependencies]
# The Project state machine + Step (the spine).
cf-studio-core = { workspace = true }
# The step executors (used as step controls land in later phases).
cf-studio-engine = { workspace = true }
# The polished, accessible UI toolkit (direct dep, no workspace pin —
# brand-new to the workspace; isolated to this GUI crate so its heavy
# tree never touches the headless spine/engine/CLI). The
# `unstable-wgpu-28` feature exposes the WGPU integration (render a
# wgpu texture → Slint `Image`) for the 3D scan/mold view; wgpu is
# re-exported as `slint::wgpu_28::wgpu` so versions always match.
slint = { version = "1", features = ["unstable-wgpu-28"] }
# Build fix, not used in our code: naga 28.0.0 (pulled transitively via
# slint → wgpu) sets `default-features = false` on codespan-reporting, yet
# its error `Display` impl uses `codespan_reporting::term::termcolor::*` —
# which only exists when codespan's `termcolor` feature is on. No wgpu/slint
# edge enables it, so naga fails to compile ("`String: WriteColor` is not
# satisfied") on the Linux/Windows CI legs (it happens to resolve on macOS
# via an Apple-only graph edge). Depending on naga directly with `termcolor`
# turns it on for every target via cargo's additive feature unification.
# Pinned to 28 to match slint 1.15's wgpu-core 28. Drop when naga ships a
# release that enables its own `termcolor` (or stops stripping codespan's).
naga = { version = "28", features = ["termcolor"] }
# Native open/save file dialogs for the step screens (scan / prep /
# design pickers). Direct dep; isolated to the GUI crate.
rfd = "0.15"
# 3D scan/mold viewer (spike + the live preview): load meshes, do the
# camera/normal math, and cast vertex/uniform data to GPU bytes.
mesh-io = { workspace = true }
nalgebra = { workspace = true }
bytemuck = { version = "1", features = ["derive"] }
# `IndexedMesh` — render the live working mesh the step-2 EditSession
# mutates (converted to viewer vertices each edit). Bevy-free, L0.
mesh-types = { workspace = true }

[build-dependencies]
# Compiles the `.slint` markup at build time.
slint-build = "1"
