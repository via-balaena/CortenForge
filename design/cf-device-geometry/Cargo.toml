[package]
name = "cf-device-geometry"
description = "Shared device-side geometric primitives â€” cached scan SDF + per-iso marching-cubes extraction (`sdf_layers`), shared cavity-render helpers (`spawn_cavity_mesh`, `build_bevy_mesh_from_indexed*`, `CavityEntity`), and the clip-plane material/plugin/state. Consumed by cf-device-design (CAD tool) and cf-sim-research (Phase 3 sim viewer) so both binaries share one SDF cache + iso-extraction path + clip-plane visualization. Lifted out of `tools/cf-device-design/src/{sdf_layers.rs,clip_plane.rs,main.rs}` per `docs/archive/SIM_DECOUPLE_PHASE_3_RECON.md` Â§2.5.b-d."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
publish = false

# Shared workspace-internal compute + rendering primitives crate
# (precedent: cf-bevy-common, cf-device-types). No
# `[package.metadata.cortenforge]` tier block â€” tier metadata is
# reserved for sim L0/L1 libraries (xtask Layer Integrity grader
# exempts shared support crates by name; see
# `xtask/src/grade.rs::applies_to_crate`).

# Lenient lint posture per [[feedback-lint-posture-on-extract]] â€”
# workspace `pedantic = warn` is NOT inherited because the lifted
# `sdf_layers` + `clip_plane` modules (Phase 2.5.c + 2.5.d) carry
# verbose pre-existing docstrings + match-same-arms in the marching-
# cubes config that would generate pedantic warnings on extraction.
# Mirrors cf-device-design / cf-device-types posture.
[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"

[dependencies]
# Bevy â€” feature set for `ExtendedMaterial` (clip_plane in 2.5.d)
# + `Resource` derive (sdf_layers + clip_plane in 2.5.c+d).
# `bevy_pbr` brings `StandardMaterial` + `ExtendedMaterial` +
# `MaterialPlugin`; `bevy_render` brings `AsBindGroup` + shader
# infrastructure; `bevy_asset` brings `Asset` derive + the
# `embedded_asset!` macro that loads `clip_plane.wgsl`. Binary
# Cargo.toml features always superset this minimal set per R4
# mitigation (`docs/archive/SIM_DECOUPLE_PHASE_3_RECON.md` Â§4 R4).
bevy = { workspace = true, default-features = false, features = [
    "bevy_asset",
    "bevy_pbr",
    "bevy_render",
] }

# egui â€” `render_clip_plane_section` is a `&mut egui::Ui` panel
# section both binaries render (cf-device-design Sim panel sibling,
# cf-sim-research Phase 3 panel). Workspace-validated pin matches
# cf-device-design / cf-scan-prep / cf-viewer.
bevy_egui = { version = "0.41.1", default-features = false, features = [
    "default_fonts",
    "render",
    "bevy_ui",
] }

# Workspace internal deps.
# `UpAxis` for the render-frame conversion in `update_clip_plane_uniform`.
cf-bevy-common = { workspace = true }
# `RenderScale` for the same uniform conversion.
cf-viewer = { workspace = true }
# `Centerline` resource for the clip-plane resolution math.
cf-device-types = { workspace = true, features = ["bevy"] }
# `Point3` / `Vector3` for the centerline + plane math.
mesh-types = { workspace = true }

# Sdf machinery deps (2.5.c).
# `CachedGridSdf` + `Signed`/`TriMeshDistance`/`PseudoNormalSign` +
# `WALL_THRESHOLD_FACTOR_DEFAULT` for the cached-scan SDF stack.
mesh-sdf = { workspace = true }
# `MarchingCubesConfig` + `ScalarGrid` + `marching_cubes` for per-iso
# extraction (lower-level than `mesh_offset::offset_mesh` so one
# cached grid serves every layer extraction).
mesh-offset = { workspace = true }
# `CapPlane` + `dome_wall_only_mesh` + `report_cap_face_classification`
# for the cap-aware SDF source build.
cf-cap-planes = { workspace = true }
# `Sdf` trait for the cached-grid + closed/open SDF adapters.
cf-design = { workspace = true }
# `weld_vertices` + `remove_unreferenced_vertices` +
# `remove_degenerate_triangles` for the SDF-source decimation hygiene
# pipeline.
mesh-repair = { workspace = true }
# baby_shark's `EdgeDecimator` for face-count target decimation.
# Switched from meshopt 2026-05-26 per S1.1 probes 7/8: meshopt's
# `simplify_decoder` introduces non-manifold edges + duplicate faces on
# manifold input, causing the very MC sliver artifacts the
# `decimate_scan_for_sdf` docstring was already designed to combat.
# baby_shark preserves manifoldness in exchange for ~12Ă— wall-clock;
# SDF construction is interactive/one-shot per device, acceptable.
baby_shark = { workspace = true }
# `Point3` for the SDF grid bounds + extracted iso surface coordinates.
# (Note: `mesh-types` is already pulled in above for the clip-plane
# math; the SDF stack reuses the same workspace dep.)
nalgebra = { workspace = true }
# `Result<()>` + error-context chaining for `build_cached_scan_sdf`'s
# upstream `Context` calls.
anyhow = { workspace = true }
