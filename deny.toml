# CortenForge Dependency Policy
#
# Scoped to publishing concerns: license compliance and source provenance.
# Security advisories are handled by cargo-audit in the CI security job.
#
# Run: cargo deny check licenses sources
# Install: cargo install cargo-deny
#
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "wasm32-unknown-unknown",
]
all-features = true

# ============================================================================
# LICENSES - Ensure all dependencies are appropriately licensed
# ============================================================================

[licenses]
version = 2
# We're Apache-2.0, so we accept permissive licenses.
# In v2 format, all unlicensed and copyleft crates are denied by default.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "Unlicense",
    "bzip2-1.0.6",
    # Font licenses — cover font ASSETS only (not code). Pulled in via
    # `bevy_egui` → `egui` → `epaint` → `epaint_default_fonts`, which
    # ships Hack + Ubuntu fonts. Compatible with Apache-2.0 workspace
    # since font-asset licenses don't infect software using the font.
    "OFL-1.1",          # SIL Open Font License 1.1 (Google Fonts default)
    "Ubuntu-font-1.0",  # Ubuntu Font Licence v1.0
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# ============================================================================
# SOURCES - Control where dependencies can come from
# ============================================================================

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = [
    "cortenforge",
]
