# CortenForge Release Workflow
#
# Triggered on version tags (v*.*.*)
# Creates GitHub releases with:
# - Signed release artifacts
# - SBOM (Software Bill of Materials)
# - Auto-generated changelog from conventional commits
#
# See docs/INFRASTRUCTURE.md for the full constraint specification.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'  # Pre-releases like v0.8.0-rc.1

permissions:
  contents: write
  id-token: write  # For SLSA provenance

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================================
  # BUILD AND TEST
  # ============================================================================
  build:
    name: Build Studio (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    # Beta legs are non-fatal: if Windows/Linux/Intel-mac fail to build, the
    # release still goes out with whatever did build. The verified
    # Apple-Silicon leg (beta: false) stays blocking — if it fails, no release.
    # (fail-fast: false alone wouldn't do this — it only stops cancellation;
    # a failed leg would still fail the job and skip the release, which
    # `needs` it.)
    continue-on-error: ${{ matrix.beta }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: Cendrillon-linux-x86_64.tar.gz
            beta: true
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: Cendrillon-macos-x86_64.zip
            beta: true
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: Cendrillon-macos-arm64.zip
            beta: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: Cendrillon-windows-x86_64.zip
            beta: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Correctness is gated on main by quality-gate.yml (full debug +
      # release test suites, grade-all, cross-OS checks) — a tag is only ever
      # cut from already-green main. So the release does NOT re-run the whole
      # workspace test suite (slow stochastic-physics + cf-cast grade tests)
      # or build crates it doesn't ship; it builds exactly the one artifact
      # it publishes. This also avoids running x86_64 test binaries on the
      # arm64 macOS runner (the x86_64-apple-darwin leg cross-compiles).
      - name: Build Cendrillon
        run: cargo build --release -p cf-studio-gui --target ${{ matrix.target }}

      - name: Package Studio (macOS .app)
        if: runner.os == 'macOS'
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          app="Cendrillon.app"
          mkdir -p "$app/Contents/MacOS"
          cp "target/${{ matrix.target }}/release/cf-studio-gui" "$app/Contents/MacOS/"
          chmod +x "$app/Contents/MacOS/cf-studio-gui"
          sed "s/__VERSION__/${version}/g" tools/cf-studio-gui/macos/Info.plist \
            > "$app/Contents/Info.plist"
          mkdir -p dist
          # ditto preserves the bundle layout + executable bit in the zip.
          ditto -c -k --keepParent "$app" "dist/${{ matrix.asset }}"

      - name: Package Studio (Linux tar.gz)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar czf "dist/${{ matrix.asset }}" -C "target/${{ matrix.target }}/release" cf-studio-gui

      - name: Package Studio (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Force `
            -Path "target/${{ matrix.target }}/release/cf-studio-gui.exe" `
            -DestinationPath "dist/${{ matrix.asset }}"

      - name: Upload Studio artifact
        uses: actions/upload-artifact@v6
        with:
          name: studio-${{ matrix.target }}
          path: dist/${{ matrix.asset }}

  # ============================================================================
  # GENERATE SBOM
  # ============================================================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        run: |
          cargo cyclonedx --format json --output-file sbom.cdx.json
          cargo cyclonedx --format xml --output-file sbom.cdx.xml

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: |
            sbom.cdx.json
            sbom.cdx.xml

  # ============================================================================
  # GENERATE CHANGELOG
  # ============================================================================
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            # Get commits since last tag
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep "^- fix" || true)
          DOCS=$(echo "$COMMITS" | grep "^- docs" || true)
          REFACTORS=$(echo "$COMMITS" | grep "^- refactor" || true)
          OTHER=$(echo "$COMMITS" | grep -v "^- feat\|^- fix\|^- docs\|^- refactor" || true)

          # Build changelog
          CHANGELOG=""

          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}## Features\n\n${FEATURES}\n\n"
          fi

          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}## Bug Fixes\n\n${FIXES}\n\n"
          fi

          if [ -n "$DOCS" ]; then
            CHANGELOG="${CHANGELOG}## Documentation\n\n${DOCS}\n\n"
          fi

          if [ -n "$REFACTORS" ]; then
            CHANGELOG="${CHANGELOG}## Refactoring\n\n${REFACTORS}\n\n"
          fi

          if [ -n "$OTHER" ]; then
            CHANGELOG="${CHANGELOG}## Other Changes\n\n${OTHER}\n\n"
          fi

          # Output for GitHub Actions
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ============================================================================
  # CREATE RELEASE
  # ============================================================================
  release:
    name: Create Release
    needs: [build, sbom, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download SBOM
        uses: actions/download-artifact@v7
        with:
          name: sbom
          path: ./artifacts

      - name: Download Studio downloads
        uses: actions/download-artifact@v7
        with:
          pattern: studio-*
          merge-multiple: true
          path: ./artifacts

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: CortenForge ${{ steps.version.outputs.version }}
          body: |
            # CortenForge ${{ steps.version.outputs.version }}

            ${{ needs.changelog.outputs.changelog }}

            ## Download — Cendrillon

            The guided desktop app (scan → clean → design → molds → print → pour):

            - **macOS, Apple Silicon** (tested): `Cendrillon-macos-arm64.zip`.
              First launch: right-click the app → **Open** (unsigned during the
              beta — Gatekeeper asks once).
            - **macOS, Intel** (beta): `Cendrillon-macos-x86_64.zip` — same
              right-click → Open.
            - **Windows** (beta): `Cendrillon-windows-x86_64.zip`. Unblock
              via *More info → Run anyway* if SmartScreen warns.
            - **Linux** (beta): `Cendrillon-linux-x86_64.tar.gz`.

            Beta builds may be missing if that platform didn't build for this tag.

            Builds are not yet code-signed; that's a planned upgrade.

            ## Verification

            This release includes:
            - **SBOM**: Software Bill of Materials in CycloneDX format
            - All builds verified against A-grade quality standard

            ### Quality Metrics
            - Test Coverage: ≥90%
            - Zero Clippy warnings
            - Zero documentation warnings
            - Zero unwrap/expect in library code
            - All Layer 0 crates are Bevy-free

            See [STANDARDS.md](./docs/STANDARDS.md) for the full quality specification.
          files: |
            artifacts/sbom.cdx.json
            artifacts/sbom.cdx.xml
            artifacts/Cendrillon-*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # PUBLISH TO CRATES.IO (Optional - manual trigger)
