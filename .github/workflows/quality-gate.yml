# CortenForge Quality Gate
#
# This workflow enforces the A-grade standard on every push and PR.
# See docs/STANDARDS.md for the seven criteria.
# See docs/INFRASTRUCTURE.md for the full constraint specification.
#
# "A-grade or it doesn't ship. No exceptions."
#
# Policy source of truth: `cargo xtask grade-all`. The Rust grader
# (xtask/src/grade.rs) enforces Safety, Clippy (with unjustified-
# #[allow] detection), Documentation (with -D warnings), Dependencies
# (with justification scan), and Bevy-free (Layer 0). CI invokes it
# directly — no parallel bash/awk reimplementations.
#
# Coverage is excluded from the CI gate via --skip-coverage because
# llvm-cov in release mode is ~5-10 min per crate; it runs locally
# via `cargo xtask grade <crate>` and in dedicated nightly jobs.

name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  # ============================================================================
  # FORMATTING - Must be exact
  # ============================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================================================
  # XTASK GRADE - Single source of truth for Safety, Clippy, Docs, Deps, Bevy-free
  # ============================================================================
  # Replaces four formerly-separate bash-reimplementation jobs (clippy, docs,
  # safety, bevy-free) with one invocation of the Rust grader. Single source
  # of truth at xtask/src/grade.rs — no parallel policy layers to drift.
  #
  # --skip-coverage: coverage runs cargo llvm-cov in release (5-10 min per
  # crate); too slow for per-PR CI. It runs locally and in dedicated jobs.
  grade:
    name: xtask Grade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: cargo xtask grade-all --skip-coverage
        env:
          # Emit per-file safety debug + doc stderr tail on F so CI logs
          # surface the actual failure cause rather than opaque counts.
          XTASK_GRADE_DEBUG: "1"
        run: cargo run -p xtask --release -- grade-all --skip-coverage --quiet

  # ============================================================================
  # TESTS - All must pass on all platforms
  # ============================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Only save cache on main/develop pushes — PR runs restore but skip
          # the expensive save step (Windows cache save alone was taking 11 min).
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Run tests
        run: |
          # Test only library crates (no Bevy, no examples).
          # Examples are visual Bevy demos with main() binaries — they contain
          # no #[test] functions, so `cargo test` would compile them for nothing.
          # Clippy already verifies they compile. This avoids fragile system
          # graphics deps on headless CI runners.
          cargo test --all-features \
            -p mesh-types -p mesh-io -p mesh-repair -p mesh-sdf \
            -p mesh-offset -p mesh-shell -p mesh-measure \
            -p mesh-printability -p mesh-lattice -p mesh \
            -p sim-types -p sim-simd -p sim-core -p sim-mjcf \
            -p sim-urdf -p sim-conformance-tests -p sim-gpu \
            -p cf-geometry -p cf-spatial -p cf-design
        shell: bash

  # ============================================================================
  # WASM - Layer 0 crates must compile to WebAssembly
  # ============================================================================
  wasm:
    name: WASM Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Check WASM compatibility (Layer 0)
        run: |
          # Layer 0 crates must build for WASM
          # Note: Some crates may need --no-default-features to exclude std-only deps
          WASM_CRATES=(
            "mesh-types"
            "mesh-measure"
            "sim-types"
            "sim-core"
            "sim-urdf"
          )

          for crate in "${WASM_CRATES[@]}"; do
            echo "Checking $crate for WASM..."
            if cargo check -p "$crate" --target wasm32-unknown-unknown 2>/dev/null; then
              echo "✓ $crate builds for WASM"
            else
              echo "::warning::$crate does not build for WASM (may need feature flags)"
            fi
          done

  # ============================================================================
  # DEPENDENCIES - License / source audit via cargo-deny
  # ============================================================================
  # Complements the grade job's dep-justification scan with a cargo-deny
  # licence + source audit (different concern; both layers run).
  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check licenses and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources

  # ============================================================================
  # SEMVER - Breaking change detection
  # ============================================================================
  semver:
    name: Semver
    runs-on: ubuntu-latest
    # Only run on PRs (compare against base branch)
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check semver compatibility
        uses: obi1kenobi/cargo-semver-checks-action@v2
        # Only check crates that are published to crates.io
        # New/unpublished crates should be added here once published
        with:
          # For now, only check mesh-repair which has a published baseline
          # Other crates are not yet on crates.io
          package: mesh-repair
        continue-on-error: true  # Don't block PRs on semver for now

  # ============================================================================
  # SBOM - Software Bill of Materials generation
  # ============================================================================
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json
          # Find and rename the generated SBOM (name varies by workspace structure)
          find . -name "*.cdx.json" -not -path "./target/*" | head -1 | xargs -I{} cp {} sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.json

  # ============================================================================
  # FINAL GATE
  # ============================================================================
  quality-gate:
    name: Quality Gate
    needs: [format, grade, test, dependencies]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    QUALITY GATE PASSED                        ║"
          echo "║                                                              ║"
          echo "║  All automated criteria meet A-grade standard.               ║"
          echo "║  Ready for API review and merge.                             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
