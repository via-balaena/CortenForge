# CortenForge Quality Gate
#
# This workflow enforces the A-grade standard on every push and PR.
# See docs/STANDARDS.md for the eight criteria.
# See docs/INFRASTRUCTURE.md for the full constraint specification.
#
# "A-grade or it doesn't ship. No exceptions."
#
# Policy source of truth: `cargo xtask grade-all`. The Rust grader
# (xtask/src/grade.rs) enforces Safety, Clippy (with unjustified-
# #[allow] detection), Documentation (with -D warnings), Dependencies
# (with justification scan), Layer Integrity (tier-aware dep-graph
# enforcement, hard-gated as of L0 plan §8 step 12), and WASM
# Compatibility (L0-tier wasm32 build check, hard-gated). CI invokes
# it directly — no parallel bash/awk reimplementations.
#
# Coverage is excluded from the CI gate via --skip-coverage because
# llvm-cov in release mode is ~5-10 min per crate; it runs locally
# via `cargo xtask grade <crate>` and in dedicated nightly jobs.
#
# Test execution structure (L0 plan §8 step 13 / §6):
# - `tests-debug` (ubuntu, default features, debug profile): authoritative
#   test gate for the 23 light-weight workspace lib/integration crates.
# - `tests-release` (ubuntu, default features, --release): authoritative
#   test gate for the 5 crates whose heavy stochastic-physics integration
#   tests (90M–600M-step Boltzmann/CEM/REINFORCE/SA validators) run 5–10×
#   slower in debug. Per `feedback_release_mode_heavy_tests.md` and plan
#   §6.5: sim-ml-chassis, sim-thermostat, sim-rl, sim-conformance-tests,
#   sim-opt. Runs in parallel with tests-debug on a separate runner.
# - `cross-os` (macos + windows, 3 platform-sensitive crates): cross-OS
#   validation for FP determinism + file-path handling concerns. Per
#   plan §6.3 (b): sim-core (FP/physics), sim-mjcf (XML/file paths),
#   mesh-io (multi-format file paths). Other crates' cross-OS coverage
#   was admission-of-status-quo; ubuntu coverage is sufficient.
# - `feature-combos` (ubuntu): explicit non-default-feature paths.
#   Currently sim-soft `gpu-probe` (the only feature that flips a
#   tier per `tier_up_features`). Add new combos here as features
#   land.
#
# Dropped vs prior config:
# - `--all-features` from the test matrix (plan §6.1): Layer Integrity
#   now enforces all-features cleanliness in the grader; the test
#   matrix doesn't need to verify the same property by recompilation.
# - `wasm` job (plan §6.4): the WASM Compatibility criterion in
#   `cargo xtask grade-all` is the single source of truth. The job
#   was warning-only anyway.

name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Merge queue: when a PR is queued to merge, GitHub runs this workflow on a
  # temporary `gh-readonly-queue/<base>/...` ref with the PR's commits stacked
  # on the current base. The `affected` job forces `needs_full=true` on any
  # non-pull_request event, so the merge_group run grades + tests the FULL
  # workspace. With "Require merge queue" + "Quality Gate" as the required
  # check, this is the PRE-merge full gate: a PR's own (PR-scoped) run gives
  # fast feedback, but nothing lands on main until the full suite passes here.
  merge_group:

env:
  CARGO_TERM_COLOR: always
  # RUSTFLAGS="-D warnings" intentionally NOT set globally. It bypasses rustc's
  # cap-lints mechanism and promotes transitive-dependency warnings (e.g. from
  # winit, nom, quick-xml) to hard errors. Per-tool flags are the correct scope:
  # - Clippy enforces -D warnings via xtask grade_clippy's `cargo clippy`.
  # - Rustdoc enforces -D warnings via RUSTDOCFLAGS (set per-invocation in
  #   xtask grade_documentation).
  RUSTDOCFLAGS: "-D warnings"

# One in-flight run per ref. A new push to a PR/branch cancels the superseded
# run rather than queueing behind it (this whole gate is ~14 jobs incl. 3
# grade shards + cross-OS, so stacked runs starve the runner pool and the
# newest commit waits longest). Cancel ONLY superseded pull_request runs:
# never cancel a push to main (every landed commit's gate should complete) and
# never cancel a `merge_group` run — cancelling a queued merge-gate run would
# bounce the PR out of the merge queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ============================================================================
  # FORMATTING - Must be exact
  # ============================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================================================
  # AFFECTED - Compute the PR-scoped crate set (changed + reverse-dep closure)
  # ============================================================================
  # On a pull request, runs `cargo xtask affected` to compute which crates the
  # diff can break (changed crates + their reverse-dependency closure), with a
  # full-fallback valve for graph-invalidating files. Downstream jobs consume
  # `needs.affected.outputs.{needs_full,crates}` to scope their work to that
  # subset, cutting PR feedback without dropping merge-gating coverage.
  #
  # On any non-PR event (push to main, merge_group) it emits `needs_full=true`,
  # so the full workspace always runs on the branch that gates merges — the
  # affected subset can only narrow PR feedback, never what reaches main. If
  # this job itself errors, consumers fall back to FULL (see the grade job's
  # `needs.affected.result` guard), so a miss here is fail-safe, never a hole.
  affected:
    name: Affected crates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      needs_full: ${{ steps.compute.outputs.needs_full }}
      crates: ${{ steps.compute.outputs.crates }}
    steps:
      # fetch-depth: 0 — the diff is `origin/<base>...HEAD`, which needs the
      # merge-base, i.e. enough history of both sides.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Compute affected set
        id: compute
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Non-PR event (${{ github.event_name }}) → full workspace."
            echo "needs_full=true" >> "$GITHUB_OUTPUT"
            echo "crates=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Populate origin/<base> so the merge-base diff resolves.
          git fetch --no-tags --prune origin "${{ github.base_ref }}"
          JSON=$(cargo run -q -p xtask --release -- \
            affected --base "origin/${{ github.base_ref }}" --json)
          echo "affected: $JSON"
          echo "needs_full=$(echo "$JSON" | jq -r '.needs_full')" >> "$GITHUB_OUTPUT"
          echo "crates=$(echo "$JSON" | jq -r '.crates | join(",")')" >> "$GITHUB_OUTPUT"
        shell: bash

  # ============================================================================
  # XTASK GRADE - Single source of truth for the seven automated criteria
  # ============================================================================
  # Replaces four formerly-separate bash-reimplementation jobs (clippy, docs,
  # safety, bevy-free) with one invocation of the Rust grader. Single source
  # of truth at xtask/src/grade.rs — no parallel policy layers to drift.
  #
  # Post-L0-refactor, this also enforces Layer Integrity (tier-aware dep-graph
  # checks, hard-gate) and WASM Compatibility (L0-tier wasm32 build, hard-gate).
  #
  # --skip-coverage: coverage runs cargo llvm-cov in release (5-10 min per
  # crate); too slow for per-PR CI. It runs locally and in dedicated jobs.
  #
  # Sharded across 3 parallel runners via `grade-all --shard i/3` (round-robin
  # over the sorted crate list, so heavy crates like cf-cast/sim-soft scatter
  # evenly). This was the sole ~40m long pole; 3 shards take it to ~13m and off
  # the critical path. The downstream `quality-gate` job `needs: [grade]`, which
  # waits for all matrix legs and fails if any shard fails — so branch
  # protection on `Quality Gate` still gates every crate. Each shard keeps its
  # own rust-cache (matrix value is part of the key). Bump the shard count here
  # AND the `/3` denominator in the run step together if the workspace grows.
  #
  # PR-scoping: on a pull request this grades only the affected crates
  # (`--only`, from the `affected` job) instead of the whole workspace; on
  # main/merge it grades everything. The job always runs (`if: !cancelled()`)
  # so it is never a *skipped required check* — and if the `affected` job did
  # not succeed, it falls back to a FULL grade rather than trusting an empty
  # set (which would be a silent coverage hole).
  grade:
    name: xtask Grade (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [affected]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: cargo xtask grade-all --skip-coverage --shard ${{ matrix.shard }}/3
        env:
          # Emit per-file safety debug + doc stderr tail on F so CI logs
          # surface the actual failure cause rather than opaque counts.
          XTASK_GRADE_DEBUG: "1"
        # Scope to the affected subset ONLY when the affected job succeeded, the
        # event is a PR, and it didn't trip the full-fallback valve. Every other
        # path (non-PR, needs_full, affected failed/skipped) grades the full
        # workspace — under-scoping requires a positive, trustworthy signal.
        run: |
          if [ "${{ needs.affected.result }}" = "success" ] \
            && [ "${{ github.event_name }}" = "pull_request" ] \
            && [ "${{ needs.affected.outputs.needs_full }}" != "true" ]; then
            echo "PR-scoped grade (--only): ${{ needs.affected.outputs.crates }}"
            cargo run -p xtask --release -- grade-all --skip-coverage --quiet \
              --shard ${{ matrix.shard }}/3 --only "${{ needs.affected.outputs.crates }}"
          else
            echo "Full grade (non-PR / needs_full / affected unavailable)."
            cargo run -p xtask --release -- grade-all --skip-coverage --quiet \
              --shard ${{ matrix.shard }}/3
          fi
        shell: bash

  # ============================================================================
  # TESTS (DEBUG) - Default features, debug profile — light-crate gate
  # ============================================================================
  # Runs `cargo test` (default features, debug) on the 23 workspace
  # lib/integration crates whose tests finish quickly in debug mode. The
  # grade job's `--skip-coverage` flag skips its Coverage criterion (which
  # is what runs cargo test inside grade), so this job + tests-release are
  # the SOLE test-execution gate in CI.
  #
  # `--all-features` is intentionally absent (plan §6.1): Layer Integrity in
  # the grader enforces all-features cleanliness; running it again here would
  # just re-pay the bevy_ecs / image / zip / criterion compile cost on every
  # consumer's test build for no additional signal.
  tests-debug:
    name: Tests (debug)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # PR-scoped to the affected crates (see the `affected` job); always runs
    # (`if: !cancelled()`) so it is never a skipped required check, and falls
    # back to the full crate list on any non-PR / needs_full / affected-failed
    # path via .github/scripts/affected-packages.sh.
    needs: [affected]
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Run tests
        env:
          AFFECTED_RESULT: ${{ needs.affected.result }}
          AFFECTED_FULL: ${{ needs.affected.outputs.needs_full }}
          AFFECTED_CRATES: ${{ needs.affected.outputs.crates }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Library + integration crates whose tests are fast in debug mode.
          # Excluded by intent:
          # - sim-bevy: tests would pull bevy graphics deps that are fragile
          #   on headless CI runners; clippy in `grade` still verifies it
          #   compiles cleanly.
          # - examples (~197): demos with main() binaries, no #[test] fns.
          # - -benches crates (5): bench-only, no #[test] fns.
          # - xtask: graded by grade-all itself; its 114 unit tests run
          #   locally via pre-commit, not in this matrix.
          # - sim-ml-chassis / sim-thermostat / sim-rl / sim-conformance-tests
          #   / sim-opt: heavy-physics validators move to tests-release below.
          # cf-viewer + cf-bevy-common + sim-bevy-soft are included: their
          # tests are pure-function (no App::new() / window spin-up), so
          # headless CI handles them; the x11 / wayland dev libs already
          # installed above suffice for the link step. cf-bevy-common
          # (sim-soft PR2 C2b) is the shared Bevy helper crate consumed by
          # cf-viewer + sim-bevy + sim-bevy-soft. sim-bevy-soft (sim-soft
          # PR2 C2c) is the deforming-tet-mesh trajectory replay (β) crate
          # consumed by sim-soft Tier 4 examples (rows 12-14, 18).
          CANDIDATES="mesh-types mesh-io mesh-repair mesh-sdf mesh-offset \
            mesh-shell mesh-measure mesh-printability mesh-lattice mesh \
            sim-types sim-simd sim-core sim-mjcf sim-urdf sim-gpu sim-soft \
            sim-ml-chassis-bevy sim-therm-env cf-geometry cf-spatial cf-design \
            cf-design-tests cf-viewer cf-bevy-common sim-bevy-soft \
            cf-studio-core cf-studio-engine cf-studio-gui cf-studio \
            cf-scan-prep-core cf-cast-cli"
          # Restrict to the PR-affected subset (full on main/merge/fallback).
          PKGS=$(bash .github/scripts/affected-packages.sh "$CANDIDATES")
          if [ -z "$PKGS" ]; then
            echo "tests-debug: no affected crates in this set — skipping."
            exit 0
          fi
          echo "tests-debug packages: $PKGS"
          cargo test $PKGS
          # mesh-io's 3MF unit-scaling tests are behind the non-default
          # `threemf` feature, so run that crate again with it enabled —
          # only when mesh-io is in the selected set.
          case " $PKGS " in
            *" -p mesh-io "*) cargo test -p mesh-io --features threemf ;;
          esac
        shell: bash

  # ============================================================================
  # TESTS (RELEASE) - Default features, --release — heavy-physics gate
  # ============================================================================
  # Runs `cargo test --release` on the crates whose default test suite
  # contains stochastic-physics validators (Boltzmann learning, CEM
  # convergence, REINFORCE, SA/PT optimizers, MuJoCo conformance) doing
  # 90M–600M physics steps each.
  #
  # Why --release here specifically (plan §6.5, `feedback_release_mode_heavy_tests.md`):
  # in debug mode `gate_a_kl_convergence` (sim-thermostat::boltzmann_learning)
  # measured 10+ min on warm-cache MBP and didn't complete in a 27-min sweep;
  # the same test in --release completed in 82s — a 5–10× speedup. The
  # --release compile cost is paid once per crate per cold-cache run; the
  # test-execution savings dominate. Runs in parallel with tests-debug on a
  # separate runner so the --release compile doesn't extend the wall time of
  # the lighter crates.
  #
  # SHARDING (3 legs, mirrors the `grade` job): this was a ~29-min sequential
  # monolith — TEST-EXECUTION-bound, not compile-bound (per reference_ci_timing).
  # PR #1 sharded it 3 ways (29 → ~18 min). The measured per-shard breakdown then
  # revealed the long pole is a SINGLE indivisible crate, sim-thermostat (~17 min
  # of stochastic validators — coupled_bistable_array alone ~7.7 min); the other
  # crates combined are ~6 min, so re-balancing the crate GROUPS can't beat ~18.
  #
  # PR #1b attacks that with cargo-nextest (below): `cargo test` runs one binary
  # at a time, so sim-thermostat's six heavy validator binaries ran back-to-back;
  # nextest's process-per-test scheduler runs tests across all binaries
  # concurrently on the runner's cores, collapsing the thermostat shard toward
  # ~9-10 min without changing the crate groups. The groups are kept hand-spread
  # (conformance/thermostat/rl/opt/ml-chassis distributed) so nextest's win lands
  # on the right shard; further gains need per-test partitioning or a faster
  # linker, deferred until measurement shows they're needed.
  #
  # The downstream `quality-gate` job `needs: [tests-release]` waits for all
  # matrix legs and fails if any fails, so branch protection still gates every
  # crate. Each shard keeps its own rust-cache (matrix value is part of the key);
  # 3 legs (not matrix-per-crate) keeps the cache-key count bounded under the
  # 10 GB repo ceiling.
  tests-release:
    name: Tests (release, heavy — shard ${{ matrix.id }}/3)
    runs-on: ubuntu-latest
    # Heavy stochastic validators; 45 min guards a hung test without masking a
    # genuine ~9-10 min shard (post-nextest). Tune down once re-measured.
    timeout-minutes: 45
    # PR-scoped to the affected crates (see the `affected` job); always runs so
    # it is never a skipped required check, and falls back to the full shard
    # list on any non-PR / needs_full / affected-failed path. `crates` are bare
    # names here (not `-p` flags) so affected-packages.sh can intersect them.
    needs: [affected]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: 1
            crates: sim-conformance-tests sim-coupling
          - id: 2
            crates: sim-thermostat sim-opt mesh-printability
          - id: 3
            crates: sim-ml-chassis sim-rl
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      # cargo-nextest runs each test in its own process under a single scheduler
      # across ALL test binaries — unlike `cargo test`, which runs one binary at
      # a time. sim-thermostat's ~17 min was six heavy validator binaries run
      # back-to-back; nextest fills the runner's idle cores with tests from other
      # binaries, collapsing that toward max(longest single test, total / cores).
      # Prebuilt binary, ~5-10 s install.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Resolve this shard's crates against the affected set ONCE; the nextest
      # and doctest steps reuse PKGS, and SOFT_PKGS gates the sim-soft step.
      - name: Select affected packages
        env:
          AFFECTED_RESULT: ${{ needs.affected.result }}
          AFFECTED_FULL: ${{ needs.affected.outputs.needs_full }}
          AFFECTED_CRATES: ${{ needs.affected.outputs.crates }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          PKGS=$(bash .github/scripts/affected-packages.sh "${{ matrix.crates }}")
          echo "PKGS=$PKGS" >> "$GITHUB_ENV"
          echo "shard ${{ matrix.id }} packages: ${PKGS:-<none>}"
          # sim-soft isn't in any shard's crate list (it runs as selective test
          # bins below), so resolve it independently.
          SOFT_PKGS=$(bash .github/scripts/affected-packages.sh "sim-soft")
          echo "SOFT_PKGS=$SOFT_PKGS" >> "$GITHUB_ENV"
        shell: bash

      - name: Run tests (nextest, --release)
        # sim-coupling (the keystone soft↔rigid bridge) runs here, not in
        # tests-debug: its differentiable-coupling gates drive the soft FEM
        # solver (slow in debug, like sim-soft). The whole suite is ~16 s in
        # release. Without this the keystone gradient gates execute in NO CI
        # job (grade shards use `--skip-coverage`, which skips test-running).
        if: env.PKGS != ''
        run: cargo nextest run --release $PKGS
        shell: bash

      # nextest does NOT run doctests (a known limitation — its process-per-test
      # model can't host them). `cargo test --doc` is the documented companion
      # step, so this preserves doctest coverage that `cargo test` ran before
      # the nextest switch (e.g. mesh-printability's 4 doctests). Doctests are
      # compile-bound and trivially fast to execute.
      - name: Run doctests (--release)
        if: env.PKGS != ''
        run: cargo test --release --doc $PKGS
        shell: bash

      # sim-soft release-only contact tests live on shard 3. Phase 5 commits
      # 9 + 10 mark V-3 / V-5 / V-4-V-3 / V-4-V-5 as
      # `#[cfg_attr(debug_assertions, ignore)]` per
      # `feedback_release_mode_heavy_tests`. The crate itself runs in
      # `tests-debug` for V-1 / V-2 / V-3a / V-6 + 220+ legacy tests; these
      # `--test` selections add the cfg-attr-debug-skip release-only paths only
      # (avoids 2× compile cost on debug-already-covered tests). Runs when
      # sim-soft is affected (SOFT_PKGS non-empty → also true on the full path).
      - name: Run sim-soft release-only contact tests
        if: matrix.id == 3 && env.SOFT_PKGS != ''
        run: |
          cargo test --release -p sim-soft \
            --test hertz_sphere_plane \
            --test contact_drop_rest \
            --test non_interpenetration
        shell: bash

  # ============================================================================
  # CROSS-OS - Platform-sensitive crates only on macOS + Windows
  # ============================================================================
  # Per plan §6.3 (b): cross-OS coverage limited to crates with legitimate
  # cross-OS concerns (FP determinism, mmap behavior, file-path handling).
  # ubuntu coverage is provided by the `tests-debug` + `tests-release` jobs;
  # this matrix adds macOS + Windows for the three crates where it actually
  # matters.
  #
  # Selection rationale:
  # - sim-core: physics integration, FP determinism is load-bearing
  # - sim-mjcf: XML parsing + file-path resolution (textures, hfields, includes)
  # - mesh-io: multi-format mesh I/O, file-path / endianness concerns
  # - mesh-printability: §6.3 Gap H TrappedVolume voxel inside-test
  #   (scanline ray-tri parity + flood-fill) is FP-drift-sensitive per
  #   §8.2.1 Phase-4-faer-LDLᵀ lesson. Cross-os matrix catches platform-
  #   divergent hard-fails (different `pairs_count` on Windows or
  #   scanline parity flips on macOS) that single-OS coverage would miss.
  #   Per v0.8 fix arc spec §10.4.1.
  cross-os:
    name: Cross-OS Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    # PR-scoped to the affected crates; always runs (never a skipped required
    # check), full on non-PR / needs_full / affected-failed. A Cargo.lock change
    # trips the full-fallback valve → needs_full → the Cendrillon pin guard
    # below still runs, so lockfile drift is never silently skipped.
    needs: [affected]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Select affected packages
        env:
          AFFECTED_RESULT: ${{ needs.affected.result }}
          AFFECTED_FULL: ${{ needs.affected.outputs.needs_full }}
          AFFECTED_CRATES: ${{ needs.affected.outputs.crates }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          PKGS=$(bash .github/scripts/affected-packages.sh "sim-core sim-mjcf mesh-io mesh-printability")
          echo "PKGS=$PKGS" >> "$GITHUB_ENV"
          GUI_PKGS=$(bash .github/scripts/affected-packages.sh "cf-studio-gui")
          echo "GUI_PKGS=$GUI_PKGS" >> "$GITHUB_ENV"
        shell: bash

      - name: Run tests (default features)
        if: env.PKGS != ''
        run: cargo test $PKGS
        shell: bash

      # Build Cendrillon (the only thing released for Windows) on each OS,
      # --locked, so a lockfile drift that breaks the Windows build — e.g. a
      # cargo update dropping gpu-allocator's windows 0.62.2 pin — fails the
      # PR here instead of silently dropping the Windows download at release.
      # A Cargo.lock change trips needs_full (→ GUI_PKGS non-empty), so the
      # guard always runs exactly when a lockfile drift could occur.
      - name: Build Cendrillon (guards the Windows windows-crate pin)
        if: env.GUI_PKGS != ''
        run: cargo build --locked -p cf-studio-gui
        shell: bash

  # ============================================================================
  # FEATURE COMBOS - Non-default feature paths
  # ============================================================================
  # Default-features tests run in `tests-debug` + `tests-release`; this job
  # covers the feature paths that aren't the default. Add new combos here as
  # features land.
  #
  # Currently:
  # - sim-soft `gpu-probe`: tier-up feature pulling wgpu/bytemuck/pollster.
  #   `tests/invariant_6_gpu_probe.rs` is `#![cfg(feature = "gpu-probe")]`-
  #   gated and gracefully skips when no wgpu adapter is available
  #   (headless CI), so this gate exercises the build graph + skip path.
  feature-combos:
    name: Feature Combos
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # PR-scoped: the only combo is sim-soft's `gpu-probe`, so this runs when
    # sim-soft is affected (and always on non-PR / needs_full / fallback).
    needs: [affected]
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Select affected packages
        env:
          AFFECTED_RESULT: ${{ needs.affected.result }}
          AFFECTED_FULL: ${{ needs.affected.outputs.needs_full }}
          AFFECTED_CRATES: ${{ needs.affected.outputs.crates }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          SOFT_PKGS=$(bash .github/scripts/affected-packages.sh "sim-soft")
          echo "SOFT_PKGS=$SOFT_PKGS" >> "$GITHUB_ENV"
        shell: bash

      - name: Test sim-soft with gpu-probe
        if: env.SOFT_PKGS != ''
        run: cargo test --features gpu-probe -p sim-soft

  # ============================================================================
  # DEPENDENCIES - License / source audit via cargo-deny
  # ============================================================================
  # Complements the grade job's dep-justification scan with a cargo-deny
  # licence + source audit (different concern; both layers run).
  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Check licenses and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources

  # ============================================================================
  # SEMVER - Breaking change detection
  # ============================================================================
  semver:
    name: Semver
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on PRs (compare against base branch)
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check semver compatibility
        uses: obi1kenobi/cargo-semver-checks-action@v2
        # Only check crates that are published to crates.io
        # New/unpublished crates should be added here once published
        with:
          # For now, only check mesh-repair which has a published baseline
          # Other crates are not yet on crates.io
          package: mesh-repair
        continue-on-error: true  # Don't block PRs on semver for now

  # ============================================================================
  # SBOM - Software Bill of Materials generation
  # ============================================================================
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json
          # Find and rename the generated SBOM (name varies by workspace structure)
          find . -name "*.cdx.json" -not -path "./target/*" | head -1 | xargs -I{} cp {} sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.json

  # ============================================================================
  # FINAL GATE
  # ============================================================================
  quality-gate:
    name: Quality Gate
    needs: [format, grade, tests-debug, tests-release, cross-os, feature-combos, dependencies]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: All checks passed
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    QUALITY GATE PASSED                        ║"
          echo "║                                                              ║"
          echo "║  All automated criteria meet A-grade standard.               ║"
          echo "║  Ready for API review and merge.                             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
