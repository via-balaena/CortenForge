# CortenForge Quality Gate
#
# This workflow enforces the A-grade standard on every push and PR.
# See docs/STANDARDS.md for the seven criteria.
# See docs/INFRASTRUCTURE.md for the full constraint specification.
#
# "A-grade or it doesn't ship. No exceptions."

name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  # ============================================================================
  # FORMATTING - Must be exact
  # ============================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================================================
  # CLIPPY - Zero warnings
  # ============================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ============================================================================
  # TESTS - All must pass on all platforms
  # ============================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Only save cache on main/develop pushes — PR runs restore but skip
          # the expensive save step (Windows cache save alone was taking 11 min).
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Run tests
        run: |
          # Test only library crates (no Bevy, no examples).
          # Examples are visual Bevy demos with main() binaries — they contain
          # no #[test] functions, so `cargo test` would compile them for nothing.
          # Clippy already verifies they compile. This avoids fragile system
          # graphics deps on headless CI runners.
          cargo test --all-features \
            -p mesh-types -p mesh-io -p mesh-repair -p mesh-sdf \
            -p mesh-offset -p mesh-shell -p mesh-measure \
            -p mesh-printability -p mesh-lattice -p mesh \
            -p sim-types -p sim-simd -p sim-core -p sim-mjcf \
            -p sim-urdf -p sim-conformance-tests -p sim-gpu \
            -p cf-geometry -p cf-spatial -p cf-design
        shell: bash

  # ============================================================================
  # WASM - Layer 0 crates must compile to WebAssembly
  # ============================================================================
  wasm:
    name: WASM Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Check WASM compatibility (Layer 0)
        run: |
          # Layer 0 crates must build for WASM
          # Note: Some crates may need --no-default-features to exclude std-only deps
          WASM_CRATES=(
            "mesh-types"
            "mesh-measure"
            "sim-types"
            "sim-core"
            "sim-urdf"
          )

          for crate in "${WASM_CRATES[@]}"; do
            echo "Checking $crate for WASM..."
            if cargo check -p "$crate" --target wasm32-unknown-unknown 2>/dev/null; then
              echo "✓ $crate builds for WASM"
            else
              echo "::warning::$crate does not build for WASM (may need feature flags)"
            fi
          done

  # ============================================================================
  # DOCUMENTATION - Zero warnings, complete coverage
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ============================================================================
  # SAFETY - Zero unwrap/expect in library code
  # ============================================================================
  safety:
    name: Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for unwrap/expect
        run: |
          # Find all library source files (exclude tests, examples, xtask)
          # Also exclude doc comments (/// and //!) and test modules (#[cfg(test)])
          FOUND_VIOLATIONS=false

          for file in $(find . -name "*.rs" \
            -not -path "./target/*" \
            -not -path "./xtask/*" \
            -not -path "*/tests/*" \
            -not -path "*/examples/*" \
            -not -path "*/benches/*" 2>/dev/null); do

            # Use awk to find unwrap/expect outside of:
            # - doc comments (lines starting with /// or //!)
            # - test modules (from #[cfg(test)] to end of file)
            VIOLATIONS=$(awk '
              /^[ \t]*#\[cfg\(test\)\]/ { in_test = 1 }
              !in_test && !/^[ \t]*\/\/[\/!]/ && /\.(unwrap|expect)\(/ { print NR": "$0 }
            ' "$file" 2>/dev/null)

            if [ -n "$VIOLATIONS" ]; then
              if [ "$FOUND_VIOLATIONS" = false ]; then
                echo "::error::Found unwrap/expect in library code:"
                FOUND_VIOLATIONS=true
              fi
              echo "In $file:"
              echo "$VIOLATIONS" | head -5
            fi
          done

          if [ "$FOUND_VIOLATIONS" = true ]; then
            exit 1
          fi
          echo "✓ No unwrap/expect found in library code"

      - name: Check for panic!/todo!/unimplemented!
        run: |
          VIOLATIONS=$(find . -name "*.rs" \
            -not -path "./target/*" \
            -not -path "./xtask/*" \
            -not -path "*/tests/*" \
            -not -path "*/examples/*" \
            -exec grep -l -E 'panic!\(|todo!\(|unimplemented!\(' {} \; 2>/dev/null || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::Found panic!/todo!/unimplemented! (review required):"
            echo "$VIOLATIONS"
          fi

  # ============================================================================
  # DEPENDENCIES - Audit and policy (pre-built action, no cargo install)
  # ============================================================================
  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check licenses and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources

  # ============================================================================
  # SEMVER - Breaking change detection
  # ============================================================================
  semver:
    name: Semver
    runs-on: ubuntu-latest
    # Only run on PRs (compare against base branch)
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check semver compatibility
        uses: obi1kenobi/cargo-semver-checks-action@v2
        # Only check crates that are published to crates.io
        # New/unpublished crates should be added here once published
        with:
          # For now, only check mesh-repair which has a published baseline
          # Other crates are not yet on crates.io
          package: mesh-repair
        continue-on-error: true  # Don't block PRs on semver for now

  # ============================================================================
  # LAYER 0 - No Bevy in foundation crates
  # ============================================================================
  bevy-free:
    name: Bevy-Free (Layer 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Check Layer 0 crates
        run: |
          # List of Layer 0 crates that must be Bevy-free
          LAYER0_CRATES=(
            "mesh-types"
            "mesh-io"
            "mesh-repair"
            "mesh-sdf"
            "mesh-offset"
            "mesh-shell"
            "mesh-measure"
            "mesh-printability"
            "mesh-lattice"
            "sim-types"
            "sim-core"
            "sim-urdf"
          )

          FAILED=false
          for crate in "${LAYER0_CRATES[@]}"; do
            if cargo tree -p "$crate" 2>/dev/null | grep -qi "bevy"; then
              echo "::error::$crate has Bevy in dependency tree"
              FAILED=true
            fi
          done

          if [ "$FAILED" = true ]; then
            exit 1
          fi
          echo "✓ All Layer 0 crates are Bevy-free"

  # ============================================================================
  # SBOM - Software Bill of Materials generation
  # ============================================================================
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json
          # Find and rename the generated SBOM (name varies by workspace structure)
          find . -name "*.cdx.json" -not -path "./target/*" | head -1 | xargs -I{} cp {} sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.json

  # ============================================================================
  # FINAL GATE
  # ============================================================================
  quality-gate:
    name: Quality Gate
    needs: [format, clippy, test, docs, safety, dependencies, bevy-free]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    QUALITY GATE PASSED                        ║"
          echo "║                                                              ║"
          echo "║  All automated criteria meet A-grade standard.               ║"
          echo "║  Ready for API review and merge.                             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
