# CortenForge Quality Gate
#
# This workflow enforces the A-grade standard on every push and PR.
# See docs/STANDARDS.md for the seven criteria.
# See docs/INFRASTRUCTURE.md for the full constraint specification.
#
# "A-grade or it doesn't ship. No exceptions."

name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  # ============================================================================
  # FORMATTING - Must be exact
  # ============================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================================================
  # CLIPPY - Zero warnings
  # ============================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ============================================================================
  # TESTS - All must pass on all platforms
  # ============================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Exclude sim-bevy on Windows - Bevy causes linker issues and slow builds
            cargo test --all-features --workspace --exclude sim-bevy
          else
            cargo test --all-features
          fi
        shell: bash

  # ============================================================================
  # TESTS - ARM64 (Apple Silicon and Linux ARM)
  # ============================================================================
  test-arm64:
    name: Test (ARM64)
    runs-on: macos-latest  # GitHub's macos-latest is now ARM64
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify ARM64
        run: |
          echo "Architecture: $(uname -m)"
          if [ "$(uname -m)" != "arm64" ]; then
            echo "::warning::Expected ARM64, got $(uname -m)"
          fi

      - name: Run tests
        run: cargo test --all-features

  # ============================================================================
  # WASM - Layer 0 crates must compile to WebAssembly
  # ============================================================================
  wasm:
    name: WASM Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check WASM compatibility (Layer 0)
        run: |
          # Layer 0 crates must build for WASM
          # Note: Some crates may need --no-default-features to exclude std-only deps
          WASM_CRATES=(
            "mesh-types"
            "mesh-measure"
            "sim-types"
            "sim-core"
            "sim-urdf"
          )

          for crate in "${WASM_CRATES[@]}"; do
            echo "Checking $crate for WASM..."
            if cargo check -p "$crate" --target wasm32-unknown-unknown 2>/dev/null; then
              echo "✓ $crate builds for WASM"
            else
              echo "::warning::$crate does not build for WASM (may need feature flags)"
            fi
          done

  # ============================================================================
  # DOCUMENTATION - Zero warnings, complete coverage
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ============================================================================
  # COVERAGE - Must be ≥90% for A-grade
  # ============================================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Generate coverage and check threshold
        run: |
          # Run tarpaulin with 75% threshold - fails if coverage below threshold
          # TODO: Increase to 90% as test coverage improves
          #
          # --timeout 300: per-test timeout (5 min) prevents hangs from heavy
          #   simulation loops (e.g. 50k-step stability tests)
          # --release: sim step loops are 3-10× faster in release mode
          # --exclude: sim-conformance-tests has 60k+ lines of integration tests
          #   with 500k+ simulation steps — not useful for line-coverage measurement
          #   and the primary source of tarpaulin timeouts
          cargo tarpaulin --all-features --workspace \
            --timeout 300 \
            --release \
            --exclude sim-conformance-tests \
            --fail-under 75

  # ============================================================================
  # SAFETY - Zero unwrap/expect in library code
  # ============================================================================
  safety:
    name: Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for unwrap/expect
        run: |
          # Find all library source files (exclude tests, examples, xtask)
          # Also exclude doc comments (/// and //!) and test modules (#[cfg(test)])
          FOUND_VIOLATIONS=false

          for file in $(find . -name "*.rs" \
            -not -path "./target/*" \
            -not -path "./xtask/*" \
            -not -path "*/tests/*" \
            -not -path "*/examples/*" \
            -not -path "*/benches/*" 2>/dev/null); do

            # Use awk to find unwrap/expect outside of:
            # - doc comments (lines starting with /// or //!)
            # - test modules (from #[cfg(test)] to end of file)
            VIOLATIONS=$(awk '
              /^[ \t]*#\[cfg\(test\)\]/ { in_test = 1 }
              !in_test && !/^[ \t]*\/\/[\/!]/ && /\.(unwrap|expect)\(/ { print NR": "$0 }
            ' "$file" 2>/dev/null)

            if [ -n "$VIOLATIONS" ]; then
              if [ "$FOUND_VIOLATIONS" = false ]; then
                echo "::error::Found unwrap/expect in library code:"
                FOUND_VIOLATIONS=true
              fi
              echo "In $file:"
              echo "$VIOLATIONS" | head -5
            fi
          done

          if [ "$FOUND_VIOLATIONS" = true ]; then
            exit 1
          fi
          echo "✓ No unwrap/expect found in library code"

      - name: Check for panic!/todo!/unimplemented!
        run: |
          VIOLATIONS=$(find . -name "*.rs" \
            -not -path "./target/*" \
            -not -path "./xtask/*" \
            -not -path "*/tests/*" \
            -not -path "*/examples/*" \
            -exec grep -l -E 'panic!\(|todo!\(|unimplemented!\(' {} \; 2>/dev/null || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "::warning::Found panic!/todo!/unimplemented! (review required):"
            echo "$VIOLATIONS"
          fi

  # ============================================================================
  # SECURITY - Vulnerability scanning
  # ============================================================================
  security:
    name: Security
    runs-on: ubuntu-latest
    # Non-blocking: not in quality-gate's `needs` list, so a red ❌ here
    # is visible on the PR but does not prevent merging.
    # Action items for contributing fixes upstream are tracked in docs/UPSTREAM.md.
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: |
          set -o pipefail
          if cargo audit --deny warnings 2>&1 | tee audit-output.txt; then
            echo '### :lock: Security Audit — Clean' >> "$GITHUB_STEP_SUMMARY"
            echo 'No known vulnerabilities found.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo '### :warning: Security Audit — Advisories Found' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo 'The following upstream advisories affect our dependency tree.' >> "$GITHUB_STEP_SUMMARY"
            echo 'These are **non-blocking** — see `docs/UPSTREAM.md` for action items.' >> "$GITHUB_STEP_SUMMARY"
            echo '' >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat audit-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # ============================================================================
  # DEPENDENCIES - Audit and policy
  # ============================================================================
  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check licenses and sources
        run: cargo deny check licenses sources

  # ============================================================================
  # SEMVER - Breaking change detection
  # ============================================================================
  semver:
    name: Semver
    runs-on: ubuntu-latest
    # Only run on PRs (compare against base branch)
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check semver compatibility
        uses: obi1kenobi/cargo-semver-checks-action@v2
        # Only check crates that are published to crates.io
        # New/unpublished crates should be added here once published
        with:
          # For now, only check mesh-repair which has a published baseline
          # Other crates are not yet on crates.io
          package: mesh-repair
        continue-on-error: true  # Don't block PRs on semver for now

  # ============================================================================
  # LAYER 0 - No Bevy in foundation crates
  # ============================================================================
  bevy-free:
    name: Bevy-Free (Layer 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check Layer 0 crates
        run: |
          # List of Layer 0 crates that must be Bevy-free
          LAYER0_CRATES=(
            "mesh-types"
            "mesh-io"
            "mesh-repair"
            "mesh-sdf"
            "mesh-offset"
            "mesh-shell"
            "mesh-measure"
            "mesh-printability"
            "mesh-lattice"
            "sim-types"
            "sim-core"
            "sim-urdf"
          )

          FAILED=false
          for crate in "${LAYER0_CRATES[@]}"; do
            if cargo tree -p "$crate" 2>/dev/null | grep -qi "bevy"; then
              echo "::error::$crate has Bevy in dependency tree"
              FAILED=true
            fi
          done

          if [ "$FAILED" = true ]; then
            exit 1
          fi
          echo "✓ All Layer 0 crates are Bevy-free"

  # ============================================================================
  # SBOM - Software Bill of Materials generation
  # ============================================================================
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json
          # Find and rename the generated SBOM (name varies by workspace structure)
          find . -name "*.cdx.json" -not -path "./target/*" | head -1 | xargs -I{} cp {} sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.json

  # ============================================================================
  # FINAL GATE
  # ============================================================================
  quality-gate:
    name: Quality Gate
    needs: [format, clippy, test, test-arm64, docs, safety, dependencies, bevy-free]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    QUALITY GATE PASSED                        ║"
          echo "║                                                              ║"
          echo "║  All automated criteria meet A-grade standard.               ║"
          echo "║  Ready for API review and merge.                             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
