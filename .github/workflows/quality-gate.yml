# CortenForge Quality Gate
#
# This workflow enforces the A-grade standard on every push and PR.
# See docs/STANDARDS.md for the eight criteria.
# See docs/INFRASTRUCTURE.md for the full constraint specification.
#
# "A-grade or it doesn't ship. No exceptions."
#
# Policy source of truth: `cargo xtask grade-all`. The Rust grader
# (xtask/src/grade.rs) enforces Safety, Clippy (with unjustified-
# #[allow] detection), Documentation (with -D warnings), Dependencies
# (with justification scan), Layer Integrity (tier-aware dep-graph
# enforcement, hard-gated as of L0 plan §8 step 12), and WASM
# Compatibility (L0-tier wasm32 build check, hard-gated). CI invokes
# it directly — no parallel bash/awk reimplementations.
#
# Coverage is excluded from the CI gate via --skip-coverage because
# llvm-cov in release mode is ~5-10 min per crate; it runs locally
# via `cargo xtask grade <crate>` and in the weekly job in scheduled.yml.
#
# Test execution structure (L0 plan §8 step 13 / §6):
# - `tests-debug` (ubuntu, default features, debug profile): authoritative
#   test gate for the 23 light-weight workspace lib/integration crates.
#   Sharded 3 ways (balanced by dependency tree) like `tests-release` and
#   `grade`: on a foundational `sim-core` PR the affected set is nearly the full
#   crate list, making this the COMPILE-bound long pole, so the heavy GUI dep
#   trees (Bevy / Slint) are isolated one-per-shard to compile once each.
# - `tests-release` (ubuntu, default features, --release): authoritative
#   test gate for the 6 crates whose heavy stochastic-physics integration
#   tests (90M–600M-step Boltzmann/CEM/REINFORCE/SA validators) run 5–10×
#   slower in debug. Per `feedback_release_mode_heavy_tests.md` and plan
#   §6.5: sim-ml-chassis, sim-thermostat, sim-rl, sim-conformance-tests,
#   sim-opt, sim-rl-baselines. Runs in parallel with tests-debug on a
#   separate runner. (sim-rl-baselines holds the RL-baseline fixtures that
#   used to live under sim-thermostat/sim-therm-env/sim-opt; nearly all its
#   tests are `#[ignore]`d — only two fast compute-parity checks run — so in
#   CI it is effectively a COMPILE gate. The isolation removes the backwards
#   sim-rl dev-dep from those L0 physics crates.)
# - `cross-os` (macos + windows, 3 platform-sensitive crates): cross-OS
#   validation for FP determinism + file-path handling concerns. Per
#   plan §6.3 (b): sim-core (FP/physics), sim-mjcf (XML/file paths),
#   mesh-io (multi-format file paths). Other crates' cross-OS coverage
#   was admission-of-status-quo; ubuntu coverage is sufficient.
# - `feature-combos` (ubuntu): explicit non-default-feature paths.
#   Currently sim-soft `gpu-probe` (the only feature that flips a
#   tier per `tier_up_features`). Add new combos here as features
#   land.
#
# Dropped vs prior config:
# - `--all-features` from the test matrix (plan §6.1): Layer Integrity
#   now enforces all-features cleanliness in the grader; the test
#   matrix doesn't need to verify the same property by recompilation.
# - `wasm` job (plan §6.4): the WASM Compatibility criterion in
#   `cargo xtask grade-all` is the single source of truth. The job
#   was warning-only anyway.

name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Merge queue: when a PR is queued to merge, GitHub runs this workflow on a
  # temporary `gh-readonly-queue/<base>/...` ref with the PR's commits stacked
  # on the current base. The `affected` job forces `needs_full=true` on any
  # non-pull_request event, so the merge_group run grades + tests the FULL
  # workspace. With "Require merge queue" + "Quality Gate" as the required
  # check, this is the PRE-merge full gate: a PR's own (PR-scoped) run gives
  # fast feedback, but nothing lands on main until the full suite passes here.
  merge_group:

env:
  CARGO_TERM_COLOR: always
  # RUSTFLAGS="-D warnings" intentionally NOT set globally. It bypasses rustc's
  # cap-lints mechanism and promotes transitive-dependency warnings (e.g. from
  # winit, nom, quick-xml) to hard errors. Per-tool flags are the correct scope:
  # - Clippy enforces -D warnings via xtask grade_clippy's `cargo clippy`.
  # - Rustdoc enforces -D warnings via RUSTDOCFLAGS (set per-invocation in
  #   xtask grade_documentation).
  RUSTDOCFLAGS: "-D warnings"

# One in-flight run per ref. A new push to a PR/branch cancels the superseded
# run rather than queueing behind it (this whole gate is ~14 jobs incl. 3
# grade shards + cross-OS, so stacked runs starve the runner pool and the
# newest commit waits longest). Cancel ONLY superseded pull_request runs:
# never cancel a push to main (every landed commit's gate should complete) and
# never cancel a `merge_group` run — cancelling a queued merge-gate run would
# bounce the PR out of the merge queue.
#
# Dependabot exception: ALL dependabot runs share ONE group (not per-ref), so a
# batch of dep-bump PRs serializes to one run at a time instead of each spawning
# a full ~14-job matrix in parallel and saturating the pool. Human PRs keep their
# per-ref group and run freely — so our work always has runner headroom no matter
# how many dependabot PRs are open. (Actions has no native job priority; this +
# the dependabot.yml grouping/limit are the effective levers.) Dependabot's group
# does NOT cancel-in-progress — its runs queue (serialize) rather than killing the
# one ahead.
concurrency:
  group: ${{ github.actor == 'dependabot[bot]' && format('{0}-dependabot', github.workflow) || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}

jobs:
  # ============================================================================
  # FORMATTING - Must be exact
  # ============================================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================================================
  # AFFECTED - Compute the PR-scoped crate set (changed + reverse-dep closure)
  # ============================================================================
  # On a pull request, runs `cargo xtask affected` to compute which crates the
  # diff can break (changed crates + their reverse-dependency closure), with a
  # full-fallback valve for graph-invalidating files. Downstream jobs consume
  # `needs.affected.outputs.{needs_full,crates}` to scope their work to that
  # subset, cutting PR feedback without dropping merge-gating coverage.
  #
  # On any non-PR event (push to main, merge_group) it emits `needs_full=true`,
  # so the full workspace always runs on the branch that gates merges — the
  # affected subset can only narrow PR feedback, never what reaches main. If
  # this job itself errors, consumers fall back to FULL (see the grade job's
  # `needs.affected.result` guard), so a miss here is fail-safe, never a hole.
  affected:
    name: Affected crates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      needs_full: ${{ steps.compute.outputs.needs_full }}
      crates: ${{ steps.compute.outputs.crates }}
    steps:
      # fetch-depth: 0 — the diff is `origin/<base>...HEAD`, which needs the
      # merge-base, i.e. enough history of both sides.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Compute affected set
        id: compute
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Non-PR event (${{ github.event_name }}) → full workspace."
            echo "needs_full=true" >> "$GITHUB_OUTPUT"
            echo "crates=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Populate origin/<base> so the merge-base diff resolves.
          git fetch --no-tags --prune origin "${{ github.base_ref }}"
          JSON=$(cargo run -q -p xtask --release -- \
            affected --base "origin/${{ github.base_ref }}" --json)
          echo "affected: $JSON"
          echo "needs_full=$(echo "$JSON" | jq -r '.needs_full')" >> "$GITHUB_OUTPUT"
          echo "crates=$(echo "$JSON" | jq -r '.crates | join(",")')" >> "$GITHUB_OUTPUT"
        shell: bash

  # ============================================================================
  # XTASK GRADE - Single source of truth for the seven automated criteria
  # ============================================================================
  # Replaces four formerly-separate bash-reimplementation jobs (clippy, docs,
  # safety, bevy-free) with one invocation of the Rust grader. Single source
  # of truth at xtask/src/grade.rs — no parallel policy layers to drift.
  #
  # Post-L0-refactor, this also enforces Layer Integrity (tier-aware dep-graph
  # checks, hard-gate) and WASM Compatibility (L0-tier wasm32 build, hard-gate).
  #
  # --skip-coverage: coverage runs cargo llvm-cov in release (5-10 min per
  # crate); too slow for per-PR CI. It runs locally and in dedicated jobs.
  #
  # Sharded across 3 parallel runners via `grade-all --shard i/3` (round-robin
  # over the sorted crate list, so heavy crates like cf-cast/sim-soft scatter
  # evenly). This was the sole ~40m long pole; 3 shards take it to ~13m and off
  # the critical path. The downstream `quality-gate` job `needs: [grade]`, which
  # waits for all matrix legs and fails if any shard fails — so branch
  # protection on `Quality Gate` still gates every crate. Each shard keeps its
  # own rust-cache (matrix value is part of the key). Bump the shard count here
  # AND the `/3` denominator in the run step together if the workspace grows.
  #
  # PR-scoping: on a pull request this grades only the affected crates
  # (`--only`, from the `affected` job) instead of the whole workspace; on
  # main/merge it grades everything. The job always runs (`if: !cancelled()`)
  # so it is never a *skipped required check* — and if the `affected` job did
  # not succeed, it falls back to a FULL grade rather than trusting an empty
  # set (which would be a silent coverage hole).
  grade:
    name: xtask Grade (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [affected]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: cargo xtask grade-all --skip-coverage --shard ${{ matrix.shard }}/3
        env:
          # Emit per-file safety debug + doc stderr tail on F so CI logs
          # surface the actual failure cause rather than opaque counts.
          XTASK_GRADE_DEBUG: "1"
        # Scope to the affected subset ONLY when the affected job succeeded, the
        # event is a PR, and it didn't trip the full-fallback valve. Every other
        # path (non-PR, needs_full, affected failed/skipped) grades the full
        # workspace — under-scoping requires a positive, trustworthy signal.
        run: |
          if [ "${{ needs.affected.result }}" = "success" ] \
            && [ "${{ github.event_name }}" = "pull_request" ] \
            && [ "${{ needs.affected.outputs.needs_full }}" != "true" ]; then
            echo "PR-scoped grade (--only): ${{ needs.affected.outputs.crates }}"
            cargo run -p xtask --release -- grade-all --skip-coverage --quiet \
              --shard ${{ matrix.shard }}/3 --only "${{ needs.affected.outputs.crates }}"
          else
            echo "Full grade (non-PR / needs_full / affected unavailable)."
            cargo run -p xtask --release -- grade-all --skip-coverage --quiet \
              --shard ${{ matrix.shard }}/3
          fi
        shell: bash

  # ============================================================================
  # TESTS (DEBUG) - Default features, debug profile — light-crate gate
  # ============================================================================
  # Runs `cargo test` (default features, debug) on the workspace crates whose
  # tests finish quickly in debug mode — mostly libs, plus `tools/` bins whose
  # tests are pure-function. The three shard lists below are the SOURCE OF TRUTH
  # for that set (a hardcoded count here rots; this comment previously said 23
  # when the shards named 42). The grade job's `--skip-coverage` flag skips its
  # Coverage criterion (which is what runs cargo test inside grade), so this job
  # + tests-release are the SOLE test-execution gate in CI.
  #
  # `--all-features` is intentionally absent (plan §6.1): Layer Integrity in
  # the grader enforces all-features cleanliness; running it again here would
  # just re-pay the bevy_ecs / image / zip / criterion compile cost on every
  # consumer's test build for no additional signal.
  # SHARDING (3 legs, mirrors `tests-release` + `grade`): on a foundational
  # `sim-core` PR the affected set is nearly the whole crate list, so this job is
  # COMPILE-bound (it rebuilds ~30 crates in debug) and was the single ~25-min
  # long pole — within ~5 min of its own timeout. (Test *execution* is trivial:
  # the slowest single suite measured ~39 s; the cost is compilation.)
  #
  # The split is BY DEPENDENCY TREE, not round-robin: a first attempt that
  # round-robined crates by count left one shard compiling BOTH giant optional
  # trees (Bevy via sim-bevy-soft + Slint/wgpu via cf-studio-gui) and it stayed
  # at ~25 min. Each giant tree must compile *somewhere*, so the win comes from
  # co-locating each tree's consumers on ONE shard (it compiles once, not 2-3×):
  #   - shard 1 = the Bevy tree   (cf-bevy-common, sim-bevy-soft, cf-viewer, sim-ml-chassis-bevy,
  #                                cf-spine-studio, cf-sim-research, cf-scan-prep, cf-device-design,
  #                                cf-device-geometry)
  #   - shard 2 = the Slint tree  (cf-studio-{core,engine,gui,studio}; cf-studio-gui pulls ~12 slint crates)
  #   - shard 3 = FEM + core + mesh (sim-soft, sim-core, sim-mjcf, …) — no Bevy, no Slint
  # `sim-core` is a universal dep so it compiles in every shard regardless (the
  # wall-time floor); only the two GUI trees are isolable. Rebalance the lists if
  # a shard's measured time drifts. Crates intentionally in NO shard (run
  # elsewhere or not unit-tested): sim-bevy (fragile headless graphics; clippy in
  # `grade` covers it), examples (255, no #[test] — those declaring
  # `example_kind = "validator"` are RUN red-or-green by the `validate-examples`
  # job below; the rest are demos or not-yet-classified, compile-checked by
  # `grade`'s clippy only),
  # -benches (5), and the heavy stochastic-physics
  # validators sim-ml-chassis / sim-thermostat / sim-rl / sim-conformance-tests /
  # sim-opt / sim-rl-baselines (run in `tests-release` below).
  #
  # This job's crate lists are the ONLY hand-maintained crate enumeration in CI
  # (`grade` uses `grade-all --shard i/3`, which walks every crate automatically but
  # passes `--skip-coverage`, so it executes NO tests). That is why crates drift out
  # of coverage here and nowhere else — a crate absent from these lists and from
  # `tests-release` has its unit tests run in NO CI context at all.
  #
  # Included on that basis:
  #   - cf-spine-studio, cf-sim-research, cf-scan-prep, cf-device-design — `tools/`
  #     BIN crates, no tier metadata, exempt from xtask's Layer-Integrity grader.
  #     That exemption is about GRADING, not TESTING. Their tests are pure-function
  #     (no App::new() / window spin-up), so headless CI runs them with the
  #     x11/wayland dev libs installed below. All carry the Bevy+egui tree, so
  #     shard 1 is the co-located home (+20 net crates vs +134/+193 on shards 2/3,
  #     which would compile that tree a SECOND time).
  #   - cf-device-geometry — a `design/` LIBRARY (Bevy+egui, so shard 1). Its 50 tests
  #     ran in NO CI context until its `extract_layer_surface` envelope assert was
  #     fixed: it was a `debug_assert!` (compiled out of the release builds that ship,
  #     guarding SILENT geometry clipping) against the `LAYER_GRID_MARGIN_M` constant
  #     rather than the margin the cache was actually built with, and it was symmetric
  #     when the envelope is outward-only. Now a hard `assert!` on
  #     `CachedScanSdf::max_extractable_iso()`. Green in debug AND release.
  #   - cf-device-types — NOT a tools/ bin: a `design/` LIBRARY with tier metadata
  #     (`tier = "L0"`, `tier_up_features = { bevy = "L1" }`), so grade-all DOES
  #     grade it; only `--skip-coverage` keeps its tests from running there. It is
  #     GUI-free, so it lands on shard 2 for +0 new crates. Do not strip its tier
  #     metadata or drop it from shard 2 on the belief that grade covers its tests.
  #   - xtask — the quality tool itself. Its unit tests (shard/only selection,
  #     validator-audit, and the `workflow_gate` CI-config self-test) are
  #     pure-function + GUI-free but ran in NO required CI context: `grade-all
  #     --skip-coverage` executes none, and the pre-commit hook is fmt+clippy only
  #     (NOT tests). So the `workflow_gate` self-test in particular could not fire
  #     on the very PR that adds a mis-wired job. On shard 2 (GUI-free); any
  #     `.github/**` edit trips needs_full → the full shard 2 list runs → `cargo
  #     test -p xtask` executes the guard. Do NOT drop it on the belief that grade
  #     or pre-commit covers its tests — neither runs them.
  # All 326 of these tests execute in ~1.6 s; the cost of adding them is COMPILE +
  # test-binary LINK time, not test execution. Each Bevy+egui bin statically links
  # the full tree, so watch shard 1's wall time (21.9/30 min as of #554) and
  # rebalance — or add a 4th shard — if it drifts past ~25 min.
  #
  # The `quality-gate` job `needs: [tests-debug]` waits for ALL matrix legs and
  # fails if any shard fails, so the `Quality Gate` required check still gates
  # every crate. Each shard keeps its own rust-cache (matrix value keys it).
  tests-debug:
    name: Tests (debug — shard ${{ matrix.id }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # PR-scoped to each shard's crate list (see the `affected` job); always runs
    # (`if: !cancelled()`) so it is never a skipped required check, and falls
    # back to the full shard list on any non-PR / needs_full / affected-failed
    # path via .github/scripts/affected-packages.sh.
    needs: [affected]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: 1
            crates: cf-bevy-common sim-bevy-soft cf-viewer sim-ml-chassis-bevy cf-spine-studio
              cf-sim-research cf-scan-prep cf-device-design cf-device-geometry
              mesh-types mesh-io mesh-repair mesh-loft mesh-select mesh-sdf mesh-offset mesh-shell mesh-measure
              cf-msk-lib cf-mjcf-emit cf-osim
          - id: 2
            crates: cf-studio-core cf-studio-engine cf-studio-gui cf-studio
              cf-geometry cf-spatial cf-scan-prep-core mesh-printability mesh-lattice mesh
              cortenforge cf-msk-fit cf-anthro cf-cap-planes cf-device-types xtask
          - id: 3
            crates: sim-soft sim-core sim-mjcf sim-urdf sim-gpu sim-types
              sim-therm-env cf-design cf-design-tests cf-fsu-geometry cf-routing cf-routing-tests cf-cast-cli sim
              pbit-analyze pbit-fw-core
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Run tests
        env:
          AFFECTED_RESULT: ${{ needs.affected.result }}
          AFFECTED_FULL: ${{ needs.affected.outputs.needs_full }}
          AFFECTED_CRATES: ${{ needs.affected.outputs.crates }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Intersect this shard's dependency-tree-balanced crate list (see the
          # matrix above) with the PR-affected set (full on main/merge/fallback).
          PKGS=$(bash .github/scripts/affected-packages.sh "${{ matrix.crates }}")
          if [ -z "$PKGS" ]; then
            echo "tests-debug shard ${{ matrix.id }}: no affected crates in this shard — skipping."
            exit 0
          fi
          echo "tests-debug shard ${{ matrix.id }} packages: $PKGS"
          cargo test $PKGS
          # mesh-io's 3MF unit-scaling tests are behind the non-default
          # `threemf` feature, so run that crate again with it enabled —
          # only when mesh-io is in this shard's selected set.
          case " $PKGS " in
            *" -p mesh-io "*) cargo test -p mesh-io --features threemf ;;
          esac
        shell: bash

  # ============================================================================
  # TESTS (RELEASE) - Default features, --release — heavy-physics gate
  # ============================================================================
  # Runs `cargo test --release` on the crates whose default test suite
  # contains stochastic-physics validators (Boltzmann learning, CEM
  # convergence, REINFORCE, SA/PT optimizers, MuJoCo conformance) doing
  # 90M–600M physics steps each.
  #
  # Why --release here specifically (plan §6.5, `feedback_release_mode_heavy_tests.md`):
  # in debug mode `gate_a_kl_convergence` (sim-thermostat::boltzmann_learning)
  # measured 10+ min on warm-cache MBP and didn't complete in a 27-min sweep;
  # the same test in --release completed in 82s — a 5–10× speedup. The
  # --release compile cost is paid once per crate per cold-cache run; the
  # test-execution savings dominate. Runs in parallel with tests-debug on a
  # separate runner so the --release compile doesn't extend the wall time of
  # the lighter crates.
  #
  # SHARDING (3 legs, mirrors the `grade` job): this was a ~29-min sequential
  # monolith — TEST-EXECUTION-bound, not compile-bound (per reference_ci_timing).
  # PR #1 sharded it 3 ways (29 → ~18 min). The measured per-shard breakdown then
  # revealed the long pole is a SINGLE indivisible crate, sim-thermostat (~17 min
  # of stochastic validators — coupled_bistable_array alone ~7.7 min); the other
  # crates combined are ~6 min, so re-balancing the crate GROUPS can't beat ~18.
  #
  # PR #1b attacks that with cargo-nextest (below): `cargo test` runs one binary
  # at a time, so sim-thermostat's six heavy validator binaries ran back-to-back;
  # nextest's process-per-test scheduler runs tests across all binaries
  # concurrently on the runner's cores, collapsing the thermostat shard toward
  # ~9-10 min without changing the crate groups. The groups are kept hand-spread
  # (conformance/thermostat/rl/opt/ml-chassis distributed) so nextest's win lands
  # on the right shard; further gains need per-test partitioning or a faster
  # linker, deferred until measurement shows they're needed.
  #
  # sim-rl-baselines sits in shard 1 (with conformance/coupling, the lightest
  # leg): it holds the RL-baseline fixtures moved out of thermostat/therm-env/
  # opt, nearly all `#[ignore]`d (only two ~0.3s parity checks run), so in CI
  # it is effectively a COMPILE gate — shard 1 has the spare capacity and keeps
  # it off shard 3 where sim-rl itself already runs.
  #
  # The downstream `quality-gate` job `needs: [tests-release]` waits for all
  # matrix legs and fails if any fails, so branch protection still gates every
  # crate. Each shard keeps its own rust-cache (matrix value is part of the key);
  # 3 legs (not matrix-per-crate) keeps the cache-key count bounded under the
  # 10 GB repo ceiling.
  tests-release:
    name: Tests (release, heavy — shard ${{ matrix.id }}/3)
    runs-on: ubuntu-latest
    # Heavy stochastic validators; 45 min guards a hung test without masking a
    # genuine ~9-10 min shard (post-nextest). Tune down once re-measured.
    timeout-minutes: 45
    # PR-scoped to the affected crates (see the `affected` job); always runs so
    # it is never a skipped required check, and falls back to the full shard
    # list on any non-PR / needs_full / affected-failed path. `crates` are bare
    # names here (not `-p` flags) so affected-packages.sh can intersect them.
    needs: [affected]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: 1
            crates: sim-conformance-tests sim-coupling cf-fsu-model sim-rl-baselines
          - id: 2
            crates: sim-thermostat sim-opt mesh-printability
          - id: 3
            crates: sim-ml-chassis sim-rl cf-codesign
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      # cargo-nextest runs each test in its own process under a single scheduler
      # across ALL test binaries — unlike `cargo test`, which runs one binary at
      # a time. sim-thermostat's ~17 min was six heavy validator binaries run
      # back-to-back; nextest fills the runner's idle cores with tests from other
      # binaries, collapsing that toward max(longest single test, total / cores).
      # Prebuilt binary, ~5-10 s install.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Resolve this shard's crates against the affected set ONCE; the nextest
      # and doctest steps reuse PKGS, and SOFT_PKGS gates the sim-soft step.
      - name: Select affected packages
        env:
          AFFECTED_RESULT: ${{ needs.affected.result }}
          AFFECTED_FULL: ${{ needs.affected.outputs.needs_full }}
          AFFECTED_CRATES: ${{ needs.affected.outputs.crates }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          PKGS=$(bash .github/scripts/affected-packages.sh "${{ matrix.crates }}")
          echo "PKGS=$PKGS" >> "$GITHUB_ENV"
          echo "shard ${{ matrix.id }} packages: ${PKGS:-<none>}"
          # sim-soft isn't in any shard's crate list (it runs as selective test
          # bins below), so resolve it independently.
          SOFT_PKGS=$(bash .github/scripts/affected-packages.sh "sim-soft")
          echo "SOFT_PKGS=$SOFT_PKGS" >> "$GITHUB_ENV"
          # cf-cast (Monte-Carlo mold kernel) runs --lib-only below: its 358
          # library tests are the gate, but two tests/ characterisation probe
          # files are exploratory spikes (not regression gates) that currently
          # fail on a geometry behaviour drift — see the cf-cast FDM arc. Kept
          # out of any shard's crate list so nextest doesn't pick up the probes.
          CAST_PKGS=$(bash .github/scripts/affected-packages.sh "cf-cast")
          echo "CAST_PKGS=$CAST_PKGS" >> "$GITHUB_ENV"
          # Doctests require a lib target. When a shard's affected set is only
          # test-only crates (no lib — e.g. sim-conformance-tests), a bare
          # `cargo test --doc -p <that>` fails with "no library targets found".
          # Filter PKGS down to lib-bearing crates for the doctest step; an
          # empty result makes that step a no-op pass (guarded by DOC_PKGS != '').
          LIB_CRATES=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(any(.targets[]; .kind == ["lib"])) | .name')
          DOC_PKGS=""
          for pkg in $PKGS; do
            [ "$pkg" = "-p" ] && continue
            for lib in $LIB_CRATES; do
              if [ "$lib" = "$pkg" ]; then
                DOC_PKGS="$DOC_PKGS -p $pkg"
                break
              fi
            done
          done
          DOC_PKGS=${DOC_PKGS# }
          echo "DOC_PKGS=$DOC_PKGS" >> "$GITHUB_ENV"
          echo "shard ${{ matrix.id }} doc packages: ${DOC_PKGS:-<none>}"
        shell: bash

      - name: Run tests (nextest, --release)
        # sim-coupling (the keystone soft↔rigid bridge) runs here, not in
        # tests-debug: its differentiable-coupling gates drive the soft FEM
        # solver (slow in debug, like sim-soft). The whole suite is ~16 s in
        # release. Without this the keystone gradient gates execute in NO CI
        # job (grade shards use `--skip-coverage`, which skips test-running).
        if: env.PKGS != ''
        run: cargo nextest run --release $PKGS
        shell: bash

      # nextest does NOT run doctests (a known limitation — its process-per-test
      # model can't host them). `cargo test --doc` is the documented companion
      # step, so this preserves doctest coverage that `cargo test` ran before
      # the nextest switch (e.g. mesh-printability's 4 doctests). Doctests are
      # compile-bound and trivially fast to execute.
      - name: Run doctests (--release)
        if: env.DOC_PKGS != ''
        run: cargo test --release --doc $DOC_PKGS
        shell: bash

      # sim-soft release-only contact tests live on shard 3. Phase 5 commits
      # 9 + 10 mark V-3 / V-5 / V-4-V-3 / V-4-V-5 as
      # `#[cfg_attr(debug_assertions, ignore)]` per
      # `feedback_release_mode_heavy_tests`. The crate itself runs in
      # `tests-debug` for V-1 / V-2 / V-3a / V-6 + 220+ legacy tests; these
      # `--test` selections add the cfg-attr-debug-skip release-only paths only
      # (avoids 2× compile cost on debug-already-covered tests). Runs when
      # sim-soft is affected (SOFT_PKGS non-empty → also true on the full path).
      - name: Run sim-soft release-only contact tests
        if: matrix.id == 3 && env.SOFT_PKGS != ''
        run: |
          cargo test --release -p sim-soft \
            --test hertz_sphere_plane \
            --test contact_drop_rest \
            --test non_interpenetration
        shell: bash

      # cf-cast's mold/cast kernel (358 library tests) runs --lib-only in
      # release (its Monte-Carlo probes are ~30× slower in debug). --lib
      # deliberately excludes the tests/ characterisation probe files, which
      # are exploratory spikes rather than regression gates. Pinned to shard 1
      # so it runs once. Without this the whole kernel executes in NO CI job.
      - name: Run cf-cast library tests (--lib, --release)
        if: matrix.id == 1 && env.CAST_PKGS != ''
        run: cargo nextest run --release --lib -p cf-cast
        shell: bash

  # ============================================================================
  # CROSS-OS - Platform-sensitive crates only on macOS + Windows
  # ============================================================================
  # Per plan §6.3 (b): cross-OS coverage limited to crates with legitimate
  # cross-OS concerns (FP determinism, mmap behavior, file-path handling).
  # ubuntu coverage is provided by the `tests-debug` + `tests-release` jobs;
  # this matrix adds macOS + Windows for the three crates where it actually
  # matters.
  #
  # Selection rationale:
  # - sim-core: physics integration, FP determinism is load-bearing
  # - sim-mjcf: XML parsing + file-path resolution (textures, hfields, includes)
  # - mesh-io: multi-format mesh I/O, file-path / endianness concerns
  # - mesh-printability: §6.3 Gap H TrappedVolume voxel inside-test
  #   (scanline ray-tri parity + flood-fill) is FP-drift-sensitive per
  #   §8.2.1 Phase-4-faer-LDLᵀ lesson. Cross-os matrix catches platform-
  #   divergent hard-fails (different `pairs_count` on Windows or
  #   scanline parity flips on macOS) that single-OS coverage would miss.
  #   Per v0.8 fix arc spec §10.4.1.
  cross-os:
    name: Cross-OS Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    # PR-scoped to the affected crates; always runs (never a skipped required
    # check), full on non-PR / needs_full / affected-failed. A Cargo.lock change
    # trips the full-fallback valve → needs_full → the Cendrillon pin guard
    # below still runs, so lockfile drift is never silently skipped.
    needs: [affected]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Select affected packages
        env:
          AFFECTED_RESULT: ${{ needs.affected.result }}
          AFFECTED_FULL: ${{ needs.affected.outputs.needs_full }}
          AFFECTED_CRATES: ${{ needs.affected.outputs.crates }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          PKGS=$(bash .github/scripts/affected-packages.sh "sim-core sim-mjcf mesh-io mesh-printability")
          echo "PKGS=$PKGS" >> "$GITHUB_ENV"
          GUI_PKGS=$(bash .github/scripts/affected-packages.sh "cf-studio-gui")
          echo "GUI_PKGS=$GUI_PKGS" >> "$GITHUB_ENV"
        shell: bash

      - name: Run tests (default features)
        if: env.PKGS != ''
        run: cargo test $PKGS
        shell: bash

      # Build Cendrillon (the only thing released for Windows) on each OS,
      # --locked, so a lockfile drift that breaks the Windows build — e.g. a
      # cargo update dropping gpu-allocator's windows 0.62.2 pin — fails the
      # PR here instead of silently dropping the Windows download at release.
      # A Cargo.lock change trips needs_full (→ GUI_PKGS non-empty), so the
      # guard always runs exactly when a lockfile drift could occur.
      - name: Build Cendrillon (guards the Windows windows-crate pin)
        if: env.GUI_PKGS != ''
        run: cargo build --locked -p cf-studio-gui
        shell: bash

  # ============================================================================
  # FEATURE COMBOS - Non-default feature paths
  # ============================================================================
  # Default-features tests run in `tests-debug` + `tests-release`; this job
  # covers the feature paths that aren't the default. Add new combos here as
  # features land.
  #
  # Currently:
  # - sim-soft `gpu-probe`: tier-up feature pulling wgpu/bytemuck/pollster.
  #   `tests/invariant_6_gpu_probe.rs` is `#![cfg(feature = "gpu-probe")]`-
  #   gated and gracefully skips when no wgpu adapter is available
  #   (headless CI), so this gate exercises the build graph + skip path.
  feature-combos:
    name: Feature Combos
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # PR-scoped: the only combo is sim-soft's `gpu-probe`, so this runs when
    # sim-soft is affected (and always on non-PR / needs_full / fallback).
    needs: [affected]
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: Select affected packages
        env:
          AFFECTED_RESULT: ${{ needs.affected.result }}
          AFFECTED_FULL: ${{ needs.affected.outputs.needs_full }}
          AFFECTED_CRATES: ${{ needs.affected.outputs.crates }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          SOFT_PKGS=$(bash .github/scripts/affected-packages.sh "sim-soft")
          echo "SOFT_PKGS=$SOFT_PKGS" >> "$GITHUB_ENV"
          FACADE_PKGS=$(bash .github/scripts/affected-packages.sh "cortenforge")
          echo "FACADE_PKGS=$FACADE_PKGS" >> "$GITHUB_ENV"
        shell: bash

      - name: Test sim-soft with gpu-probe
        if: env.SOFT_PKGS != ''
        run: cargo test --features gpu-probe -p sim-soft

      # The default-feature build (tests-debug) only exercises the facade with
      # ALL domains on. These subset builds guard the per-domain feature gating
      # (a mesh-only app must not have to build the sim spine) against a cfg
      # typo silently un-gating or breaking a domain.
      - name: Check cortenforge facade feature subsets
        if: env.FACADE_PKGS != ''
        run: |
          cargo check -p cortenforge --no-default-features
          cargo check -p cortenforge --no-default-features --features mesh
          cargo check -p cortenforge --no-default-features --features fabrication
          cargo check -p cortenforge --no-default-features --features sim

  # ============================================================================
  # DEPENDENCIES - License / source audit via cargo-deny
  # ============================================================================
  # Complements the grade job's dep-justification scan with a cargo-deny
  # licence + source audit (different concern; both layers run).
  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Check licenses and sources
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses sources

  # ============================================================================
  # SEMVER - Breaking change detection
  # ============================================================================
  semver:
    name: Semver
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on PRs (compare against base branch)
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check semver compatibility
        uses: obi1kenobi/cargo-semver-checks-action@v2
        # Only check crates that are published to crates.io
        # New/unpublished crates should be added here once published
        with:
          # For now, only check mesh-repair which has a published baseline
          # Other crates are not yet on crates.io
          package: mesh-repair
        continue-on-error: true  # Don't block PRs on semver for now

  # ============================================================================
  # SBOM - Software Bill of Materials generation
  # ============================================================================
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json
          # Find and rename the generated SBOM (name varies by workspace structure)
          find . -name "*.cdx.json" -not -path "./target/*" | head -1 | xargs -I{} cp {} sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json

  # ============================================================================
  # VALIDATE EXAMPLES - Run the example-validators red-or-green
  # ============================================================================
  # Every headless `examples/**` crate declares a role in Cargo.toml under
  # `[package.metadata.cortenforge] example_kind = "validator" | "demo"`. A
  # `validator` self-checks against oracles (energy drift, momentum
  # conservation, a closed-form stress, …) and terminates with a NON-ZERO exit
  # on failure — via `exit(1)` OR a panicking `assert!` (a panic aborts main
  # with code 101), so both idioms are gated identically. The
  # tests-debug/tests-release shards (CI's only test-execution gate) exclude
  # examples (no `#[test]`), so a validator's checks otherwise run NOWHERE. This
  # job runs them: `xtask run-validators` discovers every crate declaring
  # `example_kind = "validator"` and runs each in --release, failing if any
  # exits non-zero (and failing if ZERO are discovered — a silent green no-op
  # would be the very "passing CI ≠ tests ran" hole this closes). Discovery is
  # by manifest marker, not a hand-maintained list, so a new marked validator is
  # gated automatically (unlike the tests-debug shard lists, CI's one
  # hand-maintained enumeration and its sole drift source). It also audits the
  # classification contract and HARD-FAILS on either gap: every headless example
  # that declares no kind (reported with a validator?/demo? triage hint) and any
  # `demo` whose source self-gates. The gap check runs before the validators, so
  # a metadata-only violation fails fast.
  #
  # AFFECTED-SCOPED + SHARDED (mirrors `grade`): the validator fleet has grown
  # past ~40 crates — some pulling the ML/RL tree — so building+running the whole
  # set in --release cost ~22 min even on a docs-only PR. The run is now
  # PR-scoped and fanned across 3 shards, exactly like `grade`:
  #   - `--only <affected>` runs only validators whose crate is in the affected
  #     set (changed crates + reverse-dep closure). A docs/config PR affects no
  #     validator → every shard no-ops in seconds.
  #   - `--shard i/3` splits the rest across parallel jobs, so a foundational PR
  #     (affected ≈ whole workspace) still finishes fast.
  # The classification audit inside `run-validators` ALWAYS covers the whole
  # workspace regardless of `--only`/`--shard` (the contract is the drift
  # backstop), and discovering zero validators is still a hard-fail; an empty set
  # *after* affected/shard filtering is a legitimate no-op. Scoping requires a
  # positive signal (affected succeeded, PR event, full-fallback valve not
  # tripped) — every other path runs the full fleet, and a `.github/**` change
  # trips `needs_full`, so edits to THIS job run the full validator set. GUI-free
  # today, so no apt libs; add them if a GUI-dependent validator is ever marked.
  #
  # `if: !cancelled()` (not a bare unconditional job) so a skipped/failed
  # `affected` never turns this into a skipped *required* check — mirroring
  # `grade`; the final `quality-gate` job's `needs: […]` enforces block-on-red
  # across all shards.
  validate-examples:
    name: Validate Examples (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [affected]
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      - name: cargo xtask run-validators --shard ${{ matrix.shard }}/3
        # Scope to the affected subset ONLY on a positive PR signal (affected
        # succeeded, PR event, full-fallback valve not tripped); every other path
        # runs the full fleet. Mirrors the `grade` job's guard.
        run: |
          if [ "${{ needs.affected.result }}" = "success" ] \
            && [ "${{ github.event_name }}" = "pull_request" ] \
            && [ "${{ needs.affected.outputs.needs_full }}" != "true" ]; then
            echo "PR-scoped validators (--only): ${{ needs.affected.outputs.crates }}"
            cargo run -p xtask --release -- run-validators \
              --shard ${{ matrix.shard }}/3 --only "${{ needs.affected.outputs.crates }}"
          else
            echo "Full validator run (non-PR / needs_full / affected unavailable)."
            cargo run -p xtask --release -- run-validators \
              --shard ${{ matrix.shard }}/3
          fi
        shell: bash

  # ============================================================================
  # FINAL GATE
  # ============================================================================
  # This aggregator is the SOLE required status check in the `main` ruleset, so
  # it must post an unambiguous pass/fail. Two properties make that safe:
  #   - `if: ${{ !cancelled() }}` — it ALWAYS runs (barring cancellation) even
  #     when a dependency failed. A bare `needs:` job would instead be SKIPPED on
  #     any red dependency, and a skipped *required* check is the well-known
  #     GitHub hole that can count as passing — silently letting a red build
  #     merge. Running-then-checking removes that ambiguity.
  #   - the verify step fails on ANY dependency result other than `success`
  #     (failure / cancelled / skipped), so one red shard turns the gate red.
  # Every gated job runs unconditionally (`format`, `dependencies`) or under
  # `if: !cancelled()` (the affected-scoped matrices), so none produces a
  # legitimate `skipped` except under cancellation — when this job doesn't run
  # either. `affected`/`sbom`/`semver` are intentionally NOT gated (infra /
  # advisory); the `workflow_gate` xtask test (run via the `tests-debug` shard —
  # xtask is a shard-2 member, and any `.github/**` edit trips needs_full)
  # enforces that every OTHER job is listed in `needs` so a new gating job can't
  # silently escape the gate.
  # ============================================================================
  # SOFT CONTACT (HEAVY) - the demand-#1 indentation gate, #676
  # ============================================================================
  # `bonded_layer_indentation` is the ONLY gate holding demand #1 of the Tet10
  # arc: it established, with a 3-level cell-convergence study, that Tet4
  # over-stiffens the curved contact patch by a mesh-converged ~9 %
  # (extrapolated floor 1.0915). It has run in NO CI job since it landed —
  # release-only AND unregistered — so this job ends that.
  #
  # ★ Why its own job, and why a PATH filter rather than the affected set.
  # Measured 24.2 min locally; CI is 1.0-2.2x slower (the three registered
  # contact tests are 2.90 min local vs 6.42 min in CI), so it may approach an
  # hour. Two consequences:
  #   1. It cannot live in `tests-release` shard 3 (45-min timeout, already
  #      13.4 min of other work). Hence a dedicated job with 90 min, which
  #      cannot time out at either end of that uncertainty range.
  #   2. It must NOT be gated on SOFT_PKGS like the other sim-soft steps.
  #      That flag is the affected set = changed crates + REVERSE-DEP CLOSURE,
  #      and sim-soft depends on cf-geometry / mesh-offset / mesh-types /
  #      sim-ml-chassis — so editing a foundational crate would fire an
  #      hour-long contact-indentation job with no relation to the change. The
  #      path filter fires it when someone actually touches the soft engine,
  #      i.e. when demand #1 can regress and the PR author is the right person
  #      to wait for it.
  #
  # A weekly run in `scheduled.yml` is the backstop for the case this filter
  # misses by construction: a dependency change that genuinely breaks the
  # contact force law without touching sim/L0/soft/**.
  #
  # The job ALWAYS runs (`if: !cancelled()`) so it is never a skipped required
  # check — the aggregator treats any non-`success` result, including
  # `skipped`, as failure. The path decision gates the STEP, not the job, which
  # is the same shape `tests-debug` uses for its affected set.
  soft-contact-heavy:
    name: sim-soft heavy contact (#676)
    runs-on: ubuntu-latest
    # Generous: measured 24.2 min locally against a 1.0-2.2x CI factor. Sized so
    # a slow runner cannot turn a passing gate into a timeout failure, which
    # would read as a real defect and teach people to ignore it.
    timeout-minutes: 90
    if: ${{ !cancelled() }}
    steps:
      # fetch-depth: 0 — the path decision diffs against the PR base, which
      # needs the merge-base, i.e. enough history of both sides.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide whether the soft engine changed
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # PR-only by design: on push/merge_group the weekly scheduled run is
          # the coverage, so a ~1 h job never sits between a merge and main.
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "not a pull_request ($EVENT_NAME) — weekly scheduled run covers this"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          if git diff --name-only "origin/$BASE_REF...HEAD" | grep -q '^sim/L0/soft/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "sim/L0/soft/ touched — running the demand-#1 indentation gate"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "sim/L0/soft/ untouched — skipping (deliberately NOT the affected set)"
          fi
        shell: bash

      - name: Install system dependencies
        if: steps.scope.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libasound2-dev libudev-dev libfontconfig1-dev

      - name: Install Rust
        if: steps.scope.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.scope.outputs.run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' }}

      # Release-only by its own cfg_attr, and genuinely heavy: a 71-increment
      # displacement ramp over three meshes plus a 3-level convergence study.
      - name: Run the demand-#1 bonded-layer indentation gate
        if: steps.scope.outputs.run == 'true'
        run: cargo test --release -p sim-soft --test bonded_layer_indentation
        shell: bash

  quality-gate:
    name: Quality Gate
    needs: [format, grade, tests-debug, tests-release, cross-os, feature-combos, dependencies, validate-examples, soft-contact-heavy]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify all required jobs succeeded
        shell: bash
        # `join(needs.*.result, ',')` is the aggregated result of each needed
        # job (for a matrix job, `success` only if EVERY shard passed). Fail the
        # gate if any is not exactly `success`.
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "dependency results: $results"
          if printf '%s' "$results" | tr ',' '\n' | grep -qvx 'success'; then
            echo "::error::Quality Gate: a required job did not succeed ($results)"
            exit 1
          fi
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    QUALITY GATE PASSED                        ║"
          echo "║  All required jobs succeeded — A-grade standard met.          ║"
          echo "║  Ready for API review and merge.                             ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
