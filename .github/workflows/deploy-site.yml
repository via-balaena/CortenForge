name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/studies/biological_navigation/src/**'
      - 'docs/studies/biological_navigation/book.toml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mdbook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Build research book
        run: mdbook build docs/studies/biological_navigation

      - name: Assemble site
        run: |
          mkdir -p _site
          cp site/index.html _site/
          cp site/style.css _site/
          cp site/CNAME _site/
          cp -r docs/studies/biological_navigation/book _site/research

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
