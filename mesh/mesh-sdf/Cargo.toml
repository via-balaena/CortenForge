[package]
name = "mesh-sdf"
version = "0.7.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Signed distance field computation for triangle meshes"
repository = "https://github.com/cortenforge/cortenforge"
keywords = ["mesh", "sdf", "distance-field", "3d", "geometry"]
categories = ["algorithms", "graphics", "game-development"]

[dependencies]
# Shared mesh data structures (workspace)
mesh-types = { workspace = true }
# Linear algebra (vectors, matrices, rotations)
nalgebra = { workspace = true }
# Derive error types
thiserror = { workspace = true }

[dev-dependencies]
# Approximate equality for numeric tests
approx = { workspace = true }
