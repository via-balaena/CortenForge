[package]
name = "mesh-sdf"
version.workspace = true
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Signed distance field computation for triangle meshes"
repository = "https://github.com/cortenforge/cortenforge"
keywords = ["mesh", "sdf", "distance-field", "3d", "geometry"]
categories = ["algorithms", "graphics", "game-development"]

[package.metadata.cortenforge]
tier = "L0"

[dependencies]
# Shared mesh data structures (workspace)
mesh-types = { workspace = true }
# `Sdf` trait owner — mesh-sdf hosts the `impl Sdf for Signed<D, S>` +
# `impl Sdf for CachedGridSdf` adapter blankets. The trait moved from
# cf-design to cf-geometry so sim-soft can depend on the contract
# without pulling the design kernel.
cf-geometry = { workspace = true }
# Linear algebra (vectors, matrices, rotations)
nalgebra = { workspace = true }
# Derive error types
thiserror = { workspace = true }
# BVH-backed mesh queries (closest-point + inside test via pseudo-normals).
# Backs SignedDistanceField; per-query cost drops O(faces) -> O(log faces).
parry3d = { workspace = true }

[dev-dependencies]
# Approximate equality for numeric tests
approx = { workspace = true }
