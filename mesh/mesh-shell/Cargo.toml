[package]
name = "mesh-shell"
description = "Generate printable shells around 3D meshes"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords = ["mesh", "3d", "shell", "offset", "printing"]
categories = ["graphics", "algorithms"]

[package.metadata.cortenforge]
tier = "L0"

[lints]
workspace = true

[dependencies]
# Shared mesh data structures (workspace)
mesh-types = { workspace = true }
# Mesh repair operations (workspace)
mesh-repair = { workspace = true }
# Mesh offset operations (workspace)
mesh-offset = { workspace = true }
# Linear algebra (vectors, matrices, rotations)
nalgebra = { workspace = true }
# Swiss-table hash map
hashbrown = { workspace = true }
# Derive error types
thiserror = { workspace = true }
# Structured diagnostics
tracing = { workspace = true }

[dev-dependencies]
# Approximate equality for numeric tests
approx = { workspace = true }
# Microbenchmarks
criterion = { workspace = true }

[[bench]]
name = "shell_benchmarks"
harness = false
