[package]
name = "mesh-types"
description = "Core mesh types for CortenForge: Vertex, IndexedMesh, Triangle, AABB"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
keywords = ["mesh", "3d", "geometry", "triangles", "cad"]
categories = ["graphics", "mathematics", "data-structures"]

[package.metadata.cortenforge]
tier = "L0"

[lints]
workspace = true

[dependencies]
# Shared geometric kernel (Aabb, Triangle, Bounded)
cf-geometry = { path = "../../design/cf-geometry" }

# Core math library - matches parry3d and avian for compatibility
nalgebra = { workspace = true }

# Serialization (optional)
serde = { workspace = true, optional = true }

[dev-dependencies]
# Approximate equality testing
approx = { workspace = true }

[features]
default = []
serde = ["dep:serde", "nalgebra/serde-serialize", "cf-geometry/serde"]
