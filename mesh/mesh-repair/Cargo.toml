[package]
name = "mesh-repair"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Mesh repair operations: validation, welding, degenerate removal, hole filling, winding correction, component analysis, self-intersection detection"
repository.workspace = true
keywords = ["mesh", "repair", "3d", "geometry", "manifold"]
categories = ["algorithms", "graphics", "game-development"]

[package.metadata.cortenforge]
tier = "L0"

[lints]
workspace = true

[dependencies]
# Geometric primitives (workspace)
cf-geometry = { path = "../../design/cf-geometry" }
# Shared mesh data structures (workspace)
mesh-types = { workspace = true }
# Linear algebra (vectors, matrices, rotations)
nalgebra = { workspace = true }
# Derive error types
thiserror = { workspace = true }
# Swiss-table hash map
hashbrown = { workspace = true }
# Data-parallel iterators
rayon = { workspace = true }
# Structured diagnostics
tracing = { workspace = true }
# BVH-accelerated pair enumeration for `detect_self_intersections`,
# replacing the O(face²) double-loop with O(n log n) Qbvh self-overlap
# traversal. See `docs/CF_CAST_F4_SELF_INTERSECT_BVH_RECON.md` §S-1
# for the algorithmic gain estimate (~8× per-mesh wall on 400 k-face
# gasket meshes). parry3d-f64 (NOT parry3d) matches the workspace
# precision tier set by `mesh-printability`'s F4 spatial-index ship
# at commit `d42ddf11`.
parry3d-f64 = { workspace = true }

[dev-dependencies]
# Approximate equality for numeric tests
approx = { workspace = true }
# Property-based testing
proptest = { workspace = true }

# criterion benches live in the sibling `mesh-repair-benches` crate
# (L0 plan §4.2: keeps criterion + plotters out of mesh-repair's dev-graph).
